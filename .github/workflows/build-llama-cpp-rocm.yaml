---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build llama-cpp-rocm

# Builds only when something actually changes: a merged Renovate bump (llama.cpp version or the
# digest-pinned ROCm/ubuntu base) edits the Dockerfile and fires the push trigger. Plus manual
# dispatch for ad-hoc rebuilds. No schedule — bases are digest-pinned, so a periodic rebuild
# would just re-pull ~30GB and push a byte-identical image.
on:
  push:
    branches: ["main"]
    paths: ["docker/llama-cpp-rocm/**", ".github/workflows/build-llama-cpp-rocm.yaml"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false # never abort an in-flight ROCm build

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/tanguille/llama-cpp-rocm-gfx1201
  TAG: gfx1201 # stable tag, rebuilt in place; Renovate digest-pins it on the HelmRelease
  STORE: /home/runner/_work/.containers # podman root on the big scratch volume
  # Drive overlay via fuse-overlayfs (kernel overlay whiteouts are blocked in-pod).
  STORAGE_OPTS: --storage-driver overlay --storage-opt overlay.mount_program=/usr/bin/fuse-overlayfs

jobs:
  build:
    # Generic self-hosted image-builder (privileged, big scratch, NO GPU). Building llama.cpp
    # for gfx1201 is HIP cross-compilation — no GPU/device passthrough needed. See runners/image-builder/.
    runs-on: image-builder
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install podman
        run: |
          export DEBIAN_FRONTEND=noninteractive
          SUDO=""
          [ "$(id -u)" -ne 0 ] && SUDO="sudo"
          if command -v podman >/dev/null 2>&1 && command -v fuse-overlayfs >/dev/null 2>&1; then
            echo "podman already present: $(podman --version)"
          else
            $SUDO apt-get update
            $SUDO apt-get install -y --no-install-recommends podman fuse-overlayfs
          fi

      - name: Log in to GHCR
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GHCR_TOKEN}" | podman login ghcr.io -u "${GHCR_USER}" --password-stdin

      - name: Build image
        # No --device: cross-compile only, the GPU is never touched during the build.
        # --layers=false: single working container instead of per-step snapshots — fuse-overlayfs
        # can't reflink-share between layers, so per-step layers balloon disk past the final image.
        # The emptyDir is wiped each run, so there's no layer cache to lose. (--squash conflicts
        # with --layers, so it's omitted.)
        run: |
          podman --root "${STORE}" ${STORAGE_OPTS} build \
            --layers=false \
            --format docker \
            --tag "${IMAGE}:${TAG}" \
            docker/llama-cpp-rocm

      - name: Push
        run: |
          podman --root "${STORE}" ${STORAGE_OPTS} push --digestfile /tmp/digest "${IMAGE}:${TAG}"
          echo "Pushed ${IMAGE}:${TAG}@$(cat /tmp/digest)" | tee -a "${GITHUB_STEP_SUMMARY}"
