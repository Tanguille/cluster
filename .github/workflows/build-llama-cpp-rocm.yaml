---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build llama-cpp-rocm

# Builds only when something actually changes: a merged Renovate bump (llama.cpp version or the
# digest-pinned ROCm/ubuntu base) edits the Dockerfile and fires the push trigger. Plus manual
# dispatch for ad-hoc rebuilds. No schedule — bases are digest-pinned, so a periodic rebuild
# would just re-pull ~30GB and push a byte-identical image.
on:
  push:
    branches: ["main"]
    paths: ["docker/llama-cpp-rocm/**", ".github/workflows/build-llama-cpp-rocm.yaml"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false # never abort an in-flight ROCm build

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/tanguille/llama-cpp-rocm-gfx1201
  TAG: gfx1201 # stable tag, rebuilt in place; Renovate digest-pins it on the HelmRelease
  STORE: /home/runner/_work/.buildkit # buildkitd root on the big scratch volume
  # renovate: datasource=github-releases depName=moby/buildkit
  BUILDKIT_VERSION: v0.30.0

jobs:
  build:
    # Generic self-hosted image-builder (privileged, big scratch, NO GPU). Building llama.cpp
    # for gfx1201 is HIP cross-compilation — no GPU/device passthrough needed. See runners/image-builder/.
    #
    # BuildKit, not podman: podman 4.9 AND 5.8 both fail to build FROM the rocm/vllm base on Talos.
    # native overlay hits the Talos kernel-whiteout block (EPERM); fuse-overlayfs trips podman's
    # gzip layer-MIME bug ("resetting recorded compression … unsupported MIME type"); vfs full-copies
    # the ~30Gi base until it fills the node disk. buildkitd sidesteps all three: containerd image
    # handling (no MIME bug) + the fuse-overlayfs snapshotter (userspace whiteouts, bounded disk).
    runs-on: image-builder
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install buildkit + fuse-overlayfs
        run: |
          export DEBIAN_FRONTEND=noninteractive
          SUDO=""; [ "$(id -u)" -ne 0 ] && SUDO="sudo"
          command -v fuse-overlayfs >/dev/null 2>&1 \
            || { $SUDO apt-get update && $SUDO apt-get install -y --no-install-recommends fuse-overlayfs ca-certificates; }
          if ! command -v buildkitd >/dev/null 2>&1; then
            curl -fsSL "https://github.com/moby/buildkit/releases/download/${BUILDKIT_VERSION}/buildkit-${BUILDKIT_VERSION}.linux-amd64.tar.gz" \
              | $SUDO tar xz -C /usr/local
          fi
          buildkitd --version

      - name: Build and push
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GHCR creds for the buildctl push (docker config.json auth).
          mkdir -p "${HOME}/.docker"
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' \
            "$(printf '%s:%s' "${GHCR_USER}" "${GHCR_TOKEN}" | base64 -w0)" > "${HOME}/.docker/config.json"

          # Start buildkitd. Privileged rootful, with:
          #  --oci-worker-snapshotter fuse-overlayfs: kernel overlay whiteouts are blocked on Talos,
          #    and fuse-overlayfs keeps storage bounded + content-addressed (vs vfs's 150Gi+ blowup).
          #  --oci-worker-net host: RUN steps (apt, git clone) use the pod's network; the default
          #    sandboxed CNI net has no DNS here, so apt-get would fail (exit 4).
          nohup buildkitd --root "${STORE}" --oci-worker-snapshotter fuse-overlayfs --oci-worker-net host >/tmp/buildkitd.log 2>&1 &
          for i in $(seq 1 60); do buildctl debug workers >/dev/null 2>&1 && break; sleep 1; done
          buildctl debug workers

          # Cap compile parallelism by the runner's ENFORCED memory limit (cgroup v2 memory.max):
          # -j$(nproc)=-j12 peaks past the 24Gi pod cap on the ggml-cuda template TUs. ~4GiB/job @ 80%.
          mem=$(cat /sys/fs/cgroup/memory.max 2>/dev/null || echo max)
          case "$mem" in ''|max|*[!0-9]*) mem=$(awk '/MemTotal/{print $2*1024}' /proc/meminfo) ;; esac
          jobs=$(( mem * 80 / 100 / 4294967296 ))
          cores=$(nproc); [ "$jobs" -gt "$cores" ] && jobs=$cores; [ "$jobs" -lt 1 ] && jobs=1
          echo "build parallelism: -j${jobs} (mem_limit=${mem}B cores=${cores})"

          buildctl build \
            --frontend dockerfile.v0 \
            --local context=docker/llama-cpp-rocm \
            --local dockerfile=docker/llama-cpp-rocm \
            --opt filename=Dockerfile \
            --opt build-arg:BUILD_JOBS="${jobs}" \
            --output type=image,name="${IMAGE}:${TAG}",push=true
          echo "Pushed ${IMAGE}:${TAG}" | tee -a "${GITHUB_STEP_SUMMARY}"
