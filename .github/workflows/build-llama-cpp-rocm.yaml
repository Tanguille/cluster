---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build llama-cpp-rocm

# Builds only when something actually changes: a merged Renovate bump (llama.cpp version or the
# digest-pinned ROCm/ubuntu base) edits the Dockerfile and fires the push trigger. Plus manual
# dispatch for ad-hoc rebuilds. No schedule — bases are digest-pinned, so a periodic rebuild
# would just re-pull ~30GB and push a byte-identical image.
on:
  push:
    branches: ["main"]
    paths: ["docker/llama-cpp-rocm/**", ".github/workflows/build-llama-cpp-rocm.yaml"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false # never abort an in-flight ROCm build

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/tanguille/llama-cpp-rocm-gfx1201
  TAG: bench-pr23685 # THROWAWAY A/B test tag (test/livepatch-pr23685 branch); never clobbers prod :gfx1201
  STORE: /home/runner/_work/.containers # podman root on the big scratch volume
  # Ubuntu's podman 4.9 overlay/fuse path trips over Docker gzip layer media types in the ROCm base.
  # vfs avoids that storage import path; --layers=false below keeps the disk hit bounded.
  STORAGE_OPTS: --storage-driver vfs

jobs:
  build:
    # Generic self-hosted image-builder (privileged, big scratch, NO GPU). Building llama.cpp
    # for gfx1201 is HIP cross-compilation — no GPU/device passthrough needed. See runners/image-builder/.
    runs-on: image-builder
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install podman
        run: |
          export DEBIAN_FRONTEND=noninteractive
          SUDO=""
          [ "$(id -u)" -ne 0 ] && SUDO="sudo"
          if command -v podman >/dev/null 2>&1; then
            echo "podman already present: $(podman --version)"
          else
            $SUDO apt-get update
            $SUDO apt-get install -y --no-install-recommends podman
          fi

      - name: Log in to GHCR
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GHCR_TOKEN}" | podman login ghcr.io -u "${GHCR_USER}" --password-stdin

      - name: Build image
        # No --device: cross-compile only, the GPU is never touched during the build.
        # --layers=false: single working container instead of per-step snapshots — vfs full-copies
        # layer data, so per-step layers balloon disk past the final image.
        # The emptyDir is wiped each run, so there's no layer cache to lose. (--squash conflicts
        # with --layers, so it's omitted.)
        run: |
          # Cap compile parallelism by the runner's ENFORCED memory limit (cgroup v2 memory.max).
          # -j$(nproc) (=12) peaks past the 24Gi pod cap on the ggml-cuda template TUs and OOM-kills
          # the runner mid-build. Budget ~4GiB/job at 80% of the limit -> stays under the cap.
          mem=$(cat /sys/fs/cgroup/memory.max 2>/dev/null || echo max)
          case "$mem" in ''|max|*[!0-9]*) mem=$(awk '/MemTotal/{print $2*1024}' /proc/meminfo) ;; esac
          jobs=$(( mem * 80 / 100 / 4294967296 ))
          cores=$(nproc); [ "$jobs" -gt "$cores" ] && jobs=$cores; [ "$jobs" -lt 1 ] && jobs=1
          echo "build parallelism: -j${jobs} (mem_limit=${mem}B cores=${cores})"
          podman --root "${STORE}" ${STORAGE_OPTS} build \
            --layers=false \
            -f docker/llama-cpp-rocm/Dockerfile.bench \
            --build-arg BUILD_JOBS="${jobs}" \
            --tag "${IMAGE}:${TAG}" \
            docker/llama-cpp-rocm

      - name: Push
        run: |
          podman --root "${STORE}" ${STORAGE_OPTS} push --digestfile /tmp/digest "${IMAGE}:${TAG}"
          echo "Pushed ${IMAGE}:${TAG}@$(cat /tmp/digest)" | tee -a "${GITHUB_STEP_SUMMARY}"
