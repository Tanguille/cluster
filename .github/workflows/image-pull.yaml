---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Image Pull

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Image Pull - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
      extension-versions: ${{ steps.extension-changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

      - name: Get Extension Guard Changed Files
        id: extension-changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: |
            kubernetes/apps/database/cloudnative-pg/**/*
            scripts/validate-cnpg-extension-versions.sh
            tests/scripts/test-validate-cnpg-extension-versions.sh
            .github/workflows/image-pull.yaml
            .mise.toml
            mise.lock

  flate:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Image Pull - Flate
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.flate.outputs.images }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Flate
        uses: home-operations/flate/action@0fc37fae10cf3c265294f6adebc6d6c100c74ea5 # v0.4.10

      - name: Run Flate
        id: flate
        env:
          FLATE_OUTPUT: json
          FLATE_PATH: ./kubernetes/flux/cluster
        run: |
          echo 'images<<EOF' >> $GITHUB_OUTPUT
          flate diff images >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

  extension-versions:
    if: ${{ needs.filter.outputs.extension-versions != '[]' }}
    needs: filter
    name: Image Pull - CNPG Extension Versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.7.10
          experimental: true
          install_args: >-
            aqua:mikefarah/yq@4.53.3
            aqua:google/go-containerregistry@0.21.7

      - name: Test CNPG Extension Versions
        run: bash tests/scripts/test-validate-cnpg-extension-versions.sh

      - name: Validate CNPG Extension Versions
        run: bash scripts/validate-cnpg-extension-versions.sh

  pull:
    if: ${{ needs.flate.outputs.images != '[]' }}
    needs: flate
    name: Image Pull - Pull Images
    runs-on: cluster-runner
    steps:
      - name: Install talosctl
        env:
          # renovate: datasource=github-releases depName=siderolabs/talos
          TALOS_VERSION: v1.13.6
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/talosctl" \
            "https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/talosctl-linux-amd64"
          chmod +x "$HOME/.local/bin/talosctl"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # One runner pod pulls all images to its node; Spegel mirrors the blobs cluster-wide,
      # so a single node is enough to pre-warm (and beats one pod + talosctl install per image).
      # yq (not jq): explicitly installed in the home-operations runner image; the guard
      # fails loudly if the flate output doesn't parse (yq is lenient about garbage input).
      - name: Pull Images
        env:
          IMAGES: ${{ needs.flate.outputs.images }}
        run: |
          set -euo pipefail
          images=$(yq -r '.[]' <<< "$IMAGES")
          [ -n "$images" ] || { echo "no images parsed from flate output: $IMAGES"; exit 1; }
          rc=0
          while IFS= read -r image; do
            echo "Pulling ${image}"
            talosctl --nodes "$NODE" image pull "${image}" || rc=1
          done <<< "$images"
          exit $rc

  success:
    if: ${{ !cancelled() }}
    needs: [filter, flate, extension-versions, pull]
    name: Image Pull - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
