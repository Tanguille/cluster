---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Agent PR Review

on:
  pull_request:
    branches: ["main"]
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: cluster-runner
    if: ${{ github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install shellcheck
        run: |
          set -euo pipefail
          command -v shellcheck >/dev/null 2>&1 && exit 0
          export DEBIAN_FRONTEND=noninteractive
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq --no-install-recommends shellcheck
          else
            apt-get update -qq
            apt-get install -y -qq --no-install-recommends shellcheck
          fi

      - name: Run reviewer
        uses: misospace/pr-reviewer-action@v1.0.18
        with:
          github_token: ${{ github.token }}
          ai_base_url: http://llama-server.ai.svc.cluster.local/v1
          ai_api_format: openai
          ai_model: self-hosted
          ai_max_tokens: "4096"
          ai_request_timeout_sec: "300"
          ai_connect_timeout_sec: "30"
          ai_primary_retries: "8"
          ai_primary_retry_delay_sec: "15"
          ai_stream: "true"
          publish_mode: comment
          publish_review_comment: "true"
          standards_file: AGENTS.md
          context_limit_mode: low
          skip_if_diff_unchanged: "true"
          allowed_source_hosts: "github.com,api.github.com,raw.githubusercontent.com,gitlab.com,registry.terraform.io,artifacthub.io,www.talos.dev,talos.dev,fluxcd.io,kubernetes.io,cilium.io"
          evidence_providers_file: .github/pr-review-providers.json
          evidence_provider_timeout_sec: "120"
          evidence_provider_max_output_bytes: "50000"
          evidence_blocker_enforcement: "true"
          # The optional tool harness is disabled for the slow self-hosted model.
          # Evidence providers above remain enforced; tool-harness failures should not block reviews.
          tool_mode: off
