---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Agent PR Review

on:
  pull_request:
    branches: ["main"]
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: cluster-runner
    if: ${{ github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install shellcheck
        run: |
          set -euo pipefail
          command -v shellcheck >/dev/null 2>&1 && exit 0
          export DEBIAN_FRONTEND=noninteractive
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq --no-install-recommends shellcheck
          else
            apt-get update -qq
            apt-get install -y -qq --no-install-recommends shellcheck
          fi

      - name: Run reviewer
        uses: misospace/pr-reviewer-action@b36ea146c6563a3f49a5b9a232d411f6cf970474 # v2.0.5
        with:
          github_token: ${{ github.token }}
          ai_base_url: http://litellm.ai.svc.cluster.local/v1
          ai_api_key: ${{ secrets.LITELLM_API_KEY }}
          ai_api_format: openai
          ai_model: qwen-3.6-fast # thinking-off litellm twin (see litellm configmap)
          ai_max_tokens: "8192"
          ai_temperature: ""
          ai_response_format: json_schema
          # This GPU does ~10 tok/s with ~155-220s cold prefills near ~100K ctx (validated), so the
          # action's 300s default per-request timeout is too tight. Raise it.
          ai_request_timeout_sec: "600"
          verdict_policy: findings_severity_gated
          inline_findings: "true"
          inline_findings_max: "12"
          publish_mode: review_comment
          system_prompt_mode: append
          system_prompt: |
            For dependency upgrades and Renovate PRs: when the PR body does not already include meaningful upstream release notes or a changelog summary, fetch the relevant release notes and add a **Release notes** section to review_markdown. Summarize user-visible changes, breaking changes, and security fixes in prose. Do not enumerate raw upstream PR links, issue references, compare links, or commit SHAs; include at most one release-page URL if useful.
          standards_file: AGENTS.md
          # Engine hard cap is 126,848 tokens (KV pool); 131072 was over it -> HTTP 500 on
          # max-packed reviews (validated). 120000 stays under the cap and trims cold-prefill time.
          model_context_tokens: "120000"
          allowed_source_hosts: "github.com,api.github.com,raw.githubusercontent.com,gitlab.com,registry.terraform.io,artifacthub.io,www.talos.dev,talos.dev,fluxcd.io,kubernetes.io,cilium.io"
          evidence_providers_file: .github/pr-review-providers.json
          evidence_provider_timeout_sec: "120"
          evidence_provider_max_output_bytes: "50000"
          evidence_blocker_enforcement: "true"
          tool_mode: native_loop
          # Default 120s caps the WHOLE native_loop — less than one cold ~100K prefill on this GPU.
          # 900s lets a serialized review finish its tool loop (within-review prefix cache keeps
          # later turns cheap; runner maxRunners:1 serializes the renovate burst).
          tool_loop_wall_clock_sec: "900"
          tool_loop_summarize: "true"
          search_url: http://searxng.default.svc.cluster.local:8080/search
          tool_max_search_results: "5"
