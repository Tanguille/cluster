---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Agent PR Review

on:
  pull_request:
    branches: ["main"]
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: cluster-runner
    if: ${{ github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install shellcheck
        run: |
          set -euo pipefail
          command -v shellcheck >/dev/null 2>&1 && exit 0
          export DEBIAN_FRONTEND=noninteractive
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq --no-install-recommends shellcheck
          else
            apt-get update -qq
            apt-get install -y -qq --no-install-recommends shellcheck
          fi

      - name: Run reviewer
        uses: misospace/pr-reviewer-action@59c7a0596b0d0b515ef9137f7acb985115f4c1d8 # v1.2.3
        with:
          github_token: ${{ github.token }}
          ai_base_url: http://llama-server.ai.svc.cluster.local/v1
          ai_api_format: openai
          ai_model: qwen-3.6
          ai_max_tokens: "4096"
          ai_temperature: ""
          ai_response_format: json_schema
          ai_request_timeout_sec: "300"
          ai_connect_timeout_sec: "30"
          ai_primary_retries: "8"
          ai_primary_retry_delay_sec: "15"
          ai_stream: "true"
          verdict_policy: findings_severity_gated
          inline_findings: "true"
          inline_findings_max: "12"
          validate_required_checks: auto
          required_check_validation_mode: warn
          publish_mode: review_comment
          standards_file: AGENTS.md
          model_context_tokens: "131072"
          review_routing_mode: off
          skip_if_diff_unchanged: "true"
          allowed_source_hosts: "github.com,api.github.com,raw.githubusercontent.com,gitlab.com,registry.terraform.io,artifacthub.io,www.talos.dev,talos.dev,fluxcd.io,kubernetes.io,cilium.io"
          evidence_providers_file: .github/pr-review-providers.json
          evidence_provider_timeout_sec: "120"
          evidence_provider_max_output_bytes: "50000"
          evidence_blocker_enforcement: "true"
          # The optional tool harness stays disabled to keep reviews fast.
          # Evidence providers above remain enforced; tool-harness failures should not block reviews.
          tool_mode: off
