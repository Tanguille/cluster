---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build sglang-rdna4

# GPU-free build on a hosted runner — rationale in docker/sglang-rdna4/README.md.
# Fires on merged build-input changes (Renovate FORK_REF / base-digest bumps) or manual
# dispatch. Docs are excluded: the build isn't bit-reproducible, so every rebuild pushes a
# new digest under the in-place tag and Renovate then rolls the serving pod — a README
# edit must not do that.
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "docker/sglang-rdna4/**"
      - "!docker/sglang-rdna4/*.md"
      - ".github/workflows/build-sglang-rdna4.yaml"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true # hosted runner — aborting a superseded build costs nothing

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/tanguille/sglang-rdna4
  TAG: v0.5.14-gfx1201 # stable tag, rebuilt in place; Renovate digest-pins it on the HelmRelease

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # The ROCm "complete" base plus the conda env need ~60-80GB of docker storage — more than
      # any single runner volume (first run died ENOSPC mid-torch-install). Merge /'s free space
      # with the ~65GB /mnt volume into one LVM volume mounted at docker's data root.
      - name: Maximize build space
        uses: easimon/maximize-build-space@fc881a613ad2a34aca9c9624518214ebc21dfc0c # v10
        with:
          root-reserve-mb: "2048"
          swap-size-mb: "4096" # keep some swap — the compile is RAM-tight on a 16GB runner
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          build-mount-path: /var/lib/docker

      - name: Restart docker on the enlarged volume
        run: sudo systemctl restart docker

      - name: Log in to GHCR
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

      - name: Build image
        run: docker build --tag "${IMAGE}:${TAG}" docker/sglang-rdna4

      - name: Push
        run: |
          docker push "${IMAGE}:${TAG}"
          DIGEST=$(docker inspect --format '{{index .RepoDigests 0}}' "${IMAGE}:${TAG}")
          echo "Pushed ${DIGEST}" | tee -a "${GITHUB_STEP_SUMMARY}"
