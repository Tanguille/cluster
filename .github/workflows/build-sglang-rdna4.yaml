---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build sglang-rdna4

# Builds on any Dockerfile change (a merged Renovate bump fires the push trigger),
# on manual dispatch, and weekly as a safety net.
on:
  push:
    branches: ["main"]
    paths: ["docker/sglang-rdna4/**", ".github/workflows/build-sglang-rdna4.yaml"]
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1" # Mondays 04:00 UTC

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false # never abort an in-flight ROCm build

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/tanguille/sglang-rdna4
  TAG: v0.5.12-gfx1201 # stable tag, rebuilt in place; Renovate digest-pins it on the HelmRelease
  STORE: /home/runner/_work/.containers # podman root on the big scratch volume
  # Drive overlay via fuse-overlayfs (kernel overlay whiteouts are blocked in-pod).
  STORAGE_OPTS: --storage-driver overlay --storage-opt overlay.mount_program=/usr/bin/fuse-overlayfs

jobs:
  build:
    # Self-hosted runner on control-1 (R9700). See runners/gpu-builder/.
    runs-on: gpu-builder
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install podman
        run: |
          export DEBIAN_FRONTEND=noninteractive
          SUDO=""
          [ "$(id -u)" -ne 0 ] && SUDO="sudo"
          if command -v podman >/dev/null 2>&1 && command -v fuse-overlayfs >/dev/null 2>&1; then
            echo "podman already present: $(podman --version)"
          else
            $SUDO apt-get update
            # fuse-overlayfs: real overlay layer-diffs without kernel-overlay perms (blocked in-pod).
            $SUDO apt-get install -y --no-install-recommends podman fuse-overlayfs
          fi

      - name: Log in to GHCR
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GHCR_TOKEN}" | podman login ghcr.io -u "${GHCR_USER}" --password-stdin

      - name: Build image
        # GPU in the sandbox: setup.sh asserts torch.cuda.is_available() during build.
        # Kernel overlayfs whiteouts are blocked inside the pod (even privileged), so drive
        # the overlay driver through fuse-overlayfs (needs /dev/fuse, mounted via the runner pod).
        # This keeps layer-diff storage — total ~50-80Gi — vs vfs which full-copies every layer.
        run: |
          # --layers=false + --squash: build in a single working container and emit one
          # squashed layer, instead of caching a separate snapshot per Dockerfile step.
          # fuse-overlayfs can't reflink/hardlink-share between layers (conda leans on
          # hardlinks), so per-step layers balloon disk ~6x the final image. One container
          # keeps peak scratch near the real rootfs size. We get no layer cache, but the
          # emptyDir is wiped each run anyway, so there's nothing to cache.
          podman --root "${STORE}" ${STORAGE_OPTS} build \
            --layers=false --squash \
            --device /dev/kfd --device /dev/dri \
            --tag "${IMAGE}:${TAG}" \
            docker/sglang-rdna4

      - name: Push
        run: |
          podman --root "${STORE}" ${STORAGE_OPTS} push --digestfile /tmp/digest "${IMAGE}:${TAG}"
          echo "Pushed ${IMAGE}:${TAG}@$(cat /tmp/digest)" | tee -a "${GITHUB_STEP_SUMMARY}"
