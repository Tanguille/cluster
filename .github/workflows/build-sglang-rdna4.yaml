---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build sglang-rdna4

# GPU-free build on a hosted runner — rationale in docker/sglang-rdna4/README.md.
# Fires on merged build-input changes (Renovate FORK_REF / base-digest bumps) or manual
# dispatch. Docs are excluded: the build isn't bit-reproducible, so every rebuild pushes a
# new digest under the in-place tag and Renovate then rolls the serving pod — a README
# edit must not do that.
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "docker/sglang-rdna4/**"
      - "!docker/sglang-rdna4/*.md"
      - ".github/workflows/build-sglang-rdna4.yaml"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true # hosted runner — aborting a superseded build costs nothing

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/tanguille/sglang-rdna4
  TAG: v0.5.15-gfx1201 # stable tag, rebuilt in place; Renovate digest-pins it on the HelmRelease

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # The `builder` stage (ROCm "complete" ~20GB + conda env ~22GB) outgrows /'s free space, so
      # point docker's data root at the larger ~75GB /mnt volume. That volume alone is enough — a
      # green build fit in it without touching /, so no disk-reclaim action is needed (the earlier
      # easimon/maximize-build-space and jlumbroso/free-disk-space steps both only freed /, which
      # the build never uses).
      - name: Move docker storage to /mnt
        run: |
          sudo systemctl stop docker.service docker.socket
          sudo mkdir -p /mnt/docker
          # Merge, don't clobber: preserve any other daemon settings the runner image ships.
          echo "$(sudo jq '. + {"data-root":"/mnt/docker"}' /etc/docker/daemon.json 2>/dev/null || echo '{"data-root":"/mnt/docker"}')" \
            | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker.service
          docker info --format 'docker data root: {{.DockerRootDir}}'
          df -h /mnt

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (OCI labels)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE }}
          tags: type=raw,value=${{ env.TAG }}

      # provenance/sbom left off: this image is pulled only by our own cluster, pinned by digest —
      # attestations would turn the tag into an OCI index and complicate that pin for no gain here.
      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: docker/sglang-rdna4
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false

      - name: Summary
        run: echo "Pushed \`${IMAGE}:${TAG}@${{ steps.build.outputs.digest }}\`" >> "${GITHUB_STEP_SUMMARY}"
