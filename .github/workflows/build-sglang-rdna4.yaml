---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build sglang-rdna4

# GPU-free build on a hosted runner: the HIP kernels cross-compile via
# PYTORCH_ROCM_ARCH=gfx1201 (no device probe), and setup.sh's GPU-touching steps are
# verification-only — the Dockerfile swallows them and hard-gates on `import sglang`
# instead. The real smoke test is the pod's model load at deploy; rollback is the
# previous digest. Zero contact with control-1 / live serving.
#
# Rebuilds fire on merged changes to the build context (a Renovate FORK_REF or
# base-digest bump) or on manual dispatch — the image is fully pinned, so nothing
# changes between such merges and a cron rebuild would be a no-op.
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["docker/sglang-rdna4/**"]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false # never abort an in-flight ROCm build

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/tanguille/sglang-rdna4
  TAG: v0.5.14-gfx1201 # stable tag, rebuilt in place; Renovate digest-pins it on the HelmRelease

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # The ROCm "complete" base plus the conda env far exceed the runner's default
      # free disk; drop the preinstalled toolchains we don't use.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          swap-storage: false # keep swap — the compile is RAM-tight on a 16GB runner

      - name: Log in to GHCR
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

      - name: Build image
        run: docker build --tag "${IMAGE}:${TAG}" docker/sglang-rdna4

      - name: Push
        run: |
          docker push "${IMAGE}:${TAG}"
          DIGEST=$(docker inspect --format '{{index .RepoDigests 0}}' "${IMAGE}:${TAG}")
          echo "Pushed ${DIGEST}" | tee -a "${GITHUB_STEP_SUMMARY}"
