# Generate a schematic for a Talos node
# curl -X POST --data-binary @talos/schematic.yaml \
#  https://factory.talos.dev/schematics
# Truenas VM (control-1)
# 680e946fc81d07d5e8bfab832686b844ef3fc5b940a20e20aebb4e93b1b72a31
---
customization:
  extraKernelArgs:
    - apparmor=0
    - init_on_alloc=0
    - init_on_free=0
    - talos.auditd.disabled=1
    - talos.dashboard.disabled=1
    - -selinux
    - cpufreq.default_governor=performance
    - amd_pstate=active
    - iommu=pt
    - mitigations=off
    - security=none
    - preempt=voluntary # Talos v1.13+: gpu preemption
  systemExtensions:
    officialExtensions:
      - siderolabs/nvidia-container-toolkit-production
      - siderolabs/nvidia-open-gpu-kernel-modules-production
      - siderolabs/qemu-guest-agent
      - siderolabs/nfsrahead
# Chuwi ubox (control-2/3)
# 1fd419f5873a6e96fcd35ad1f849c02b53578eb39922041b24ab475fccd99780
---
customization:
  extraKernelArgs:
    - talos.platform=metal
    - apparmor=0
    - init_on_alloc=0
    - init_on_free=0
    - talos.auditd.disabled=1
    - talos.dashboard.disabled=1
    - -selinux
    - amd_pstate=active
    - mitigations=off
    - security=none
  systemExtensions:
    officialExtensions:
      - siderolabs/amdgpu
      - siderolabs/amd-ucode
      - siderolabs/nfsrahead
