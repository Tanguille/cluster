    - init_on_free=0
    - talos.auditd.disabled=1
    - talos.dashboard.disabled=1
    - -selinux
    - amd_pstate=active
    - mitigations=off
    - security=none
  systemExtensions:
    officialExtensions:
      - siderolabs/amdgpu
      - siderolabs/amd-ucode
      - siderolabs/nfsrahead
