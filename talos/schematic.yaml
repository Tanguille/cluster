# Generate a schematic for a Talos node
# curl -X POST --data-binary @talos/schematic.yaml \
#  https://factory.talos.dev/schematics
# Truenas VM (control-1)
# dfc849d1bd15c28f7e812d46ac70744b563e49fea8aff2cf784d58eeaf47b92d
---
customization:
  extraKernelArgs:
    - apparmor=0
    - init_on_alloc=0
    - init_on_free=0
    - talos.auditd.disabled=1
    - talos.dashboard.disabled=1
    - -selinux
    - cpufreq.default_governor=performance
    - amd_pstate=active
    - amdgpu.ppfeaturemask=0xffffffff
    - amdgpu.runpm=0
    - pcie_aspm.policy=performance
    - mitigations=off
    - security=none
    - preempt=voluntary # Talos v1.13+: gpu preemption
  systemExtensions:
    officialExtensions:
      - siderolabs/amdgpu
      - siderolabs/amd-ucode
      - siderolabs/qemu-guest-agent
      - siderolabs/nfsrahead
# Chuwi ubox (control-2/3)
# 1fd419f5873a6e96fcd35ad1f849c02b53578eb39922041b24ab475fccd99780
---
customization:
  extraKernelArgs:
    - talos.platform=metal
    - apparmor=0
    - init_on_alloc=0
    - init_on_free=0
    - talos.auditd.disabled=1
    - talos.dashboard.disabled=1
    - -selinux
    - amd_pstate=active
    - mitigations=off
    - security=none
  systemExtensions:
    officialExtensions:
      - siderolabs/amdgpu
      - siderolabs/amd-ucode
      - siderolabs/nfsrahead
