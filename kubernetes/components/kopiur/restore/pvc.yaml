---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ${APP}
spec:
  accessModes: ["${PVC_ACCESSMODES:=ReadWriteOnce}"]
  dataSourceRef:
    apiGroup: kopiur.home-operations.com
    kind: Restore
    name: ${APP}-restore
  resources:
    requests:
      storage: ${PVC_CAPACITY:=5Gi}
  storageClassName: ${PVC_STORAGECLASS:=ceph-block}
