---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: ${APP}
spec:
  repository:
    kind: ClusterRepository
    name: kopia-nas
  sources:
    - pvc:
        name: ${APP}
      # The fork's mover always recorded /data regardless of the app's real
      # mount path — kopiur's own default (/pvc/<name>) would start a new
      # identity strand instead of continuing the adopted history.
      sourcePathOverride: /data
  compression:
    compressor: zstd
  # keepHourly lowered from 24: see kubernetes/components/kopiur/backup/
  # snapshotpolicy.yaml for the shared-repo ConfigMap-size ceiling reason
  # (home-operations/kopiur#237).
  retention:
    keepHourly: 8
    keepDaily: 7
  volumeSnapshotClassName: ${BACKUP_SNAPSHOTCLASS:=csi-ceph-blockpool}
  credentialProjection:
    enabled: true
  # For apps that run as root but whose pod spec never pins a uid (image
  # runs as root directly, no declared securityContext):
  # inheritSecurityContextFrom.pvcConsumer has nothing to inherit and
  # silently falls back to the mover image's own non-root default instead
  # (home-operations/kopiur pvcConsumer silent-no-op gap). Explicit root +
  # DAC_READ_SEARCH is the only way to actually read root-owned files: an
  # inherited-root mover still lacks this capability and would fail the
  # same way (home-operations/kopiur — inherited root has no DAC caps).
  # Requires the kopiur.home-operations.com/privileged-movers: "true"
  # namespace annotation.
  mover:
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      capabilities:
        add:
          - DAC_READ_SEARCH
