# Minimal qBitrr config — only required and non-default values

[Settings]
# Prevents migration from overwriting qBit Host with default "change_me"
ConfigVersion = "5.10.1"
CompletedDownloadFolder = "/completed_downloads"
FreeSpaceFolder = "/completed_downloads"
# Desired free space in download dir (K/M/G/T, -1 = disable)
FreeSpace = "500G"
# Required for FreeSpace logic (pause/resume torrents)
AutoPauseResume = true
# qBit category to mark failed torrents
FailedCategory = "failed"
# qBit category to trigger recheck
RecheckCategory = "recheck"
# Don't touch torrents younger than this (seconds); recheck/failed only. Default 180; we use 10 min.
IgnoreTorrentsYoungerThan = 600
# Hosts pinged to check internet (hit frequently)
PingURLS = ["one.one.one.one", "dns.google.com"]

[WebUI]
Host = "0.0.0.0"
Port = 6969

[qBit.default]
Host = "qbittorrent.media.svc.cluster.local"
Port = 80

[Sonarr-TV]
Managed = true
URI = "http://sonarr.media.svc.cluster.local"
APIKey = "${SONARR_API_KEY}"
Category = "tv-sonarr"
ReSearch = true
# Move, Copy or Auto
importMode = "Auto"
# Minutes; 0 = disable
RssSyncTimer = 5
RefreshDownloadsTimer = 5
# Arr messages treated as failure; qBitrr removes files and reports failed to Arr
ArrErrorCodesToBlocklist = [
  "Not an upgrade for existing episode file(s)",
  "Not a preferred word upgrade for existing episode file(s)",
  "Unable to determine if file is a sample",
]

[Sonarr-TV.EntrySearch]
SearchMissing = true
SearchLimit = 2
# Seconds between checking for new Overseerr/Ombi requests (default 300)
SearchRequestsEvery = 600
DoUpgradeSearch = true
QualityUnmetSearch = true
CustomFormatUnmetSearch = true
# true | false | "smart" (series vs episode search)
SearchBySeries = "smart"
# Search today's episodes first (Sonarr)
PrioritizeTodaysReleases = true

[Sonarr-TV.EntrySearch.Overseerr]
SearchOverseerrRequests = true
OverseerrURI = "http://seerr.media.svc.cluster.local"
OverseerrAPIKey = "${JELLYSEERR_API_KEY}"
# Only process approved requests
ApprovedOnly = true
# 4K instance
Is4K = true

[Sonarr-TV.Torrent]
FolderExclusionRegex = [
  "\\bextras?\\b",
  "\\bfeaturettes?\\b",
  "\\bsamples?\\b",
  "\\bscreens?\\b",
  "\\bnc(ed|op)?(\\\\d+)?\\b",
]
FileNameExclusionRegex = [
  "\\bncop\\\\d+?\\b",
  "\\bnced\\\\d+?\\b",
  "\\bsample\\b",
  "brarbg.com\\b",
  "\\btrailer\\b",
  "music video",
  "comandotorrents.com",
]
FileExtensionAllowlist = [
  ".mp4",
  ".mkv",
  ".sub",
  ".ass",
  ".srt",
  ".!qB",
  ".parts",
]
AutoDelete = true
# Max remaining ETA in seconds before removal (604800 = 7 days)
MaximumETA = 604800
# Don't delete torrents above this completion % (0.99 = 99%)
MaximumDeletablePercentage = 0.99
DoNotRemoveSlow = true
# Minutes before stalled torrents can be removed (-1 = disabled, 0 = infinite)
StalledDelay = 15

[Radarr]
Managed = true
URI = "http://radarr.media.svc.cluster.local"
APIKey = "${RADARR_API_KEY}"
Category = "radarr"
ReSearch = true
importMode = "Auto"
# Minutes; 0 = disable
RssSyncTimer = 5
RefreshDownloadsTimer = 5
# Arr messages treated as failure; qBitrr removes files and reports failed to Arr
ArrErrorCodesToBlocklist = [
  "Not an upgrade for existing movie file(s)",
  "Not a preferred word upgrade for existing movie file(s)",
  "Unable to determine if file is a sample",
]

[Radarr.EntrySearch]
SearchMissing = true
SearchLimit = 2
# Seconds between checking for new Overseerr/Ombi requests (default 300)
SearchRequestsEvery = 600
DoUpgradeSearch = false
QualityUnmetSearch = true
CustomFormatUnmetSearch = true
SearchBySeries = "smart"

[Radarr.EntrySearch.Overseerr]
SearchOverseerrRequests = true
OverseerrURI = "http://seerr.media.svc.cluster.local"
OverseerrAPIKey = "${JELLYSEERR_API_KEY}"
ApprovedOnly = true
Is4K = true

[Radarr.Torrent]
FolderExclusionRegex = [
  "\\bfeaturettes?\\b",
  "\\bsamples?\\b",
  "\\bscreens?\\b",
  "\\bspecials?\\b",
  "\\bova\\b",
  "\\bnc(ed|op)?(\\\\d+)?\\b",
]
FileNameExclusionRegex = [
  "\\bncop\\\\d+?\\b",
  "\\bnced\\\\d+?\\b",
  "\\bsample\\b",
  "brarbg.com\\b",
  "\\btrailer\\b",
  "music video",
  "comandotorrents.com",
]
FileExtensionAllowlist = [
  ".mp4",
  ".mkv",
  ".sub",
  ".ass",
  ".srt",
  ".!qB",
  ".parts",
]
AutoDelete = true
# Max remaining ETA in seconds before removal (604800 = 7 days)
MaximumETA = 604800
# Don't delete torrents above this completion % (0.99 = 99%)
MaximumDeletablePercentage = 0.99
DoNotRemoveSlow = true
# Minutes before stalled torrents can be removed (-1 = disabled, 0 = infinite)
StalledDelay = 15
