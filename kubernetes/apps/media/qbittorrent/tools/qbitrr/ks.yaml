---
# Flux Kustomization for qbitrr — substitution and deps live here (no cluster-apps substituteFrom patch).
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app qbitrr
  namespace: &namespace media
spec:
  components:
    - ../../../../../components/nfs-scaler
  path: ./kubernetes/apps/media/qbittorrent/tools/qbitrr
  targetNamespace: *namespace
  dependsOn:
    - name: qbittorrent
  wait: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 30m
  postBuild:
    substitute:
      APP: *app
    substituteFrom:
      - kind: Secret
        name: qbitrr-secrets
        optional: false
