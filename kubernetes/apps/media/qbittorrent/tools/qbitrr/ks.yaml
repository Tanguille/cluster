---
# Flux Kustomization for qbitrr — substitution and deps live here (no cluster-apps substituteFrom patch).
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: qbitrr
  namespace: media
  labels:
    # Opt out of cluster-apps default substituteFrom so we can use cluster + app secrets
    flux.toolkit.fluxcd.io/substitute-from: skip
spec:
  components:
    - ../../../../../components/nfs-scaler
  path: ./kubernetes/apps/media/qbittorrent/tools/qbitrr
  targetNamespace: media
  dependsOn:
    - name: qbittorrent
  wait: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 30m
  postBuild:
    substitute:
      APP: qbitrr
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
        optional: false
      - kind: Secret
        name: cluster-secrets
        optional: false
      - kind: Secret
        name: qbitrr-secrets
        optional: false
