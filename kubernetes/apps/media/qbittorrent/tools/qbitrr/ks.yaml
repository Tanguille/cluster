---
# Flux Kustomization for qbitrr — deps live here; substitution comes from the cluster-apps
# defaults patch (cluster-settings + cluster-secrets, which hold the *arr API keys).
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app qbitrr
  namespace: &namespace media
spec:
  components:
    - ../../../../../components/nfs-scaler
  path: ./kubernetes/apps/media/qbittorrent/tools/qbitrr
  targetNamespace: *namespace
  dependsOn:
    - name: qbittorrent
  wait: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 30m
  postBuild:
    substitute:
      APP: *app
