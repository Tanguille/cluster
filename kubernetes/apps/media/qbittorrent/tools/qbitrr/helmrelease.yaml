---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app qbitrr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      securityContext:
        runAsUser: &uid 1000
        runAsGroup: *uid
        fsGroup: *uid
        fsGroupChangePolicy: OnRootMismatch
      # Graceful SQLite / WAL checkpoint on SIGTERM (upstream recommends ~30s before SIGKILL)
      terminationGracePeriodSeconds: 30

    controllers:
      qbitrr:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          configure:
            # steinbrueckri/envsubst: public Dockerfile (Alpine + gettext at build); no runtime apk (works without egress to Alpine mirrors).
            # https://github.com/steinbrueckri/envsubst — pin digest after pull: docker inspect --format='{{index .RepoDigests 0}}' steinbrueckri/envsubst:v2.1.1
            image:
              repository: docker.io/steinbrueckri/envsubst
              tag: v2.1.1
            securityContext:
              runAsUser: 0
              runAsGroup: 0
            command:
              - /bin/sh
              - -c
              - |
                set -eu
                mkdir -p /config
                chown -R 1000:1000 /config
                envsubst < /config-template/config.toml > /config/config.toml
                chown 1000:1000 /config/config.toml
                chmod 644 /config/config.toml
            envFrom:
              - secretRef:
                  name: qbitrr-secrets

        containers:
          app:
            image:
              repository: docker.io/feramance/qbitrr
              tag: v5.10.1
            # Skip docker-entrypoint.sh (gosu/setuid). Init already chowns /config; run as 1000 like upstream `user: "1000:1000"`.
            command: ["/usr/bin/tini", "--"]
            args: ["python", "-m", "qBitrr.main"]
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            env:
              TZ: ${TIMEZONE}
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 6969
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  periodSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                cpu: 1
                memory: 1Gi

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: ceph-block
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts:
          - path: /config
            readOnly: false

      config-template:
        type: configMap
        name: qbitrr-config
        globalMounts:
          - path: /config-template
            readOnly: true

      downloads:
        type: nfs
        server: ${TRUENAS_IP}
        path: /mnt/BIGHDDZ1/Media/Downloads
        globalMounts:
          - path: /completed_downloads
            readOnly: false
