---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app fileflows
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: amd.com/gpu
                    operator: In
                    values: ["true"]
      securityContext:
        # revenz/fileflows entrypoint must start as root (apt/groupadd on boot),
        # then drops to PUID/PGID=568 itself. #3569 wrongly "simplified" this to 568.
        runAsUser: 0
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        # 44=video, 226=render for VAAPI on /dev/dri
        supplementalGroups: [10000, 44, 226]
        seccompProfile: { type: RuntimeDefault }

    controllers:
      fileflows:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        initContainers:
          init-dirs:
            image:
              repository: busybox
              tag: 1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
            command:
              - sh
              - -c
              - |
                mkdir -p /app/Data /app/Logs /app/ManuallyAdded /temp
                chown -R 0:0 /app /temp
            securityContext:
              runAsUser: 0

        containers:
          app:
            image:
              repository: revenz/fileflows
              tag: 26.06@sha256:377d3b7c05ba705ac0fe2b338c1f5eef9426d0493a0a91101de97071cbbc0b9b
            env:
              TZ: ${TIMEZONE}
              PUID: "568"
              PGID: "568"
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
                squat.ai/dri: 1
              limits:
                cpu: 2
                memory: 5Gi
                squat.ai/dri: 1

    service:
      fileflows:
        controller: *app
        ports:
          http:
            port: 5000

    route:
      fileflows:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: FileFlows
          gethomepage.dev/description: Media transcoding pipeline
          gethomepage.dev/group: Processing
          gethomepage.dev/icon: fileflows.png
          gethomepage.dev/widget.type: fileflows
          gethomepage.dev/widget.url: http://fileflows.media.svc.cluster.local:5000
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /app/Data
            readOnly: false

      temp:
        type: emptyDir
        globalMounts:
          - path: /temp
            readOnly: false

      media:
        type: nfs
        server: ${TRUENAS_IP}
        path: ${MEDIA_NFS_PATH}
        globalMounts:
          - path: /media
            readOnly: false
