---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: amd.com/gpu
                    operator: In
                    values: ["true"]
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 44 # video
          - 109
          - 100
          - 226 # render: required for VAAPI on /dev/dri/renderD*

    controllers:
      jellyfin:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: 10.11.11@sha256:45f648c382a0c8b552582fcea40e95cb17c5d475473a891cba0eb7523fb92112
            command:
              - sh
              - -c
              - |
                echo "=== Fixing Jellyfin web permissions for plugins ==="
                if [ -f /jellyfin/jellyfin-web/index.html ]; then
                  chown 568:568 /jellyfin/jellyfin-web/index.html
                  echo "Fixed permissions for /jellyfin/jellyfin-web/index.html"
                else
                  echo "Warning: /jellyfin/jellyfin-web/index.html not found"
                fi
                echo "=== Switching to user 568 and starting Jellyfin ==="
                # Try different user-switching tools in order of preference
                if command -v setpriv >/dev/null 2>&1; then
                  # keep video/render groups so user 568 can open /dev/dri for VAAPI
                  exec setpriv --reuid=568 --regid=568 --groups=44,226 /jellyfin/jellyfin --datadir /config --cachedir /cache
                else
                  # Fallback: ensure user exists and use su
                  if ! id 568 >/dev/null 2>&1; then
                    adduser -D -u 568 -g 568 jellyfin 2>/dev/null || true
                  fi
                  exec su -s /bin/sh -c 'exec /jellyfin/jellyfin --datadir /config --cachedir /cache' "#568"
                fi
            env:
              TZ: ${TIMEZONE}
              DOTNET_SYSTEM_IO_DISABLEFILELOCKING: "true"
              # FFmpeg configuration for better media processing
              JELLYFIN_FFmpeg__probesize: 100000000
              JELLYFIN_FFmpeg__analyzeduration: 1000000000
              JELLYFIN_FFmpeg__fflags: "+genpts+discardcorrupt+fastseek"
              JELLYFIN_FFmpeg__threads: "4"
              JELLYFIN_FFmpeg__hwaccel: "vaapi"
              # Timeout settings
              JELLYFIN_FFmpeg__timeout: "60000"
              JELLYFIN_FFmpeg__imageExtractionTimeout: "60000"
              # Memory management for .NET
              DOTNET_GCAllowVeryLargeObjects: "1"
              DOTNET_GCLOHThreshold: "100000"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8096
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            lifecycle:
              preStop:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - sleep 5
            resources:
              requests:
                memory: 512Mi
                squat.ai/dri: 1
              limits:
                memory: 8Gi
                squat.ai/dri: 1
    service:
      app:
        controller: jellyfin
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Jellyfin
          gethomepage.dev/description: Media server
          gethomepage.dev/group: Library
          gethomepage.dev/icon: jellyfin.png
          gethomepage.dev/widget.type: jellyfin
          gethomepage.dev/widget.url: http://jellyfin.media.svc.cluster.local:8096
          gethomepage.dev/widget.key: "{{`{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}`}}"
          gethomepage.dev/widget.fields: '["movies","series","episodes","songs"]'
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network

    persistence:
      config:
        existingClaim: jellyfin
        advancedMounts:
          jellyfin:
            app:
              - path: /config

      media:
        type: nfs
        server: ${TRUENAS_IP}
        path: ${MEDIA_NFS_PATH}
        globalMounts:
          - path: /ext_media
            readOnly: false

      library:
        type: hostPath
        hostPath: "/var/mnt/merged/"
        globalMounts:
          - path: /var/mnt/merged/

      tmpfs:
        type: emptyDir
        advancedMounts:
          jellyfin:
            app:
              - path: /cache
                subPath: cache
              - path: /config/transcode
                subPath: transcode
              - path: /config/log
                subPath: log
              - path: /tmp
                subPath: tmp
