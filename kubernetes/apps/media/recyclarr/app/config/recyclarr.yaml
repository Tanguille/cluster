---
# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json
radarr:
  radarr:
    base_url: http://radarr.media.svc.cluster.local
    api_key: !env_var RADARR_API_KEY

    quality_definition:
      type: movie

    quality_profiles:
      - trash_id: 64fb5f9858489bdac2af690e27c8f42f # UHD Bluray + WEB
        reset_unmatched_scores:
          enabled: true
      - name: 3D
        upgrade:
          allowed: true
          until_quality: Bluray-2160p
        qualities:
          - name: Bluray-2160p
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p

    custom_format_groups:
      add:
        - trash_id: ff204bbcecdd487d1cefcefdbf0c278d # [Optional] Golden Rule UHD
          select:
            - 839bea857ed2c0a8e084f3cbdbd65ecb # x265 (no HDR/DV)
        - trash_id: f4f1474b963b24cf983455743aa9906c # [Optional] Movie Versions
          select_all: true
          assign_scores_to:
            - trash_id: 64fb5f9858489bdac2af690e27c8f42f
            - name: 3D
        - trash_id: a3ac6af01d78e4f21fcb75f601ac96df # [Unwanted] Unwanted Formats
          select:
            - b6832f586342ef70d9c128d40c07b872 # Bad Dual Groups
            - cc444569854e9de0b084ab2b8b1532b2 # Black and White Editions
            - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # No-RlsGroup
            - 7357cf5161efbf8c4d5d0c30b4815ee2 # Obfuscated
            - 5c44f52a8714fdd79bb4d98e2673be1f # Retags
            - f537cf427b64c38c8e36298f657e4828 # Scene
          assign_scores_to:
            - trash_id: 64fb5f9858489bdac2af690e27c8f42f
            - name: 3D

    custom_formats:
      - trash_ids:
          - dc98083864ea246d05a42df0d05f81cc # x265 (HD)
        assign_scores_to:
          - trash_id: 64fb5f9858489bdac2af690e27c8f42f
            score: 0
      - trash_ids:
          - b8cd450cbfa689c0259a01d9e29ba3d6 # 3D
        assign_scores_to:
          - name: 3D
            score: 10000

sonarr:
  sonarr:
    base_url: http://sonarr.media.svc.cluster.local
    api_key: !env_var SONARR_API_KEY

    quality_definition:
      type: series

    quality_profiles:
      - name: Any
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: Bluray-2160p
        qualities:
          - name: Bluray-2160p
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: WEB 720p
            qualities:
              - WEBDL-720p
              - WEBRip-720p
          - name: Bluray-720p
          - name: HDTV-1080p
          - name: HDTV-720p
          - name: SDTV
          - name: DVD
      - trash_id: 20e0fc959f1f1704bed501f23bdae76f # Anime
        reset_unmatched_scores:
          enabled: true

    custom_formats:
      - trash_ids:
          - 07a32f77690263bb9fda1842db7e273f # VOSTFR
        assign_scores_to:
          - trash_id: 20e0fc959f1f1704bed501f23bdae76f
            score: -10000

    include:
      - config: Sonarr_Standard_Custom_Formats.yaml
