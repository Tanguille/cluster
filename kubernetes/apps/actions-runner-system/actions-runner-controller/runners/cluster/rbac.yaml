---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-runner
---
apiVersion: talos.dev/v1alpha1
kind: ServiceAccount
metadata:
  name: cluster-runner
spec:
  # Only use is 'talosctl image pull'; ImagePull needs more than os:reader, and the
  # kubernetesTalosAPIAccess allowlist (talos/patches) permits only os:admin/os:reader.
  roles: ["os:admin"]
