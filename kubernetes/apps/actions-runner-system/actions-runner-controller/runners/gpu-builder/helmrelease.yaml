---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-builder
spec:
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set # shared with the cluster runner (same namespace)
  interval: 1h
  values:
    githubConfigUrl: https://github.com/tanguille/cluster
    githubConfigSecret: cluster-runner-secret # reuse the cluster runner's GitHub App
    # Scale-to-zero: spins up only when a job targets `runs-on: gpu-builder`.
    minRunners: 0
    maxRunners: 1
    controllerServiceAccount:
      name: actions-runner-controller
      namespace: actions-runner-system
    template:
      spec:
        # Pin to control-1: the only gfx1201 node, and where the build disk lives.
        nodeSelector:
          kubernetes.io/hostname: control-1
        # ROCm device access (groups 44/226, Unconfined) — same plumbing as the vllm/sglang pods.
        securityContext:
          runAsUser: 0
          runAsGroup: 0
          supplementalGroups: [44, 226]
          seccompProfile:
            type: Unconfined
        containers:
          - name: runner
            image: ghcr.io/home-operations/actions-runner:2.335.1@sha256:3d544e5eed58722c0b6a97212a31eada0f9f2e99f189c41911a5573a23d7386a
            command: ["/home/runner/run.sh"]
            # Rootful `podman build` mounting /dev/kfd needs a privileged container;
            # acceptable for a single-purpose scale-to-zero builder.
            securityContext:
              privileged: true
            env:
              # Run the job in the runner pod (no nested container) to inherit the GPU + disk.
              - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
                value: "false"
              # The runner agent refuses to run as root unless this is set; we need root
              # (+ privileged) for `podman build --device`.
              - name: RUNNER_ALLOW_RUNASROOT
                value: "1"
            resources:
              requests:
                squat.ai/dri: 1 # binds /dev/dri + /dev/kfd into the pod (shared, count:4)
              limits:
                squat.ai/dri: 1
            volumeMounts:
              # node-local scratch for checkout + podman storage (~50Gi image), NOT tmpfs.
              - mountPath: /home/runner/_work
                name: work
        volumes:
          - name: work
            emptyDir:
              sizeLimit: 80Gi
