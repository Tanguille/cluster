---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/persistentvolumeclaim_v1.json
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: image-builder-buildkit-cache
spec:
  # Persistent buildkit store (the ~50Gi ROCm base + ccache + layer cache) so Renovate-triggered
  # rebuilds reuse the base and compiled objects instead of re-pulling + recompiling each run
  # (~19min -> ~5-6min on a llama.cpp bump). openebs-hostpath = node-local disk; the runner is
  # pinned to the same node (kubernetes.io/hostname: control-3) because RWO hostpath is node-bound.
  # maxRunners=1 + scale-to-zero means only one runner mounts it at a time, so RWO is safe.
  accessModes: ["ReadWriteOnce"]
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 100Gi
