---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: image-builder
spec:
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set # shared with the cluster runner (same namespace)
  interval: 1h
  values:
    githubConfigUrl: https://github.com/tanguille/cluster
    githubConfigSecret: cluster-runner-secret # reuse the cluster runner's GitHub App
    # Scale-to-zero: spins up only when a job targets `runs-on: image-builder`.
    minRunners: 0
    maxRunners: 1
    controllerServiceAccount:
      name: actions-runner-controller
      namespace: actions-runner-system
    template:
      spec:
        # No GPU: building llama.cpp for gfx1201 is HIP cross-compilation (hipcc emits gfx1201 code
        # objects with no GPU present). Pinned to control-3 because the persistent buildkit-cache PVC
        # is node-local (openebs-hostpath, RWO) and must mount on the same node each run; control-3
        # also keeps the heavy build off the GPU node (control-1). Dedicated builder so the
        # privileged buildkitd build stays isolated from regular CI jobs.
        nodeSelector:
          kubernetes.io/hostname: control-3
        # Rootful + privileged so buildkitd runs in-pod (see the build workflow).
        securityContext:
          runAsUser: 0
          runAsGroup: 0
          seccompProfile:
            type: Unconfined
        containers:
          - name: runner
            image: ghcr.io/home-operations/actions-runner:2.335.1@sha256:3d544e5eed58722c0b6a97212a31eada0f9f2e99f189c41911a5573a23d7386a
            command: ["/home/runner/run.sh"]
            # Rootful `podman build` needs privileged inside the runner pod;
            # acceptable for a single-purpose scale-to-zero builder.
            securityContext:
              privileged: true
            env:
              # Run the job in the runner pod (no nested container) to inherit the scratch disk.
              - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
                value: "false"
              # The runner agent refuses to run as root unless this is set; root (+ privileged)
              # is needed for `podman build`.
              - name: RUNNER_ALLOW_RUNASROOT
                value: "1"
            # Bound the heavy `cmake -j$(nproc)` compile so it doesn't starve co-located workloads.
            resources:
              requests:
                cpu: "2"
                memory: 8Gi
              limits:
                cpu: "12"
                memory: 24Gi
            volumeMounts:
              # Ephemeral scratch for the git checkout + buildkit's tmp; the build's heavy working
              # set lives on the persistent buildkit-cache PVC below, so this stays small.
              - mountPath: /home/runner/_work
                name: work
              # Persistent buildkit store (--root): the ROCm base + ccache + layer cache survive
              # runs, so a Renovate llama.cpp bump rebuilds in ~5-6min instead of ~19min.
              - mountPath: /var/lib/buildkit
                name: buildkit-cache
        volumes:
          - name: work
            emptyDir:
              # Just the checkout + buildkit tmp now (the working set is on buildkit-cache).
              sizeLimit: 30Gi
          - name: buildkit-cache
            persistentVolumeClaim:
              claimName: image-builder-buildkit-cache
