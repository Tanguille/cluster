---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: external-service-httproute-scrutiny
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Scrutiny
    gethomepage.dev/description: Disk SMART monitoring
    gethomepage.dev/group: External
    gethomepage.dev/icon: scrutiny.png
    gethomepage.dev/widget.type: scrutiny
    gethomepage.dev/widget.url: https://scrutiny.${SECRET_DOMAIN}
    # external target — no pods to health-check
    gethomepage.dev/pod-selector: ""
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network

  hostnames:
    - scrutiny.${SECRET_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: external-scrutiny
          port: 80
