---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: external-service-httproute-ntopg
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: ntopng
    gethomepage.dev/description: Network traffic analysis
    gethomepage.dev/group: External
    gethomepage.dev/icon: ntopng.png
    # external target — no pods to health-check
    gethomepage.dev/pod-selector: ""
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network

  hostnames:
    - ntopg.${SECRET_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: internal-ntopg
          port: 80
