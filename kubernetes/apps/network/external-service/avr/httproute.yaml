---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: external-service-httproute-avr
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: AVR
    gethomepage.dev/group: External
    gethomepage.dev/icon: mdi-server-network
    # external target — no pods to health-check
    gethomepage.dev/pod-selector: ""
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network

  hostnames:
    - avr.${SECRET_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: internal-avr
          port: 80
