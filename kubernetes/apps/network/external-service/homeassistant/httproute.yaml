---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: external-service-httproute-homeassistant
  annotations:
    gatus.home-operations.com/endpoint: |-
      conditions: ["[STATUS] == 200"]
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Home Assistant
    gethomepage.dev/description: Home automation
    gethomepage.dev/group: Portals
    gethomepage.dev/icon: home-assistant.png
    # external target — no pods to health-check
    gethomepage.dev/pod-selector: ""
    gethomepage.dev/widget.type: homeassistant
    gethomepage.dev/widget.url: https://homeassistant.${SECRET_DOMAIN}
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_HOMEASSISTANT_TOKEN}}"
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
  hostnames:
    - homeassistant.${SECRET_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: external-homeassistant
          port: 80
