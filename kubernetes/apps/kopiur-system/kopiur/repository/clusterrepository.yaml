---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: kopia-nas
spec:
  allowedNamespaces:
    list:
      - ai
      - default
      - kopiur-system
      - media
  backend:
    filesystem:
      path: /repo
      volume:
        nfs:
          server: "${TRUENAS_IP}"
          path: ${BACKUP_NFS_PATH}
  encryption:
    passwordSecretRef:
      name: kopia-nas-password
      namespace: kopiur-system
      key: KOPIA_PASSWORD
  bootstrap:
    failurePolicy:
      activeDeadlineSeconds: 2700
  credentialProjection:
    allowed: true
  # NOT set on moverDefaults: moverDefaults.securityContext is baked onto
  # every mover's *container* securityContext, which always wins over the
  # per-app pod-level identity that inheritSecurityContextFrom.pvcConsumer
  # sets — silently clobbering source-PVC reads for any app whose real uid
  # isn't 568. Scoped to maintenance.mover instead, which has no PVC to
  # inherit from and so nothing to clobber.
  moverDefaults:
    securityContext:
      runAsGroup: 568
  maintenance:
    mover:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
  scheduleDefaults:
    timezone: ${TIMEZONE}
