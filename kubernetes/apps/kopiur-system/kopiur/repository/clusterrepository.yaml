---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: kopia-nas
spec:
  allowedNamespaces:
    list:
      - ai
      - default
      - kopiur-system
      - media
  backend:
    filesystem:
      path: /repo
      volume:
        nfs:
          server: "${TRUENAS_IP}"
          path: ${BACKUP_NFS_PATH}
  encryption:
    passwordSecretRef:
      name: kopia-nas-password
      namespace: kopiur-system
      key: KOPIA_PASSWORD
  bootstrap:
    failurePolicy:
      activeDeadlineSeconds: 2700
  credentialProjection:
    allowed: true
  # Adopting an existing repo needs deliberate, explicit ownership control
  # (Phase 3's standalone Maintenance CR) -- the operator's own
  # default-managed Maintenance (enabled: true by default) otherwise
  # auto-creates a competing object with the same name and keeps resetting
  # its schedule/ownership fields back over ours.
  maintenance:
    enabled: false
  moverDefaults:
    securityContext:
      runAsGroup: 568
  scheduleDefaults:
    timezone: ${TIMEZONE}
