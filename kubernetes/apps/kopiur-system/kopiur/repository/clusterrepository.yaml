---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: kopia-nas
spec:
  allowedNamespaces:
    list:
      - ai
      - default
      - kopiur-system
      - media
  backend:
    filesystem:
      path: /repo
      volume:
        nfs:
          server: "${TRUENAS_IP}"
          path: ${BACKUP_NFS_PATH}
  encryption:
    passwordSecretRef:
      name: kopia-nas-password
      namespace: kopiur-system
      key: KOPIA_PASSWORD
  bootstrap:
    failurePolicy:
      activeDeadlineSeconds: 2700
  credentialProjection:
    allowed: true
  # Explicit even though true is the schema default: the operator owns and
  # auto-manages Maintenance/kopia-nas (quick every 6h, full daily 03:00).
  # No standalone Maintenance CR alongside this one -- see Phase 3 in
  # docs/kopiur-migration-plan.md for why that used to fight this.
  maintenance:
    enabled: true
  moverDefaults:
    securityContext:
      runAsGroup: 568
  scheduleDefaults:
    timezone: ${TIMEZONE}
