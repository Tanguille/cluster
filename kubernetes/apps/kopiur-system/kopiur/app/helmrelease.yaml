---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopiur
spec:
  chartRef:
    kind: OCIRepository
    name: kopiur
  interval: 1h
  values:
    installScope: cluster # ClusterRepository needs ClusterRole
    # The controller pod itself needs direct NFS access to the repo, not just
    # the per-app movers — kopiur#137, filesystem Restore fails with
    # "/repo not mounted" without this. Confirmed by every NFS-backend adopter.
    extraVolumes:
      - name: repo
        nfs:
          server: "${TRUENAS_IP}"
          path: ${BACKUP_NFS_PATH}
    extraVolumeMounts:
      - name: repo
        mountPath: /repo
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
      fsGroupChangePolicy: OnRootMismatch
    features:
      credentialProjection:
        enabled: true # shared repo, movers in many namespaces
    monitoring:
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true # KopiurBackupStale et al. — live BEFORE any data moves
        # Chart default (172800s/48h) tolerates ~4 missed 12h backup cycles;
        # 86400s/24h (one full retry window) matches volsync's own
        # schedule-aware out-of-sync detection more closely.
        backupStaleAfterSeconds: 86400
      dashboards:
        enabled: true
