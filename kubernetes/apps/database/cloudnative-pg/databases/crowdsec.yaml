---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/postgresql.cnpg.io/database_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: crowdsec
spec:
  cluster:
    name: postgres16
  name: crowdsec
  owner: crowdsec
  ensure: present
  # Never drop the database if this CR is deleted/pruned — this is an adopted, live DB.
  databaseReclaimPolicy: retain
  # Keep CrowdSec's vector extension aligned with the pinned operand image.
  extensions:
    - name: vector
      ensure: present
      version: "0.8.5"
