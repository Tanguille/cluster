---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/postgresql.cnpg.io/database_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: postgres
spec:
  cluster:
    name: postgres16
  name: postgres
  owner: postgres
  ensure: present
  # Deletion must not drop this adopted live default DB.
  databaseReclaimPolicy: retain
  extensions:
    - name: vector
      ensure: present
      version: "0.8.5"
