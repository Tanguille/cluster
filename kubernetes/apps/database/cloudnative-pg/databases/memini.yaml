---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/postgresql.cnpg.io/database_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: memini
spec:
  cluster:
    name: postgres16
  name: memini
  owner: memini
  ensure: present
  # Never drop the database if this CR is deleted/pruned — this is an adopted, live DB.
  databaseReclaimPolicy: retain
  # Keep vchord and vector paired; Memini's live vchordrq indexes require both.
  extensions:
    - name: vchord
      ensure: present
      version: "1.1.1"
    - name: vector
      ensure: present
      version: "0.8.5"
