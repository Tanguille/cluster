---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/postgresql.cnpg.io/database_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: memini
spec:
  cluster:
    name: postgres16
  name: memini
  owner: memini
  ensure: present
  # Never drop the database if this CR is deleted/pruned — this is an adopted, live DB.
  databaseReclaimPolicy: retain
  # Adopt the vector extensions already present in this DB (declared by name only,
  # no version pin, so CNPG keeps the installed version).
  extensions:
    - name: vchord
      ensure: present
    - name: vector
      ensure: present
