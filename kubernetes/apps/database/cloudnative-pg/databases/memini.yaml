---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/postgresql.cnpg.io/database_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: memini
spec:
  cluster:
    name: postgres16
  name: memini
  owner: memini
  # Never drop the database if this CR is deleted/pruned — this is an adopted, live DB.
  databaseReclaimPolicy: retain
  # Keep vchord and vector paired; Memini's live vchordrq indexes require both.
  # vchord version is Renovate-tracked with the cluster's vchord-scratch image;
  # vector is the pgvector bundled in that image — bump manually when the image bumps.
  # A wrong pin fails visibly: CNPG reports the Database CR not-Ready on ALTER EXTENSION.
  extensions:
    - name: vchord
      version: "1.1.1"
    - name: vector
      version: "0.8.5"
