---
# yaml-language-server: $schema=https://raw.githubusercontent.com/cloudnative-pg/charts/refs/heads/main/charts/cluster/values.schema.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres16
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-standard-trixie@sha256:77c63fce273e7af67d59c49026604e7eca9f2dc69066ce7045db600d99c6bf1e
  instances: 3
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover
  storage:
    size: 20Gi
    storageClass: openebs-hostpath
  superuserSecret:
    name: cloudnative-pg-secret
  enableSuperuserAccess: true
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: 1GB
      effective_cache_size: 4GB
      huge_pages: "try"
      # io_method: "io_uring" # Blocked by default K8s/containerd seccomp profile (see cloudnative-pg/cloudnative-pg#9948). worker = safe default.
      io_method: "worker"
      # work_mem: 200 conn × 12MB × 1 op ≈ 2.4GB peak; fits in 8Gi. Heavy 2-op bursts can spike; SET work_mem per session if needed.
      work_mem: 12MB
      maintenance_work_mem: 1GB # Vector/pgvector index builds and autovacuum; raise per-session for huge CREATE INDEX
      max_parallel_maintenance_workers: "8" # Faster CREATE INDEX (pgvector HNSW, vchord vchordrq); default 2
      max_parallel_workers_per_gather: "4" # Parallel vector/search queries when not index-only; default 2
      # WAL tuning for fewer checkpoints/archives
      min_wal_size: 2GB
      max_wal_size: 8GB
      checkpoint_timeout: 15min
      checkpoint_completion_target: "0.9"
      checkpoint_warning: "60" # Seconds; log if checkpoints happen closer (increase max_wal_size if frequent)
      wal_compression: "zstd"
      wal_buffers: 64MB
      # Autovacuum tuned for many small/medium DBs with XID age protection
      autovacuum_vacuum_scale_factor: "0.02"
      autovacuum_analyze_scale_factor: "0.01"
      autovacuum_vacuum_threshold: "50"
      autovacuum_analyze_threshold: "25"
      autovacuum_vacuum_cost_limit: "2000" # Default 200; higher = faster autovacuum (NVMe can take it)
      autovacuum_vacuum_cost_delay: "1ms" # Default 2ms; lower on NVMe so autovacuum finishes sooner
      autovacuum_freeze_max_age: "100000000"
      vacuum_freeze_min_age: "50000000"
      vacuum_freeze_table_age: "75000000"
      default_statistics_target: "200"
      random_page_cost: "1.1" # Default 4.0 (HDD-oriented); 1.1 favors index scans on NVMe
      effective_io_concurrency: "200" # Default 16, increased for NVMe parallelism
      maintenance_io_concurrency: "200" # VACUUM/ANALYZE/CREATE INDEX parallelism on NVMe
    # Extensions: vchord needs shared_preload_libraries; CNPG sets logging_collector=on (vchord logs). Per-session: hnsw.ef_search (pgvector), vchordrq.probes / vchordrq.epsilon (vchord).
    shared_preload_libraries:
      - "vchord.so"
    extensions:
      - name: vchord
        image:
          # renovate: datasource=docker depName=ghcr.io/tensorchord/vchord-scratch
          reference: ghcr.io/tensorchord/vchord-scratch:pg18-v1.0.0
      - name: vector
        image:
          # renovate: datasource=docker depName=ghcr.io/tensorchord/vchord-scratch
          reference: ghcr.io/tensorchord/vchord-scratch:pg18-v1.0.0
        dynamic_library_path:
          - /usr/lib/postgresql/18/lib
        extension_control_path:
          - /usr/share/postgresql/18/
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  resources:
    requests:
      cpu: 300m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 8Gi
      hugepages-2Mi: 1Gi
  monitoring:
    enablePodMonitor: true
  plugins:
    - name: &plugin barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters: &barmanParameters
        barmanObjectName: ceph-objectstore
        # Note: serverName version needs to be incremented
        # when recovering from an existing cnpg cluster
        serverName: postgres18
  # Note: previousCluster needs to be set to the name of the previous
  # cluster when recovering from an existing cnpg cluster
  bootstrap:
    recovery:
      source: &previousCluster postgres18
  # Note: externalClusters is needed when recovering from an existing cnpg cluster
  externalClusters:
    - name: *previousCluster
      plugin:
        enabled: true
        isWALArchiver: false
        name: *plugin
        parameters: *barmanParameters
