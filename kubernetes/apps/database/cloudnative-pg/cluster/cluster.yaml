---
# yaml-language-server: $schema=https://raw.githubusercontent.com/cloudnative-pg/charts/refs/heads/main/charts/cluster/values.schema.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres16
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-standard-trixie@sha256:d6f5ab6e8275f0eecf342e1bb8651fa0b428c23e9d743deb481aa3afd0cce397
  instances: 3
  primaryUpdateMethod: switchover
  storage:
    size: 30Gi
    storageClass: openebs-hostpath
  superuserSecret:
    name: cloudnative-pg-secret
  enableSuperuserAccess: true
  postgresql:
    parameters:
      wal_level: replica
      # Cluster-wide cap: backends stack per database + overlap if one DB uses both rw poolers.
      # Keep above Σ(pooler instances × max_db_connections) for worst-case same-DB paths + replication/autovacuum/admin.
      max_connections: "150"
      shared_buffers: 1GB
      effective_cache_size: 4GB
      huge_pages: "try"
      # io_method: "io_uring" # Blocked by default K8s/containerd seccomp profile (see cloudnative-pg/cloudnative-pg#9948). worker = safe default.
      io_method: "worker"
      work_mem: 16MB
      # End idle-in-xact sessions so xmin can advance (ORM leaks, forgotten BEGIN).
      idle_in_transaction_session_timeout: "600000"
      # Peak maintenance memory ≈ maintenance_work_mem × max_parallel_maintenance_workers (here ~1GB).
      maintenance_work_mem: 512MB
      max_parallel_workers: "4"
      max_parallel_maintenance_workers: "2"
      max_parallel_workers_per_gather: "4"
      # WAL tuning for fewer checkpoints/archives
      min_wal_size: 2GB
      max_wal_size: 8GB
      checkpoint_timeout: 15min
      checkpoint_completion_target: "0.9"
      # Seconds; log if checkpoints occur more often than this (raise max_wal_size if noisy).
      checkpoint_warning: "60"
      wal_compression: "zstd"
      wal_buffers: 32MB
      # Many small DBs: more aggressive autovacuum + freeze than defaults.
      autovacuum_vacuum_scale_factor: "0.02"
      autovacuum_analyze_scale_factor: "0.01"
      autovacuum_vacuum_threshold: "50"
      autovacuum_analyze_threshold: "25"
      # Insert-heavy tables: vacuum sooner on insert fraction (visibility / freeze).
      autovacuum_vacuum_insert_scale_factor: "0.05"
      # Higher limit / lower delay than defaults to finish autovacuum sooner on NVMe.
      autovacuum_vacuum_cost_limit: "2000"
      autovacuum_vacuum_cost_delay: "1ms"
      autovacuum_freeze_max_age: "100000000"
      vacuum_freeze_min_age: "50000000"
      vacuum_freeze_table_age: "75000000"
      default_statistics_target: "200"
      # NVMe-oriented planner / I/O (lower random_page_cost, higher *_io_concurrency).
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      maintenance_io_concurrency: "200"
      # Listed in shared_preload_libraries below; first enable rolls the cluster.
      pg_stat_statements.max: "7500"
      pg_stat_statements.track: "top"
    # vchord.so required for vchord; pg_stat_statements matches parameters above.
    shared_preload_libraries:
      - "vchord.so"
      - "pg_stat_statements"
    extensions:
      - name: vchord
        image:
          # renovate: datasource=docker depName=ghcr.io/tensorchord/vchord-scratch
          reference: ghcr.io/tensorchord/vchord-scratch:pg18-v1.1.1
      - name: vector
        image:
          # renovate: datasource=docker depName=ghcr.io/tensorchord/vchord-scratch
          reference: ghcr.io/tensorchord/vchord-scratch:pg18-v1.1.1
        dynamic_library_path:
          - /usr/lib/postgresql/18/lib
        extension_control_path:
          - /usr/share/postgresql/18/
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  resources:
    requests:
      cpu: 1
      memory: 512Mi
    limits:
      cpu: 4
      memory: 3Gi
      hugepages-2Mi: 1Gi
  monitoring:
    enablePodMonitor: true
  plugins:
    - name: &plugin barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters: &barmanParameters
        barmanObjectName: r2
        # Bump when restoring from an existing CNPG cluster (new logical server id for backups).
        serverName: postgres18
  # Recovery from prior cluster: set previousCluster, uncomment bootstrap + externalClusters, align serverName.
  # bootstrap:
  #   recovery:
  #     source: &previousCluster postgres18
  # externalClusters:
  #   - name: *previousCluster
  #     plugin:
  #       enabled: true
  #       isWALArchiver: false
  #       name: *plugin
  #       parameters: *barmanParameters
