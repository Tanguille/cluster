---
# Transaction-mode RW PgBouncer → primary. Per pod, max_db_connections caps server conns
# to one Postgres database (PgBouncer docs). Through this Pooler only: up to
# instances × max_db_connections per DB; multiple DBs on the primary add separately.
# Same DB via rw + session poolers: add each pooler's (instances × max_db_connections).
# Recalculate when instances or max_db_connections change. RO pooler does not use primary slots.
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pgbouncer-rw
spec:
  cluster:
    name: postgres16
  instances: 3
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "1000"
      default_pool_size: "15"
      min_pool_size: "0"
      max_db_connections: "22"
      reserve_pool_size: "4"
      reserve_pool_timeout: "3"
      server_idle_timeout: "120"
      server_login_retry: "5"
      query_wait_timeout: "15"
      application_name_add_host: "1"
