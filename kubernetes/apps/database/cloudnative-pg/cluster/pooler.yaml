---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pgbouncer-rw
spec:
  cluster:
    name: postgres16
  instances: 3
  type: rw
  pgbouncer:
    poolMode: transaction
    # PgBouncer: max_db_connections = max server conns to *one* Postgres database
    # name from *this* pod (see pgbouncer.org/config — max_db_connections).
    # Per database, worst case through this Pooler = instances × max_db_connections
    # (each pod is a separate process with its own cap).
    #
    # Cluster max_connections counts *all* databases on the primary; total backends
    # = sum over DBs. These caps limit each DB through *this* pooler only; they do
    # not add with pgbouncer-ro (standbys). Multiple databases on the primary still
    # stack toward max_connections independently.
    #
    # Overlap with pgbouncer-session (both rw → primary): same logical DB opened via
    # both poolers sums per-pool ceilings: Σ (that pooler's instances × max_db_connections).
    # Recalculate whenever spec.instances or max_db_connections changes on either pooler.
    # Exclusive use of only this service per DB: peak ≤ instances × max_db_connections here.
    parameters:
      max_client_conn: "1000"
      default_pool_size: "12"
      min_pool_size: "0"
      max_db_connections: "18"
      reserve_pool_size: "3"
      reserve_pool_timeout: "3"
      server_idle_timeout: "120"
      server_login_retry: "5"
      query_wait_timeout: "5"
      application_name_add_host: "1"
