---
# Transaction-mode RO PgBouncer → replicas only (no primary max_connections usage).
# Per logical DB: up to instances × max_db_connections server conns from this deployment.
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pgbouncer-ro
spec:
  cluster:
    name: postgres16
  instances: 2
  type: ro
  # Same protections as pgbouncer-rw: out of BestEffort (Talos OOM controller
  # kills request-less pods first) and spread across nodes.
  template:
    spec:
      containers:
        - name: pgbouncer
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 256Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              cnpg.io/poolerName: pgbouncer-ro
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "1000"
      default_pool_size: "18"
      min_pool_size: "0"
      max_db_connections: "32"
      reserve_pool_size: "5"
      reserve_pool_timeout: "3"
      server_idle_timeout: "120"
      server_login_retry: "5"
      query_wait_timeout: "15"
      application_name_add_host: "1"
