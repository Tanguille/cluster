---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pgbouncer-ro
spec:
  cluster:
    name: postgres16
  instances: 2
  type: ro
  pgbouncer:
    poolMode: transaction
    # Targets read replicas (not the primary), so connections do not consume primary
    # max_connections slots. Per logical DB through this Pooler deployment:
    # instances × max_db_connections (each pod is its own PgBouncer process).
    parameters:
      max_client_conn: "1000"
      default_pool_size: "15"
      min_pool_size: "0"
      max_db_connections: "25"
      reserve_pool_size: "5"
      reserve_pool_timeout: "3"
      server_idle_timeout: "120"
      server_login_retry: "5"
      query_wait_timeout: "5"
      application_name_add_host: "1"
