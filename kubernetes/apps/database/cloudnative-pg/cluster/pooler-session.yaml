---
# Session-mode RW pooler for apps that cannot use transaction pooling (e.g. Ecto named
# prepared statements). Service: pgbouncer-session.database.svc.cluster.local:5432
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pgbouncer-session
spec:
  cluster:
    name: postgres16
  instances: 3
  type: rw
  pgbouncer:
    poolMode: session
    parameters:
      max_client_conn: "1000"
      default_pool_size: "50"
      server_idle_timeout: "300"
      server_login_retry: "5"
      query_wait_timeout: "5"
      application_name_add_host: "1"
