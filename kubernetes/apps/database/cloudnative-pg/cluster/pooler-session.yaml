---
# Session-mode RW pooler (prepared statements, advisory locks, etc.). Service:
# pgbouncer-session.database.svc.cluster.local:5432 — same primary as pgbouncer-rw.
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pgbouncer-session
spec:
  cluster:
    name: postgres16
  instances: 2
  type: rw
  pgbouncer:
    poolMode: session
    # Per-DB server cap through this deployment ≈ instances × max_db_connections below.
    parameters:
      max_client_conn: "800"
      default_pool_size: "12"
      min_pool_size: "0"
      max_db_connections: "14"
      server_idle_timeout: "300"
      server_login_retry: "5"
      query_wait_timeout: "15"
      application_name_add_host: "1"
