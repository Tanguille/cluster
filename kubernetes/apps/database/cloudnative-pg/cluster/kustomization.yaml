---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cluster.yaml
  - objectstore.yaml
  - pooler.yaml
  - pooler-ro.yaml
  - pooler-session.yaml
  - prometheusrule.yaml
  - scheduledbackup.yaml
  # Basic-auth Secrets backing spec.managed.roles in cluster.yaml (one per adopted app), kept
  # here so each role reconciles with its secret present. The Database CR itself lives in
  # ../databases (separate Kustomization) so a DB-provisioning hiccup can't stall the shared
  # cluster Kustomization (wait: true).
  - secret.sops.yaml
  - roles/jellystat.sops.yaml
  - roles/radarr.sops.yaml
  - roles/bazarr.sops.yaml
  - roles/sonarr.sops.yaml
  - roles/prowlarr.sops.yaml
  - roles/memini.sops.yaml
