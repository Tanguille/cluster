---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cluster.yaml
  - objectstore.yaml
  - pooler.yaml
  - pooler-ro.yaml
  - pooler-session.yaml
  - prometheusrule.yaml
  - scheduledbackup.yaml
  # Role password for the managed.roles entry in cluster.yaml (kept here so the role reconciles
  # with its secret present). The Database CR itself lives in ../databases (separate Kustomization)
  # so a DB-provisioning hiccup can't stall the shared cluster Kustomization (wait: true).
  - litellm-db-secret.sops.yaml
