---
# 2026-07-23 outage: scheduler found no preemption victims 126x; 75/81 Pending
# pods had no priorityClassName, so exporters outranked vmagent/vmalert/grafana.
# Unclassified pods stay at 0, so this class alone restores the ordering.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: homelab-critical
value: 500000
description: "Infrastructure whose loss blinds or breaks the cluster: monitoring pipeline, databases, poolers, gateways"
