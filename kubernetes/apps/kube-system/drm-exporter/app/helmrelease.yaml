---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: drm-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: drm-exporter
  interval: 1h
  values:
    dra:
      enabled: true
      deviceClassName: gpu.amd.com
    securityContext:
      capabilities:
        add:
          - PERFMON
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: amd.com/gpu
                  operator: In
                  values: ["true"]
            - matchExpressions:
                - key: amd.com/igpu
                  operator: In
                  values: ["true"]
    monitoring:
      serviceMonitor:
        enabled: true
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          folder: hardware
          matchLabels:
            grafana.internal/instance: grafana
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 128Mi
