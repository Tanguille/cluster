---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: generic-device-plugin
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      priorityClassName: system-node-critical

    controllers:
      generic-device-plugin:
        type: daemonset
        pod:
          nodeSelector:
            amd.com/gpu: "true"
        containers:
          app:
            image: &devicePluginImage
              repository: ghcr.io/squat/generic-device-plugin
              tag: latest@sha256:dc192e164c69b03f156765793a1be62ca437709ae477b27ca7d8f3dcf5021576
            args:
              - --domain=squat.ai
              - --device
              - |
                name: dri
                groups:
                  - count: 4
                    paths:
                      - path: /dev/dri
                      - path: /dev/kfd
            securityContext: &devicePluginSecurityContext
              privileged: true
            resources: &devicePluginResources
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 64Mi
      # count is temporarily 2 for the llama-embeddings -> llmkube embedding
      # cutover (validate both on the iGPU); revert to 1 once qwen3-embedding
      # is live and llama-embeddings is removed.
      generic-device-plugin-igpu:
        type: daemonset
        pod:
          nodeSelector:
            amd.com/igpu: "true"
        containers:
          app:
            image: *devicePluginImage
            args:
              - --domain=squat.ai
              - --device
              - |
                name: dri
                groups:
                  - count: 2
                    paths:
                      - path: /dev/dri
            securityContext: *devicePluginSecurityContext
            resources: *devicePluginResources

    persistence:
      dev:
        type: hostPath
        hostPath: /dev
        globalMounts:
          - path: /dev
      device-plugin:
        type: hostPath
        hostPath: /var/lib/kubelet/device-plugins
        globalMounts:
          - path: /var/lib/kubelet/device-plugins
