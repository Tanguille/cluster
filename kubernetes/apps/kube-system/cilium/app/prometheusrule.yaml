---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cilium-loadbalancer-rules
  labels:
    app.kubernetes.io/name: cilium
spec:
  groups:
    - name: cilium.loadbalancer.rules
      interval: 30s
      rules:
        - alert: LoadBalancerIPUnreachable
          expr: |
            probe_success{job="probe/loadbalancer-ips",service="blackbox-exporter"} == 0
          for: 5m
          annotations:
            summary: LoadBalancer IP {{ $labels.instance }} is unreachable
            description: >-
              LoadBalancer IP {{ $labels.instance }} has been unreachable for more than 5 minutes.
              This may indicate a Cilium L2 announcement issue after node restarts.
          labels:
            severity: critical
            component: cilium
            type: loadbalancer

        - alert: LoadBalancerIPNotAnnounced
          expr: |
            (
              probe_success{job="probe/loadbalancer-ips",service="blackbox-exporter"} == 0
              and
              kube_service_status_load_balancer_ingress{namespace="network"} == 1
            )
          for: 10m
          annotations:
            summary: LoadBalancer IP {{ $labels.instance }} is assigned but not reachable
            description: >-
              LoadBalancer IP {{ $labels.instance }} is assigned to a service but not reachable.
              This likely indicates a Cilium L2 announcement failure. Check Cilium operator logs.
          labels:
            severity: critical
            component: cilium
            type: loadbalancer

    - name: cilium.bpf.rules
      rules:
        - alert: CiliumCTMapPressureHigh
          expr: |
            max(cilium_bpf_map_pressure) > 0.7
          for: 15m
          annotations:
            summary: Cilium BPF map {{ $labels.map_name }} pressure above 70% for 15 minutes
            description: >-
              Connection-tracking or related BPF map pressure has stayed above 70% for 15 minutes.
              PR #3662 fixed CT map sizing; sustained high pressure means it needs revisiting.
          labels:
            severity: warning
            component: cilium
            type: bpf-map
