---
# 2026-07-23 outage: scheduler found no preemption victims 126x; 75/81 Pending
# pods had no priorityClassName, so exporters outranked vmagent/vmalert/vmauth/
# vmsingle. Unclassified pods stay at 0, so this class alone restores ordering.
# Only the metrics pipeline is on it so far; grafana and the databases that also
# went Pending are a follow-up.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: homelab-critical
value: 500000
description: "Infrastructure whose loss blinds or breaks the cluster: monitoring pipeline, databases, poolers, gateways"
