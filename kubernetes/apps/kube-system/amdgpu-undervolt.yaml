---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: amdgpu-undervolt
  labels:
    app.kubernetes.io/name: amdgpu-undervolt
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: amdgpu-undervolt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amdgpu-undervolt
    spec:
      priorityClassName: system-node-critical
      nodeSelector:
        amd.com/gpu: "true"
      tolerations:
        - operator: Exists
      containers:
        - name: app
          image: ghcr.io/home-operations/busybox:1.38.0@sha256:7e2c04dd50ede647bf4a7a4c8dbd629dd4971cd139b9b88fb22bfc3c7a6c13df
          imagePullPolicy: IfNotPresent
          env:
            - name: VOLTAGE_OFFSET_MV
              value: "-82"
            - name: POWER_LIMIT_WATTS
              value: "225"
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              SYSFS_ROOT=/host-sys/class/drm
              POWER_LIMIT_UW=$((POWER_LIMIT_WATTS * 1000000))

              log() {
                printf '%s %s\n' "$(date '+%Y-%m-%dT%H:%M:%S%z')" "$*"
              }

              apply_gpu_tuning() {
                card="$1"
                card_name=$(basename "$(dirname "$card")")
                od="$card/pp_od_clk_voltage"
                perf="$card/power_dpm_force_performance_level"

                if [ -w "$perf" ] && [ -w "$od" ]; then
                  echo manual > "$perf"
                  echo "vo $${VOLTAGE_OFFSET_MV}" > "$od"
                  echo c > "$od"
                  applied_mv=$(tr -d '\000' < "$od" | awk '/OD_VDDGFX_OFFSET:/{getline; gsub(/[^0-9-]/,""); print; exit}')
                  if [ "$applied_mv" = "$VOLTAGE_OFFSET_MV" ]; then
                    log "set $${card_name} VDDGFX offset to $${VOLTAGE_OFFSET_MV}mV"
                  else
                    log "VDDGFX offset failed for $${card_name}: wanted $${VOLTAGE_OFFSET_MV}mV, got $${applied_mv:-unknown}mV"
                  fi
                else
                  log "skipping VDDGFX offset for $${card_name}: pp_od or perf level not writable"
                fi

                for cap in "$card"/hwmon/hwmon*/power1_cap; do
                  [ -e "$cap" ] || continue
                  [ -w "$cap" ] || continue

                  min_file="$${cap}_min"
                  max_file="$${cap}_max"
                  if [ -r "$min_file" ] && [ "$POWER_LIMIT_UW" -lt "$(cat "$min_file")" ]; then
                    log "requested $${POWER_LIMIT_WATTS}W is below minimum for $cap; skipping"
                    continue
                  fi
                  if [ -r "$max_file" ] && [ "$POWER_LIMIT_UW" -gt "$(cat "$max_file")" ]; then
                    log "requested $${POWER_LIMIT_WATTS}W is above maximum for $cap; skipping"
                    continue
                  fi

                  echo "$POWER_LIMIT_UW" > "$cap"
                  log "set $${card_name} power limit to $${POWER_LIMIT_WATTS}W via $cap"
                  return 0
                done

                log "no writable power1_cap found under $card"
              }

              attempts=0
              while [ "$attempts" -lt 120 ]; do
                for card in "$SYSFS_ROOT"/card[0-9]/device; do
                  [ -d "$card" ] || continue
                  vendor="$card/vendor"
                  if [ ! -r "$vendor" ]; then
                    continue
                  fi
                  read -r vendor_id < "$vendor" || continue
                  [ "$vendor_id" = "0x1002" ] || continue

                  apply_gpu_tuning "$card"
                  exec sleep infinity
                done

                attempts=$((attempts + 1))
                log "waiting for AMD DRM devices under $SYSFS_ROOT"
                sleep 5
              done

              log "timed out waiting for AMD GPU under $SYSFS_ROOT"
              exit 1
          securityContext:
            privileged: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: true
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              memory: 32Mi
          volumeMounts:
            - name: sys
              mountPath: /host-sys
      volumes:
        - name: sys
          hostPath:
            path: /sys
            type: Directory
