---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: amdgpu-undervolt
  labels:
    app.kubernetes.io/name: amdgpu-undervolt
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: amdgpu-undervolt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amdgpu-undervolt
    spec:
      priorityClassName: system-node-critical
      nodeSelector:
        amd.com/gpu: "true"
      tolerations:
        - operator: Exists
      containers:
        - name: app
          image: ghcr.io/home-operations/busybox:1.38.0@sha256:7e2c04dd50ede647bf4a7a4c8dbd629dd4971cd139b9b88fb22bfc3c7a6c13df
          imagePullPolicy: IfNotPresent
          env:
            - name: VOLTAGE_OFFSET_MV
              value: "-82"
            # Measured sweep, uncontended, TG read from sglang's own counter:
            #   210W -> 1027 PP / 23.09 TG   250W -> 1184 PP / 23.24 TG
            #   290W -> 1150 PP / 27.80 TG   330W -> 1301 PP / 23.29 TG (drew 313)
            # Decode is bandwidth-bound and flat at ~23 across the whole range, so
            # watts only buy prefill. 250 takes +15% PP for 2.8% worse PP/W; 330
            # takes +27% for 15% worse. 210 remains the best tok/W on both metrics.
            - name: POWER_LIMIT_WATTS
              value: "250"
            # Measured sweep at 209W, 60s avg per point: 82C->3274rpm/mem 80C,
            # 78->3396/83, 75->3549/70, 72->3960/80, 70->4201/77. Fan tracks the
            # target cleanly but mem barely moves across the band, so this buys
            # noise, not cooling - 70 was +36% rpm over the 3088rpm stock average
            # for ~3C. 82 keeps the controller engaged at +6%. Card has never been
            # within 6C of its own 108C mem crit. Auto-mode scalars, NOT fan_curve
            # (full OverDriveTable, driver 0x2E vs PMFW 0x32 mismatch on this SKU).
            - name: FAN_TARGET_TEMP_C
              value: "82"
            - name: ACOUSTIC_TARGET_RPM
              value: "4000"
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              SYSFS_ROOT=/host-sys/class/drm
              POWER_LIMIT_UW=$((POWER_LIMIT_WATTS * 1000000))

              log() {
                printf '%s %s\n' "$(date '+%Y-%m-%dT%H:%M:%S%z')" "$*"
              }

              apply_fan_setting() {
                node="$1"
                want="$2"
                node_name=$(basename "$node")

                if [ ! -w "$node" ]; then
                  log "skipping $${node_name}: not writable"
                  return
                fi

                echo "$want" > "$node"
                echo c > "$node"
                got=$(tr -d '\000' < "$node" | awk 'NR==2{print $1; exit}')
                if [ "$got" = "$want" ]; then
                  log "set $${node_name} to $${want}"
                else
                  log "$${node_name} failed: wanted $${want}, got $${got:-unknown}"
                fi
              }

              apply_gpu_tuning() {
                card="$1"
                card_name=$(basename "$(dirname "$card")")
                od="$card/pp_od_clk_voltage"
                perf="$card/power_dpm_force_performance_level"
                fan_ctrl="$card/gpu_od/fan_ctrl"

                if [ -w "$perf" ] && [ -w "$od" ]; then
                  echo manual > "$perf"
                  echo "vo $${VOLTAGE_OFFSET_MV}" > "$od"
                  echo c > "$od"
                  applied_mv=$(tr -d '\000' < "$od" | awk '/OD_VDDGFX_OFFSET:/{getline; gsub(/[^0-9-]/,""); print; exit}')
                  if [ "$applied_mv" = "$VOLTAGE_OFFSET_MV" ]; then
                    log "set $${card_name} VDDGFX offset to $${VOLTAGE_OFFSET_MV}mV"
                  else
                    log "VDDGFX offset failed for $${card_name}: wanted $${VOLTAGE_OFFSET_MV}mV, got $${applied_mv:-unknown}mV"
                  fi
                else
                  log "skipping VDDGFX offset for $${card_name}: pp_od or perf level not writable"
                fi

                apply_fan_setting "$fan_ctrl/fan_target_temperature" "$FAN_TARGET_TEMP_C"
                apply_fan_setting "$fan_ctrl/acoustic_target_rpm_threshold" "$ACOUSTIC_TARGET_RPM"

                for cap in "$card"/hwmon/hwmon*/power1_cap; do
                  [ -e "$cap" ] || continue
                  [ -w "$cap" ] || continue

                  min_file="$${cap}_min"
                  max_file="$${cap}_max"
                  if [ -r "$min_file" ] && [ "$POWER_LIMIT_UW" -lt "$(cat "$min_file")" ]; then
                    log "requested $${POWER_LIMIT_WATTS}W is below minimum for $cap; skipping"
                    continue
                  fi
                  if [ -r "$max_file" ] && [ "$POWER_LIMIT_UW" -gt "$(cat "$max_file")" ]; then
                    log "requested $${POWER_LIMIT_WATTS}W is above maximum for $cap; skipping"
                    continue
                  fi

                  echo "$POWER_LIMIT_UW" > "$cap"
                  log "set $${card_name} power limit to $${POWER_LIMIT_WATTS}W via $cap"
                  return 0
                done

                log "no writable power1_cap found under $card"
              }

              attempts=0
              while [ "$attempts" -lt 120 ]; do
                for card in "$SYSFS_ROOT"/card[0-9]/device; do
                  [ -d "$card" ] || continue
                  vendor="$card/vendor"
                  if [ ! -r "$vendor" ]; then
                    continue
                  fi
                  read -r vendor_id < "$vendor" || continue
                  [ "$vendor_id" = "0x1002" ] || continue

                  apply_gpu_tuning "$card"
                  exec sleep infinity
                done

                attempts=$((attempts + 1))
                log "waiting for AMD DRM devices under $SYSFS_ROOT"
                sleep 5
              done

              log "timed out waiting for AMD GPU under $SYSFS_ROOT"
              exit 1
          securityContext:
            privileged: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: true
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              memory: 32Mi
          volumeMounts:
            - name: sys
              mountPath: /host-sys
      volumes:
        - name: sys
          hostPath:
            path: /sys
            type: Directory
