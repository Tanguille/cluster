---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-gpu-dra-driver
spec:
  chartRef:
    kind: OCIRepository
    name: k8s-gpu-dra-driver
  interval: 1h
  values:
    kubeletPlugin:
      # dGPU (control-1) and iGPU nodes (control-2/3); skip nodes without amdgpu.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: amd.com/gpu
                    operator: In
                    values: ["true"]
              - matchExpressions:
                  - key: amd.com/igpu
                    operator: In
                    values: ["true"]
