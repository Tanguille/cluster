---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: p2pool
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      p2pool:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/sethforprivacy/p2pool
              tag: v4.17.1@sha256:67e84e4b8aa11e7bfa20767b01f4f71830e3891f717b4ca354214cfd4d5c9a67
            args:
              - "--host"
              - "monerod.web3.svc.cluster.local"
              - "--rpc-port"
              - "18089"
              - "--loglevel"
              - "4"
              - "--wallet"
              - "$(P2POOL_WALLET_ADDRESS)"
              - "--stratum"
              - "0.0.0.0:3333"
              - "--nano"
              - "--p2p"
              - "0.0.0.0:37890"
              - "--addpeers"
              - "65.21.227.114:37890,168.119.137.28:37890"
              - "--out-peers"
              - "32"
              - "--in-peers"
              - "64"
              - "--light-mode"
              - "--data-api"
              - "/var/lib/p2pool/api"
              - "--local-api"
            env:
              - name: P2POOL_WALLET_ADDRESS
                valueFrom:
                  secretKeyRef:
                    name: p2pool-wallet
                    key: address
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 550Mi
              limits:
                cpu: 500m
                memory: 2Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &stratum 3333
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *stratum
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *stratum
                  failureThreshold: 30
                  periodSeconds: 5
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      p2pool:
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          lbipam.cilium.io/ips: ${P2POOL_IP}
        loadBalancerSourceRanges:
          - ${LAN_CIDR}
        ports:
          stratum:
            port: *stratum
          p2p:
            port: 37890
    persistence:
      data:
        storageClass: ceph-filesystem
        accessMode: ReadWriteMany
        size: 10Gi
        retain: true
        globalMounts:
          - path: /home/p2pool
      shared-api-data:
        storageClass: ceph-filesystem
        accessMode: ReadWriteMany
        size: 1Gi
        globalMounts:
          - path: /var/lib/p2pool/api
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
