---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: monerod
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      monerod:
        containers:
          app:
            image:
              repository: ghcr.io/sethforprivacy/simple-monerod
              tag: v0.18.5.1@sha256:086eeb95174223ed166915d9f93dcfe4a7699efb89a30ca1569153dbf4f65f02
            args:
              - "--data-dir=/home/monero/.bitmonero"
              - "--log-file=/var/log/monero/monerod.log"
              - "--rpc-restricted-bind-ip=0.0.0.0"
              - "--rpc-restricted-bind-port=18089"
              - "--log-level=2"
              - "--no-igd"
              - "--fast-block-sync=1"
              - "--zmq-pub=tcp://0.0.0.0:18083"
              - "--enforce-dns-checkpointing"
              - "--enable-dns-blocklist"
              - "--out-peers=32"
              - "--in-peers=64"
              - "--add-priority-node=p2pmd.xmrvsbeast.com:18080"
              - "--add-priority-node=nodes.hashvault.pro:18080"
              - "--prune-blockchain"
              - "--sync-pruned-blocks"
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 1Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /get_info
                    port: 18089
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /get_info
                    port: 18089
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /get_info
                    port: 18089
                  failureThreshold: 60
                  periodSeconds: 10
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      monerod:
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          lbipam.cilium.io/ips: ${MONEROD_IP}
        loadBalancerSourceRanges:
          - ${LAN_CIDR}
        ports:
          p2p:
            port: 18080
          rpc:
            port: 18089
          zmq:
            port: 18083
    persistence:
      data:
        storageClass: ceph-block
        accessMode: ReadWriteOnce
        size: 150Gi
        retain: true
        globalMounts:
          - path: /home/monero/.bitmonero
      logs:
        type: emptyDir
        globalMounts:
          - path: /var/log/monero
