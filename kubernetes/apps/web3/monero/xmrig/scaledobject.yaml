---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/keda.sh/scaledobject_v1alpha1.json
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: xmrig
  labels:
    app.kubernetes.io/name: xmrig
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: xmrig
  minReplicaCount: 0
  maxReplicaCount: 3 # One miner per node (3 nodes total)
  cooldownPeriod: 0 # Guard dwell already debounces trips and recovery
  pollingInterval: 60 # Check every 60 seconds
  fallback:
    # A VictoriaMetrics/scaler error is unsafe: do not keep miners running on stale state.
    failureThreshold: 1
    replicas: 0
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          # Scale down more quickly when solar power drops
          stabilizationWindowSeconds: 180 # 3 minutes (reduced from 5)
          policies:
            - type: Pods
              value: 1
              periodSeconds: 60
        scaleUp:
          # Scale up quickly when solar power is available
          stabilizationWindowSeconds: 60 # 1 minute before scaling up
          policies:
            # Percent 100 dominates a Pods-1 policy at every reachable replica count
            - type: Percent
              value: 100
              periodSeconds: 60
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://vmsingle-victoria-metrics.observability.svc.cluster.local:8428
        # Preserve the 15-minute solar average and 150W physical cap, but expose
        # it only when all three audited nodes report fresh safe=1 signals.
        # Exact cardinality rejects partial/duplicate guard data; the timestamp
        # check closes the gate within 120s if guard scraping stops. max() makes
        # one scalar and the final fallback covers absent/incomplete guard data.
        query: >-
          max(
            clamp_max(
              clamp_min(-avg_over_time(hass_sensor_power_w{entity="sensor.p1_meter_power",job="homeassistant"}[15m]), 0),
              150
            )
            * on()
            (
              min(xmrig_guard_safe{node=~"control-[123]"})
              * (count(xmrig_guard_safe{node=~"control-[123]"}) == bool 3)
              * (min(timestamp(xmrig_guard_safe{node=~"control-[123]"})) >= bool (time() - 120))
            )
          ) or vector(0)
        threshold: "50" # 50W per replica (each miner consumes ~50W)
        activationThreshold: "25" # Start scaling when at least 25W exported
        ignoreNullValues: "false"
