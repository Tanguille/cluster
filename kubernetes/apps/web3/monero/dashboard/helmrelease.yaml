---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dashboard
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      dashboard:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: RollingUpdate
        containers:
          web:
            image:
              repository: nginx
              tag: 1.31-alpine@sha256:54f2a904c251d5a34adf545a72d32515a15e08418dae0266e23be2e18c66fefa
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 64Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
          dashboard-server:
            image:
              repository: python
              tag: 3.14-slim@sha256:072ffcb57bab690052d9b695592d811a42b849e8ef254ced334a28f283d5f76a
            command:
              - python3
              - /config/server.py
            args:
              - --port
              - "8080"
              - --data-dir
              - /var/lib/p2pool/api
              - --wallet
              - $(P2POOL_WALLET_ADDRESS)
            env:
              - name: P2POOL_WALLET_ADDRESS
                valueFrom:
                  secretKeyRef:
                    name: p2pool-wallet
                    key: address
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
    service:
      dashboard:
        ports:
          web:
            port: 80
    route:
      dashboard:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Monero (p2pool)
          gethomepage.dev/description: Monero / p2pool dashboard
          gethomepage.dev/group: Web3
          gethomepage.dev/icon: monero.png
        hostnames:
          - p2pool.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      shared-api-data:
        existingClaim: p2pool-shared-api-data
        globalMounts:
          - path: /var/lib/p2pool/api
      tmp:
        type: emptyDir
        advancedMounts:
          dashboard:
            web:
              - path: /tmp
      dashboard-html:
        type: configMap
        name: dashboard
        advancedMounts:
          dashboard:
            web:
              - path: /usr/share/nginx/html/index.html
                subPath: dashboard.html
              - path: /usr/share/nginx/html/dashboard.css
                subPath: dashboard.css
              - path: /usr/share/nginx/html/dashboard.js
                subPath: dashboard.js
      dashboard-server-script:
        type: configMap
        name: dashboard-server-script
        advancedMounts:
          dashboard:
            dashboard-server:
              - path: /config/server.py
                subPath: server.py
                readOnly: true
      nginx-config:
        type: configMap
        name: dashboard-nginx-config
        advancedMounts:
          dashboard:
            web:
              - path: /etc/nginx/nginx.conf
                subPath: nginx.conf
