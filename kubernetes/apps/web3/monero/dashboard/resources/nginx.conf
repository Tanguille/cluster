worker_processes auto;

# Container-standard logging: visible via kubectl logs, no writable log dir needed
error_log /dev/stderr notice;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /dev/stdout main;

    sendfile off;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Disable features that require write access
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    # stats_log.json is ~0.5MB of repetitive numeric JSON — compresses ~10x
    gzip on;
    gzip_types application/json text/css application/javascript;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Proxy dashboard API endpoints to Python server (keep in sync with
        # server.py's do_GET routes — observer/.* covers the observer proxy)
        location ~ ^/(xmrig_summary|monerod_stats|stats_log\.json|min_payment_threshold|observer_config|observer/.*)$ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API endpoints - serve JSON files with correct content type
        # These are served from p2pool data directory
        location ~ ^/(local|network|pool)/ {
            alias /var/lib/p2pool/api$uri;
            # The files are extensionless; default_type sets the real
            # Content-Type (add_header would only append a second header)
            default_type application/json;
        }

        # Serve static files (HTML, CSS, JS, images)
        location / {
            try_files $uri $uri/ =404;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
    }
}
