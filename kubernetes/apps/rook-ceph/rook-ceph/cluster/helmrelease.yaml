---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
  interval: 1h
  values:
    monitoring:
      enabled: true
      createPrometheusRules: true
      prometheusRuleOverrides:
        # Host-networked mgr pods share the instance label; after a mgr roll the [2d]
        # lookback returns duplicate series per pool and the join 422s for 2 days
        # (cascades into AlertingRulesError/RequestErrorsToAPI/TooManyLogs).
        # max without (pod) collapses the stale-pod duplicate before the join.
        CephPoolGrowthWarning:
          expr: "(max without (pod) (predict_linear(ceph_pool_percent_used[2d], 3600 * 24 * 5)) * on(cluster, pool_id, instance) group_right() ceph_pool_metadata) >= 95"
    toolbox:
      enabled: true
    route:
      dashboard:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Ceph
          gethomepage.dev/description: Rook Ceph dashboard
          gethomepage.dev/group: Status
          gethomepage.dev/icon: rook.png
        host:
          name: rook.${SECRET_DOMAIN}
          path: /
          pathType: PathPrefix
        parentRefs:
          - name: envoy-internal
            namespace: network
    cephImage:
      repository: quay.io/ceph/ceph
      tag: v20.2.2@sha256:6b4b5ae33acd3d736eb26d2a19238bce71a22f9cfb99cca887ba6312d0957644
    cephClusterSpec:
      cephConfig:
        global:
          bdev_enable_discard: "true" # string value required
          bdev_async_discard_threads: "1" # string value required
          osd_class_update_on_start: "false" # string value required
          device_failure_prediction_mode: local # requires mgr module
          # Network optimization for 2.5Gbps
          ms_osd_compress_min_size: "1024"
          ms_osd_compression_algorithm: snappy
      cleanupPolicy:
        wipeDevicesFromOtherClusters: true
      csi:
        readAffinity:
          enabled: true
      dashboard:
        urlPrefix: /
        ssl: false
        prometheusEndpoint: http://vmsingle-victoria-metrics.observability.svc.cluster.local:8428
      mgr:
        modules:
          - name: diskprediction_local
            enabled: true
          - name: insights
            enabled: true
          - name: pg_autoscaler
            enabled: true
          - name: rook
            enabled: true
      network:
        provider: host
        addressRanges:
          public:
            - ${LAN_CIDR}
          cluster:
            - ${LAN_CIDR}
        connections:
          requireMsgr2: true
      resources:
        osd:
          requests:
            cpu: "500m"
            memory: "3Gi"
          limits:
            memory: "6Gi"
        mon:
          requests:
            cpu: "150m"
            memory: "512Mi"
        mgr:
          requests:
            cpu: "200m"
          limits:
            memory: "4Gi"
      storage:
        useAllNodes: false
        useAllDevices: false
        nodes:
          - name: control-1
            devices:
              - name: /dev/disk/by-id/virtio-ZF6YrnfZ
            config:
              osdsPerDevice: "1"
          - name: control-2
            devices:
              # Samsung 980 PRO 1TB
              - name: /dev/disk/by-id/nvme-eui.002538b221b029e7
            config:
              osdsPerDevice: "1"
          - name: control-3
            devices:
              # Micron 7450 960GB
              - name: /dev/disk/by-id/nvme-eui.000000000000000100a075244aa8faf6
            config:
              osdsPerDevice: "1"
    cephBlockPools:
      - name: ceph-blockpool
        spec:
          failureDomain: host
          replicated:
            size: 2
            minSize: 1
          parameters:
            compression_mode: aggressive
            compression_algorithm: zstd
        storageClass:
          enabled: true
          name: ceph-block
          isDefault: true
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          volumeBindingMode: Immediate
          mountOptions:
            - discard
          parameters:
            compression_mode: aggressive
            compression_algorithm: zstd
            imageFormat: "2"
            imageFeatures: layering,fast-diff,object-map,deep-flatten,exclusive-lock
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/fstype: ext4
    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-blockpool
      isDefault: false
      deletionPolicy: Delete
    cephFileSystems:
      - name: &cephFileSystemName ceph-filesystem
        spec:
          metadataPool:
            replicated:
              size: 2
              minSize: 1
          dataPools:
            - failureDomain: host
              replicated:
                size: 2
                minSize: 1
              parameters:
                compression_mode: aggressive
                compression_algorithm: zstd
              name: data0
          metadataServer:
            activeCount: 1
            activeStandby: true
            priorityClassName: system-cluster-critical
            placement:
              topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: DoNotSchedule
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: ceph-mds
                      app.kubernetes.io/part-of: *cephFileSystemName
            resources:
              requests:
                cpu: "100m"
                memory: "256Mi"
              limits:
                memory: "4Gi"
        storageClass:
          enabled: true
          isDefault: false
          name: ceph-filesystem
          pool: data0
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          volumeBindingMode: Immediate
          parameters:
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/fstype: ext4
    cephFileSystemVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-filesystem
      isDefault: false
      deletionPolicy: Delete
    cephObjectStores: []
