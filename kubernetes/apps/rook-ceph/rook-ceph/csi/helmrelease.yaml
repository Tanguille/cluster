---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
spec:
  dependsOn:
    - name: rook-ceph
  chartRef:
    kind: OCIRepository
    name: ceph-csi-drivers
  interval: 1h
  values:
    operatorConfig:
      driverSpecDefaults:
        controllerPlugin:
          replicas: 2
        nodePlugin:
          kubeletDirPath: /var/lib/kubelet
    drivers:
      rbd:
        name: rook-ceph.rbd.csi.ceph.com
        snapshotPolicy: volumeSnapshot
        controllerPlugin:
          replicas: 2
      cephfs:
        name: rook-ceph.cephfs.csi.ceph.com
        snapshotPolicy: volumeSnapshot
        controllerPlugin:
          replicas: 2
        kernelMountOptions:
          ms_mode: prefer-crc
      nfs:
        enabled: false
      nvmeof:
        enabled: false
