---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
spec:
  dependsOn:
    - name: rook-ceph
  chartRef:
    kind: OCIRepository
    name: ceph-csi-drivers
  interval: 1h
  values:
    operatorConfig:
      driverSpecDefaults:
        controllerPlugin:
          replicas: 2
        nodePlugin:
          kubeletDirPath: /var/lib/kubelet
    drivers:
      rbd:
        name: rook-ceph.rbd.csi.ceph.com
        snapshotPolicy: volumeSnapshot
        controllerPlugin:
          replicas: 2
          # Right-sized requests (~2x observed steady-state; chart defaults requested ~3.7 CPU
          # cluster-wide). The chart renders every container key once resources is set, so the
          # full map is required. Anchored: cephfs aliases these same maps below.
          resources: &csiControllerResources
            attacher:
              requests: { cpu: 50m, memory: 64Mi }
            snapshotter:
              requests: { cpu: 50m, memory: 64Mi }
            resizer:
              requests: { cpu: 50m, memory: 64Mi }
            provisioner:
              requests: { cpu: 50m, memory: 64Mi }
            omapGenerator:
              requests: { cpu: 50m, memory: 64Mi }
            liveness:
              requests: { cpu: 50m, memory: 64Mi }
            addons:
              requests: { cpu: 50m, memory: 64Mi }
            logRotator:
              requests: { cpu: 50m, memory: 64Mi }
            plugin:
              requests: { cpu: 100m, memory: 256Mi }
        nodePlugin:
          resources: &csiNodeResources
            registrar:
              requests: { cpu: 25m, memory: 32Mi }
            liveness:
              requests: { cpu: 50m, memory: 64Mi }
            addons:
              requests: { cpu: 50m, memory: 64Mi }
            logRotator:
              requests: { cpu: 50m, memory: 64Mi }
            plugin:
              requests: { cpu: 100m, memory: 128Mi }
      cephfs:
        name: rook-ceph.cephfs.csi.ceph.com
        snapshotPolicy: volumeSnapshot
        controllerPlugin:
          replicas: 2
          resources: *csiControllerResources
        nodePlugin:
          resources: *csiNodeResources
        kernelMountOptions:
          ms_mode: prefer-crc
      nfs:
        enabled: false
      nvmeof:
        enabled: false
