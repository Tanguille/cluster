---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
spec:
  chartRef:
    kind: OCIRepository
    name: cert-manager
  interval: 1h
  values:
    crds:
      enabled: true
    dns01RecursiveNameservers: https://1.1.1.1:443/dns-query,https://1.0.0.1:443/dns-query
    dns01RecursiveNameserversOnly: true
    prometheus:
      servicemonitor:
        enabled: true
    networkPolicy:
      enabled: true
    cainjector:
      networkPolicy:
        enabled: true
    webhook:
      replicaCount: 2
      podDisruptionBudget:
        enabled: true
      networkPolicy:
        enabled: true
