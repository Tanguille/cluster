---
web:
  port: $${GATUS_WEB_PORT}
storage:
  type: postgres
  path: postgres://$${INIT_POSTGRES_USER}:$${INIT_POSTGRES_PASS}@$${INIT_POSTGRES_HOST}:5432/$${INIT_POSTGRES_DBNAME}?sslmode=disable
  caching: true
metrics: true
ui:
  title: Status | Gatus
  header: Status
  link: https://github.com/tanguille/cluster
  buttons:
    - name: Github
      link: https://github.com/tanguille

alerting:
  discord:
    webhook-url: $${DISCORD_WEBHOOK_URL}
connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 1m

endpoints:
  - name: Cloudflare
    group: connectivity
    url: icmp://1.1.1.1
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: discord
        enabled: true
        send-on-resolved: true

  - name: Google
    group: connectivity
    url: icmp://8.8.8.8
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: discord
        enabled: true
        send-on-resolved: true

  - name: Quad9
    group: connectivity
    url: icmp://9.9.9.9
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: discord
        enabled: true
        send-on-resolved: true

  # Real MCP-protocol probes: POST an initialize per vmcp. The /health endpoints and the
  # VirtualMCPServer Ready status stayed green while POST /mcp was unusable (the optimizer
  # embedding path exceeded the response-write deadline), so only a protocol-level probe
  # catches this failure mode. Gatus resolves the anchor/merge keys at runtime (the file
  # reaches it raw via configMapGenerator); verified against the deployed image.
  - &vmcpEndpoint
    name: vmcp-database
    group: ai
    url: http://vmcp-database.ai.svc.cluster.local:4483/mcp
    method: POST
    headers:
      Content-Type: application/json
      Accept: application/json, text/event-stream
    body: '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"gatus","version":"0"}}}'
    interval: 5m
    client:
      timeout: 15s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 10000"
    alerts:
      - type: discord
        enabled: true
        send-on-resolved: true

  - <<: *vmcpEndpoint
    name: vmcp-flux
    url: http://vmcp-flux.ai.svc.cluster.local:4483/mcp

  - <<: *vmcpEndpoint
    name: vmcp-ha
    url: http://vmcp-ha.ai.svc.cluster.local:4483/mcp

  - <<: *vmcpEndpoint
    name: vmcp-observability
    url: http://vmcp-observability.ai.svc.cluster.local:4483/mcp

  - <<: *vmcpEndpoint
    name: vmcp-resources
    url: http://vmcp-resources.ai.svc.cluster.local:4483/mcp

  - <<: *vmcpEndpoint
    name: vmcp-search
    url: http://vmcp-search.ai.svc.cluster.local:4483/mcp

  # unified runs the optimizer, which re-embeds every tool per new session (~13-23s on
  # toolhive 0.29.1; no cross-session cache yet). Probe it gently: relaxed threshold so
  # it only alerts on regression toward the old 32s+ hang, and a longer interval so the
  # probe itself doesn't keep TEI busy re-embedding every 5 minutes.
  - <<: *vmcpEndpoint
    name: vmcp-unified
    url: http://vmcp-unified.ai.svc.cluster.local:4483/mcp
    interval: 15m
    client:
      timeout: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 25000"
