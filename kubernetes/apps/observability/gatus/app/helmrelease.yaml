---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
spec:
  chartRef:
    kind: OCIRepository
    name: gatus-sidecar
  interval: 1h
  values:
    fullnameOverride: gatus

    deploymentAnnotations:
      reloader.stakater.com/auto: "true"

    gatus:
      image:
        tag: v5.36.0
        digest: sha256:c5f210d095fa78e6efaa20ffeb14803f2ba4f10615e16a6d12087697149617f0
      port: &port 80
      env:
        TZ: ${TIMEZONE}
      envFrom:
        - secretRef:
            name: "{{ .Release.Name }}-secret"
      livenessProbe: &probes
        httpGet:
          path: /health
          port: http
        initialDelaySeconds: 0
        periodSeconds: 10
        timeoutSeconds: 1
        failureThreshold: 3
      readinessProbe: *probes
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities: { add: ["NET_RAW"], drop: ["ALL"] }
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 100m
          memory: 256Mi

    sidecar:
      image:
        tag: 0.2.2
        digest: sha256:1a68c2ede0397e1c4380e9f874bbebbd06562a6c5750c5978c771743ecab1812
      gatewayNames:
        - envoy-external
        - envoy-internal
        - envoy-internal-tls
      kinds:
        httproute:
          enable: true
        service:
          enable: false
      resources:
        requests:
          cpu: 10m
        limits:
          cpu: 500m
          memory: 64Mi

    config:
      existingConfigMap: gatus-configmap
      items:
        - key: config.yaml
          path: config.yaml

    monitoring:
      serviceMonitor:
        enabled: true

    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/enabled: "false"
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: Gatus
        gethomepage.dev/description: Endpoint status monitoring
        gethomepage.dev/group: Status
        gethomepage.dev/icon: gatus.png
        gethomepage.dev/widget.type: gatus
        gethomepage.dev/widget.url: http://gatus.observability.svc.cluster.local
      hostnames:
        - "status.${SECRET_DOMAIN}"
      parentRefs:
        - name: envoy-internal
          namespace: network

    initContainers:
      - name: init-db
        image: ghcr.io/home-operations/postgres-init:18
        envFrom:
          - secretRef:
              name: gatus-secret
