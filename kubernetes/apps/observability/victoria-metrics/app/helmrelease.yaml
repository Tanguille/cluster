---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app victoria-metrics
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    fullnameOverride: *app
    global:
      image:
        registry: quay.io

    victoria-metrics-operator:
      crds:
        cleanup:
          enabled: false
      operator:
        enable_converter_ownership: true
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 512Mi

    defaultDashboards:
      grafanaOperator:
        enabled: true
        spec:
          instanceSelector:
            matchLabels:
              grafana.internal/instance: grafana
          allowCrossNamespaceImport: true

    defaultDatasources:
      grafanaOperator:
        enabled: true
        spec:
          instanceSelector:
            matchLabels:
              grafana.internal/instance: grafana
          allowCrossNamespaceImport: true
      victoriametrics:
        datasources:
          - name: VictoriaMetrics
            uid: victoriametrics
            type: prometheus
            access: proxy
            url: &vmqueryUrl http://vmauth-victoria-metrics.observability.svc.cluster.local:8427
            isDefault: false
            jsonData:
              httpMethod: POST
              queryTimeout: 60s
              timeInterval: 15s
              seriesLimit: 40000
      alertmanager:
        datasources:
          - name: VictoriaMetrics Alertmanager
            uid: vmalertmanager
            type: alertmanager
            access: proxy
            url: &vmalertmanagerUrl http://vmalertmanager-victoria-metrics.observability.svc.cluster.local:9093
            jsonData:
              implementation: prometheus

    defaultRules:
      rules:
        etcdMemberCommunicationSlow:
          create: false

    grafana:
      enabled: false
      forceDeployDatasource: true

    prometheus-node-exporter:
      enabled: false
    kube-state-metrics:
      enabled: false

    kubelet:
      enabled: true
      vmScrapes:
        cadvisor:
          enabled: true
          spec:
            path: /metrics/cadvisor
        kubelet:
          spec: {}
        probes:
          enabled: true
          spec:
            path: /metrics/probes
        resources:
          enabled: true
          spec:
            path: /metrics/resource
      vmScrape:
        spec:
          interval: 60s
          scrapeTimeout: 50s
          relabelConfigs:
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)
            - sourceLabels: [__metrics_path__]
              targetLabel: metrics_path
            - targetLabel: job
              replacement: kubelet
            - action: labeldrop
              regex: (beta_kubernetes_io_.*|extensions_talos_dev_.*|feature_node_kubernetes_io_.*|nvidia_com_.*|openebs_io_.*|kepler_node)

    kubeControllerManager:
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true
    kubeEtcd:
      service:
        selector:
          component: kube-apiserver # etcd runs on control plane nodes
        port: 2381
        targetPort: 2381
      vmScrape:
        spec:
          endpoints:
            - scheme: http
    kubeProxy:
      enabled: false
    kubeScheduler:
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true

    alertmanager:
      enabled: true
      useManagedConfig: true
      config:
        route:
          group_by: ["alertname", "job"]
          group_interval: 5m
          group_wait: 1m
          receiver: discord
          repeat_interval: 12h
          routes:
            - receiver: blackhole
              matchers:
                - alertname = InfoInhibitor
            - receiver: discord
              matchers:
                - severity = critical
        inhibit_rules:
          - equal: ["alertname", "namespace"]
            source_matchers:
              - severity = "critical"
            target_matchers:
              - severity = "warning"
        receivers:
          - name: blackhole
          - name: discord
            discord_configs:
              - webhook_url_secret:
                  name: alertmanager-secret
                  key: DISCORD_WEBHOOK_URL
                username: Alertmanager
                title: |-
                  {{ if eq .Status "firing" }}🚨{{ else }}✅{{ end }} {{ with .CommonLabels.alertname }}{{ . }}{{ else }}Alert group{{ end }}
                message: |-

                  📊 **Severity:** `{{ with .CommonLabels.severity }}{{ . | toUpper }}{{ else }}UNKNOWN{{ end }}`

                  🔔 **State:** `{{ len .Alerts.Firing }} firing` • `{{ len .Alerts.Resolved }} resolved`

                  {{ with .CommonAnnotations.description }}📝 **Description**

                  ```text
                  {{ printf "%.1800s" . }}{{ if gt (len .) 1800 }}…{{ end }}
                  ```{{ else }}{{ with .CommonAnnotations.summary }}📋 **Summary**

                  ```text
                  {{ printf "%.1800s" . }}{{ if gt (len .) 1800 }}…{{ end }}
                  ```{{ else }}{{ with .CommonAnnotations.message }}💬 **Message**

                  ```text
                  {{ printf "%.1800s" . }}{{ if gt (len .) 1800 }}…{{ end }}
                  ```{{ else }}No description was provided.{{ end }}{{ end }}{{ end }}

                  🎯 **Affected targets**

                  {{ range $i, $alert := .Alerts }}{{ if lt $i 5 }}• {{ with $alert.Labels.namespace }}`{{ . }}`/{{ end }}{{ if $alert.Labels.pod }}`{{ $alert.Labels.pod }}`{{ else if $alert.Labels.instance }}`{{ $alert.Labels.instance }}`{{ else if $alert.Labels.node }}`{{ $alert.Labels.node }}`{{ else if $alert.Labels.job }}`{{ $alert.Labels.job }}`{{ else if $alert.Labels.alertname }}`{{ $alert.Labels.alertname }}`{{ else }}`unknown target`{{ end }}
                  ↳ {{ if eq $alert.Status "resolved" }}resolved <t:{{ $alert.EndsAt.Unix }}:R>{{ else }}firing since <t:{{ $alert.StartsAt.Unix }}:R>{{ end }}
                  {{ with $alert.GeneratorURL }}↳ [source]({{ . }}){{ end }}

                  {{ end }}{{ end }}{{ if gt (len .Alerts) 5 }}…and more alerts in this group.
                  {{ end }}
                send_resolved: true
      monzoTemplate:
        enabled: false
      route:
        enabled: true
        hostnames:
          - vmalertmanager.${SECRET_DOMAIN}
        parentRefs: &internalParentRefs
          - name: envoy-internal
            namespace: network
      spec:
        selectAllByDefault: true
        externalURL: https://vmalertmanager.${SECRET_DOMAIN}
        image:
          repository: quay.io/prometheus/alertmanager
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: &blockStorageClass ceph-block
              resources:
                requests:
                  storage: 1Gi

    vmalert:
      enabled: true
      remoteWriteVMAgent: false
      route:
        enabled: true
        hostnames:
          - vmalert.${SECRET_DOMAIN}
        parentRefs: *internalParentRefs
      spec:
        datasource:
          url: *vmqueryUrl
        extraArgs:
          "external.url": https://vmalert.${SECRET_DOMAIN}
          "rule.evalDelay": 1m
        notifier:
          url: *vmalertmanagerUrl
        remoteRead:
          url: *vmqueryUrl
        remoteWrite:
          url: http://vmsingle-victoria-metrics.observability.svc.cluster.local:8428/api/v1/write
        resources:
          requests:
            cpu: 25m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

    vmagent:
      enabled: true
      rbac:
        namespaced: false
      spec:
        selectAllByDefault: true
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1
            memory: 1Gi

    vmauth:
      enabled: true
      labels:
        operated-prometheus: "true"
        self-monitor: "true"
      spec:
        extraArgs:
          requestBufferSize: "65536"
        managedMetadata:
          labels:
            operated-prometheus: "true"
            self-monitor: "true"
        unauthorizedUserAccessSpec:
          url_map:
            - src_paths:
                - /api/v1/query.*
                - /api/v1/labels.*
                - /api/v1/series.*
                - /api/v1/metadata.*
                - /api/v1/label/.*
              url_prefix: http://vmsingle-victoria-metrics.observability.svc.cluster.local:8428
            - src_paths:
                - /select/logsql/.*
              url_prefix: http://victoria-logs.observability.svc.cluster.local:9428

    vmsingle:
      enabled: true
      route:
        enabled: true
        hostnames: ["vmsingle.${SECRET_DOMAIN}"]
        parentRefs: *internalParentRefs
      spec:
        retentionPeriod: 365d
        resources:
          requests:
            cpu: 250m
            memory: 1Gi
          limits:
            cpu: 2
            memory: 4Gi
        storage:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 200Gi
          storageClassName: *blockStorageClass

    extraRules:
      dockerhub-rules:
        groups:
          - name: dockerhub
            rules:
              - alert: DockerhubRateLimitRisk
                annotations:
                  summary: There are {{ $value }} containers pulling from Dockerhub. This may lead to rate limiting.
                expr: count(time() - container_last_seen{image=~"(docker.io).*",container!=""} < 30) > 100
                labels:
                  severity: critical
      oom-rules:
        groups:
          - name: oom
            rules:
              - alert: OomKilled
                annotations:
                  summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
                expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
                labels:
                  severity: critical
              - alert: OomStorm
                annotations:
                  summary: Node {{ $labels.instance }} had {{ $value }} container OOM events in the last 10 minutes.
                expr: sum by (instance) (increase(container_oom_events_total[10m])) > 5
                labels:
                  severity: critical
