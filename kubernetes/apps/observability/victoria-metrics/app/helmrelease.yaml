---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app victoria-metrics
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    fullnameOverride: *app
    global:
      image:
        registry: quay.io

    victoria-metrics-operator:
      crds:
        cleanup:
          enabled: false
      operator:
        enable_converter_ownership: true
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 512Mi

    defaultDashboards:
      grafanaOperator:
        enabled: true
        spec:
          instanceSelector:
            matchLabels:
              grafana.internal/instance: grafana
          allowCrossNamespaceImport: true

    defaultDatasources:
      grafanaOperator:
        enabled: true
        spec:
          instanceSelector:
            matchLabels:
              grafana.internal/instance: grafana
          allowCrossNamespaceImport: true
      victoriametrics:
        datasources:
          - name: VictoriaMetrics
            uid: victoriametrics
            type: prometheus
            access: proxy
            url: &vmqueryUrl http://vmauth-victoria-metrics.observability.svc.cluster.local:8427
            isDefault: false
            jsonData:
              httpMethod: POST
              queryTimeout: 60s
              timeInterval: 15s
              seriesLimit: 40000
      alertmanager:
        datasources:
          - name: VictoriaMetrics Alertmanager
            uid: vmalertmanager
            type: alertmanager
            access: proxy
            url: &vmalertmanagerUrl http://vmalertmanager-victoria-metrics.observability.svc.cluster.local:9093
            jsonData:
              implementation: prometheus

    defaultRules:
      rules:
        etcdMemberCommunicationSlow:
          create: false

    grafana:
      enabled: false
      forceDeployDatasource: true

    prometheus-node-exporter:
      enabled: false
    kube-state-metrics:
      enabled: false

    kubeControllerManager:
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true
    kubeEtcd:
      service:
        selector:
          component: kube-apiserver # etcd runs on control plane nodes
        port: 2381
        targetPort: 2381
      vmScrape:
        spec:
          endpoints:
            - scheme: http
    kubeProxy:
      enabled: false
    kubeScheduler:
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true

    alertmanager:
      enabled: true
      useManagedConfig: true
      config:
        route:
          group_by: ["alertname", "job"]
          group_interval: 5m
          group_wait: 1m
          receiver: discord
          repeat_interval: 12h
          routes:
            - receiver: blackhole
              matchers:
                - alertname = InfoInhibitor
            - receiver: discord
              matchers:
                - severity = critical
        inhibit_rules:
          - equal: ["alertname", "namespace"]
            source_matchers:
              - severity = "critical"
            target_matchers:
              - severity = "warning"
        receivers:
          - name: blackhole
          - name: discord
            discord_configs:
              - webhook_url_secret:
                  name: alertmanager-secret
                  key: DISCORD_WEBHOOK_URL
                title: |-
                  {{- if eq .Status "firing" }}🚨 **ALERT FIRING** 🚨{{- else }}✅ **ALERT RESOLVED** ✅{{- end }}
                message: |-
                  {{- range .Alerts }}

                  {{- if eq .Labels.severity "critical" }}
                  🚨 **Severity:** `CRITICAL`
                  {{- else if eq .Labels.severity "warning" }}
                  ⚠️ **Severity:** `WARNING`
                  {{- else if eq .Labels.severity "info" }}
                  ℹ️ **Severity:** `INFO`
                  {{- else }}
                  > 📊 **Severity:** `{{ .Labels.severity }}`
                  {{- end }}

                  {{- if ne .Annotations.description "" }}
                  📝 **Description:**

                  ```
                  {{ .Annotations.description }}
                  ```
                  {{- else if ne .Annotations.summary "" }}
                  📋 **Summary:**
                  ```
                  {{ .Annotations.summary }}
                  ```
                  {{- else if ne .Annotations.message "" }}
                  💬 **Message:**
                  ```
                  {{ .Annotations.message }}
                  ```
                  {{- else }}
                  🔔 Alert has been triggered
                  {{- end }}

                  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

                  **Alert Details:**
                  {{- if .Labels.node }}
                  🖥️ **Node:** `{{ .Labels.node }}`
                  {{- end }}
                  {{- if .Labels.namespace }}
                  Namespace: `{{ .Labels.namespace }}`
                  {{- end }}
                  {{- if .Labels.pod }}
                  Pod: `{{ .Labels.pod }}`
                  {{- end }}
                  {{- if .Labels.job }}
                  Job: `{{ .Labels.job }}`
                  {{- end }}
                  {{- if .Labels.instance }}
                  Instance: `{{ .Labels.instance }}`
                  {{- end }}
                  {{- if .Labels.container }}
                  Container: `{{ .Labels.container }}`
                  {{- end }}
                  {{- if .Labels.service }}
                  Service: `{{ .Labels.service }}`
                  {{- end }}

                  ⏰ **Timeline:**
                  {{- if eq .Status "firing" }}
                  🔥 Started: <t:{{ .StartsAt.Unix }}:F> (<t:{{ .StartsAt.Unix }}:R>)
                  {{- else }}
                  ✅ Resolved: <t:{{ .EndsAt.Unix }}:F> (<t:{{ .EndsAt.Unix }}:R>)
                  🕐 Duration: {{ .StartsAt | since | humanizeDuration }}
                  {{- end }}

                  {{- end }}
                send_resolved: true
      monzoTemplate:
        enabled: false
      route:
        enabled: true
        hostnames:
          - vmalertmanager.${SECRET_DOMAIN}
        parentRefs: &internalParentRefs
          - name: envoy-internal
            namespace: network
      spec:
        selectAllByDefault: true
        externalURL: https://vmalertmanager.${SECRET_DOMAIN}
        image:
          repository: quay.io/prometheus/alertmanager
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: &blockStorageClass ceph-block
              resources:
                requests:
                  storage: 1Gi

    vmalert:
      enabled: true
      remoteWriteVMAgent: false
      route:
        enabled: true
        hostnames:
          - vmalert.${SECRET_DOMAIN}
        parentRefs: *internalParentRefs
      spec:
        datasource:
          url: *vmqueryUrl
        extraArgs:
          "external.url": https://vmalert.${SECRET_DOMAIN}
        notifier:
          url: *vmalertmanagerUrl
        remoteRead:
          url: *vmqueryUrl
        remoteWrite:
          url: http://vmsingle-victoria-metrics.observability.svc.cluster.local:8428/api/v1/write
        resources:
          requests:
            cpu: 25m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

    vmagent:
      enabled: true
      rbac:
        namespaced: false
      spec:
        selectAllByDefault: true
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1
            memory: 1Gi
        extraArgs:
          promscrape.dropOriginalLabels: "true"
          promscrape.maxScrapeSize: 50MiB
          promscrape.streamParse: "true"

    vmauth:
      enabled: true
      spec:
        extraArgs:
          requestBufferSize: "65536"
        unauthorizedUserAccessSpec:
          url_map:
            - src_paths:
                - /api/v1/query.*
                - /api/v1/label/.*
              url_prefix: http://vmsingle-victoria-metrics.observability.svc.cluster.local:8428
            - src_paths:
                - /select/logsql/.*
              url_prefix: http://victoria-logs.observability.svc.cluster.local:9428

    vmsingle:
      enabled: true
      route:
        enabled: true
        hostnames:
          - vmsingle.${SECRET_DOMAIN}
        parentRefs: *internalParentRefs
      spec:
        retentionPeriod: 365d
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 2
            memory: 4Gi
        storage:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 200Gi
          storageClassName: *blockStorageClass

    additionalVictoriaMetricsMap:
      dockerhub-rules:
        create: true
        groups:
          - name: dockerhub
            rules:
              - alert: DockerhubRateLimitRisk
                annotations:
                  summary: There are {{ $value }} containers pulling from Dockerhub. This may lead to rate limiting.
                expr: count(time() - container_last_seen{image=~"(docker.io).*",container!=""} < 30) > 100
                labels:
                  severity: critical
      oom-rules:
        create: true
        groups:
          - name: oom
            rules:
              - alert: OomKilled
                annotations:
                  summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
                expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
                labels:
                  severity: critical
      zfs-rules:
        create: true
        groups:
          - name: zfs
            rules:
              - alert: ZfsUnexpectedPoolState
                annotations:
                  summary: ZFS pool {{$labels.zpool}} on {{$labels.instance}} is in a unexpected state {{$labels.state}}
                expr: node_zfs_zpool_state{state!="online"} > 0
                labels:
                  severity: warning
