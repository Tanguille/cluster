---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app victoria-metrics
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    fullnameOverride: *app
    global:
      image:
        registry: quay.io

    victoria-metrics-operator:
      crds:
        cleanup:
          enabled: false
      operator:
        enable_converter_ownership: true
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 512Mi

    defaultDashboards:
      grafanaOperator:
        enabled: true
        spec:
          instanceSelector:
            matchLabels:
              grafana.internal/instance: grafana
          allowCrossNamespaceImport: true

    defaultDatasources:
      grafanaOperator:
        enabled: true
        spec:
          instanceSelector:
            matchLabels:
              grafana.internal/instance: grafana
          allowCrossNamespaceImport: true
      victoriametrics:
        datasources:
          - name: VictoriaMetrics
            uid: victoriametrics
            type: prometheus
            access: proxy
            url: &vmqueryUrl http://vmauth-victoria-metrics.observability.svc.cluster.local:8427
            isDefault: false
            jsonData:
              httpMethod: POST
              queryTimeout: 60s
              timeInterval: 15s
              seriesLimit: 40000
      alertmanager:
        datasources:
          - name: VictoriaMetrics Alertmanager
            uid: vmalertmanager
            type: alertmanager
            access: proxy
            url: &vmalertmanagerUrl http://vmalertmanager-victoria-metrics.observability.svc.cluster.local:9093
            jsonData:
              implementation: prometheus

    defaultRules:
      rules:
        etcdMemberCommunicationSlow:
          create: false
      groups:
        # vmsingle deployment; the chart's vmcluster group duplicates RequestErrorsToAPI etc.
        # Remove this if the stack ever migrates to vmcluster.
        vmcluster:
          create: false

    grafana:
      enabled: false
      forceDeployDatasource: true

    prometheus-node-exporter:
      enabled: false
    kube-state-metrics:
      enabled: false

    kubelet:
      vmScrapes:
        # /metrics/resource duplicates the container CPU/memory series cAdvisor already provides
        resources:
          enabled: false
      vmScrape:
        spec:
          interval: 60s
          scrapeTimeout: 50s
          relabelConfigs:
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)
            - sourceLabels: [__metrics_path__]
              targetLabel: metrics_path
            - targetLabel: job
              replacement: kubelet
            - action: labeldrop
              regex: (beta_kubernetes_io_.*|extensions_talos_dev_.*|feature_node_kubernetes_io_.*|amd_com_.*|openebs_io_.*|kepler_node)

    kubeApiServer:
      vmScrape:
        spec:
          endpoints:
            # chart default endpoint restated (list is wholesale-replaced);
            # /metrics outgrew vmagent's 16MiB default cap, and the dropped
            # histograms are used by no alert rule (only *_sli_* buckets are)
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              max_scrape_size: 64MiB
              port: https
              scheme: https
              tlsConfig:
                caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                serverName: kubernetes
              metricRelabelConfigs:
                - action: drop
                  sourceLabels: [__name__]
                  regex: (apiserver_request_duration_seconds|etcd_request_duration_seconds|apiserver_request_body_size_bytes)_bucket
    kubeControllerManager:
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true
    kubeEtcd:
      service:
        selector:
          component: kube-apiserver # etcd runs on control plane nodes
        port: 2381
        targetPort: 2381
      vmScrape:
        spec:
          endpoints:
            - scheme: http
    kubeScheduler:
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true

    alertmanager:
      useManagedConfig: true
      config:
        route:
          group_by: ["alertname", "job"]
          group_interval: 15m
          group_wait: 3m
          receiver: discord
          repeat_interval: 12h
          routes:
            - receiver: blackhole
              matchers:
                - alertname = InfoInhibitor
            - receiver: discord
              matchers:
                - severity = critical
        inhibit_rules:
          - equal: ["alertname", "namespace"]
            source_matchers:
              - severity = "critical"
            target_matchers:
              - severity = "warning"
        receivers:
          - name: blackhole
          - name: discord
            discord_configs:
              - webhook_url_secret:
                  name: alertmanager-secret
                  key: DISCORD_WEBHOOK_URL
                username: Alertmanager
                title: |-
                  {{ if eq .Status "firing" }}🚨{{ else }}✅{{ end }} {{ with .CommonLabels.alertname }}{{ . }}{{ else }}Alert group{{ end }}
                message: |-

                  📊 **Severity:** `{{ with .CommonLabels.severity }}{{ . | toUpper }}{{ else }}UNKNOWN{{ end }}`

                  🔔 **State:** `{{ len .Alerts.Firing }} firing` • `{{ len .Alerts.Resolved }} resolved`

                  {{ with .CommonAnnotations.description }}📝 **Description**

                  ```text
                  {{ printf "%.1800s" . }}{{ if gt (len .) 1800 }}…{{ end }}
                  ```{{ else }}{{ with .CommonAnnotations.summary }}📋 **Summary**

                  ```text
                  {{ printf "%.1800s" . }}{{ if gt (len .) 1800 }}…{{ end }}
                  ```{{ else }}{{ with .CommonAnnotations.message }}💬 **Message**

                  ```text
                  {{ printf "%.1800s" . }}{{ if gt (len .) 1800 }}…{{ end }}
                  ```{{ else }}No description was provided.{{ end }}{{ end }}{{ end }}

                  🎯 **Affected targets**

                  {{ range $i, $alert := .Alerts }}{{ if lt $i 5 }}• {{ with $alert.Labels.namespace }}`{{ . }}`/{{ end }}{{ if $alert.Labels.pod }}`{{ $alert.Labels.pod }}`{{ else if $alert.Labels.instance }}`{{ $alert.Labels.instance }}`{{ else if $alert.Labels.node }}`{{ $alert.Labels.node }}`{{ else if $alert.Labels.job }}`{{ $alert.Labels.job }}`{{ else if $alert.Labels.alertname }}`{{ $alert.Labels.alertname }}`{{ else }}`unknown target`{{ end }}
                  ↳ {{ if eq $alert.Status "resolved" }}resolved <t:{{ $alert.EndsAt.Unix }}:R>{{ else }}firing since <t:{{ $alert.StartsAt.Unix }}:R>{{ end }}
                  {{ with $alert.GeneratorURL }}↳ [source]({{ . }}){{ end }}

                  {{ end }}{{ end }}{{ if gt (len .Alerts) 5 }}…and more alerts in this group.
                  {{ end }}
                send_resolved: true
      monzoTemplate:
        enabled: false
      route:
        enabled: true
        hostnames:
          - vmalertmanager.${SECRET_DOMAIN}
        parentRefs: &internalParentRefs
          - name: envoy-internal
            namespace: network
      spec:
        selectAllByDefault: true
        externalURL: https://vmalertmanager.${SECRET_DOMAIN}
        image:
          repository: quay.io/prometheus/alertmanager
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: &blockStorageClass ceph-block
              resources:
                requests:
                  storage: 1Gi

    vmalert:
      route:
        enabled: true
        hostnames:
          - vmalert.${SECRET_DOMAIN}
        parentRefs: *internalParentRefs
      spec:
        datasource:
          url: *vmqueryUrl
        extraArgs:
          "external.url": https://vmalert.${SECRET_DOMAIN}
          "rule.evalDelay": 1m
        notifier:
          url: *vmalertmanagerUrl
        remoteRead:
          url: *vmqueryUrl
        remoteWrite:
          url: http://vmsingle-victoria-metrics.observability.svc.cluster.local:8428/api/v1/write
        resources:
          requests:
            cpu: 25m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

    vmagent:
      rbac:
        namespaced: false
      spec:
        selectAllByDefault: true
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1
            memory: 1Gi

    vmauth:
      enabled: true
      labels:
        operated-prometheus: "true"
        self-monitor: "true"
      spec:
        extraArgs:
          requestBufferSize: "65536"
        managedMetadata:
          labels:
            operated-prometheus: "true"
            self-monitor: "true"
        unauthorizedUserAccessSpec:
          url_map:
            - src_paths:
                - /api/v1/query.*
                - /api/v1/labels.*
                - /api/v1/series.*
                - /api/v1/metadata.*
                - /api/v1/label/.*
              url_prefix: http://vmsingle-victoria-metrics.observability.svc.cluster.local:8428
            - src_paths:
                - /select/logsql/.*
              url_prefix: http://victoria-logs.observability.svc.cluster.local:9428

    vmsingle:
      route:
        enabled: true
        hostnames: ["vmsingle.${SECRET_DOMAIN}"]
        parentRefs: *internalParentRefs
      spec:
        retentionPeriod: 365d
        resources:
          requests:
            cpu: 250m
            memory: 1Gi
          limits:
            cpu: 2
            memory: 4Gi
        storage:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 200Gi
          storageClassName: *blockStorageClass

    extraRules:
      dockerhub-rules:
        groups:
          - name: dockerhub
            rules:
              - alert: DockerhubRateLimitRisk
                annotations:
                  summary: There are {{ $value }} containers pulling from Dockerhub. This may lead to rate limiting.
                expr: count(time() - container_last_seen{image=~"(docker.io).*",container!=""} < 30) > 100
                for: 15m
                labels:
                  severity: critical
      oom-rules:
        groups:
          - name: oom
            rules:
              - alert: OomKilled
                annotations:
                  summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
                expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
                labels:
                  severity: critical
              - alert: OomStorm
                annotations:
                  summary: Node {{ $labels.instance }} had {{ $value }} Kubernetes container OOM events in the last 10 minutes.
                expr: sum by (instance) (increase(container_oom_events_total{container!="",namespace!="",pod!=""}[10m])) > 5
                for: 5m
                labels:
                  severity: critical
      node-hardware-rules:
        groups:
          - name: node-hardware
            rules:
              - alert: NVMeCriticalWarning
                annotations:
                  summary: NVMe {{ $labels.device }} on {{ $labels.instance }} reports a critical warning
                  description: smartctl_device_critical_warning is nonzero on {{ $labels.device }} ({{ $labels.instance }}) — confirmed precursor to an XFS forced-shutdown crash.
                expr: smartctl_device_critical_warning > 0
                for: 5m
                labels:
                  severity: critical
              - alert: NVMeTemperatureWarning
                annotations:
                  summary: NVMe {{ $labels.chip }} on {{ $labels.nodename }} is running hot ({{ $value }}°C)
                  description: "{{ $labels.chip }} on {{ $labels.nodename }} has been above 78°C for 10 minutes ({{ $value }}°C). Crash latch is ~92°C and needs a cold power cycle."
                expr: max by (nodename, chip) (node_hwmon_temp_celsius{chip=~"nvme.*"}) > 78
                for: 10m
                labels:
                  severity: warning
              - alert: NVMeTemperatureCritical
                annotations:
                  summary: NVMe {{ $labels.chip }} on {{ $labels.nodename }} is critically hot ({{ $value }}°C)
                  description: "{{ $labels.chip }} on {{ $labels.nodename }} has been above 85°C for 5 minutes ({{ $value }}°C). Crash latch is ~92°C and needs a cold power cycle."
                expr: max by (nodename, chip) (node_hwmon_temp_celsius{chip=~"nvme.*"}) > 85
                for: 5m
                labels:
                  severity: critical
              - alert: NodeCPUPressureSustained
                annotations:
                  summary: Sustained CPU pressure on {{ $labels.nodename }}
                  description: CPU PSI wait on {{ $labels.nodename }} has been above 0.5s/s for 15 minutes ({{ $value }}s/s) — precedes cold-reload storms and runner starvation.
                expr: rate(node_pressure_cpu_waiting_seconds_total[5m]) > 0.5
                for: 15m
                labels:
                  severity: warning
              - alert: NodeMemoryPressureSustained
                annotations:
                  summary: Sustained memory pressure on {{ $labels.nodename }}
                  description: Memory PSI wait on {{ $labels.nodename }} has been above 0.3s/s for 15 minutes ({{ $value }}s/s).
                expr: rate(node_pressure_memory_waiting_seconds_total[5m]) > 0.3
                for: 15m
                labels:
                  severity: warning
              - alert: NodeVarFillingUp
                annotations:
                  summary: /var on {{ $labels.nodename }} is filling up
                  description: "/var on {{ $labels.nodename }} has less than 15% free space ({{ $value | humanizePercentage }})." # plain threshold; predict_linear false-fires on fresh series
                expr: node_filesystem_avail_bytes{mountpoint="/var"} / node_filesystem_size_bytes{mountpoint="/var"} < 0.15
                for: 30m
                labels:
                  severity: warning
