---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app drm-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: GrafanaDashboard
              group: grafana.integreatly.org
              name: drm-exporter-dashboard
            patch: |-
              - op: add
                path: /spec/datasources
                value:
                  - datasourceName: prometheus
                    inputName: datasource
  values:
    fullnameOverride: *app

    config:
      port: 8081
      intervalSeconds: 5
      logLevel: info

    hostAccess:
      # /dev/dri required to discover and read AMD GPUs
      devDri: /dev/dri
      # /sys required for frequency, memory, AMD engine, hwmon stats
      sys: /sys
      # No msr module on Talos — leave empty (default)
      devCpu: ""
      hostNetwork: false

    securityContext:
      privileged: false
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
        # AMD sysfs metrics need no extra capabilities; override chart defaults.
        add: []

    serviceAccount:
      create: true
      automount: false

    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi

    nodeSelector:
      amd.com/gpu: "true"

    tolerations:
      - key: amd.com/gpu
        operator: Exists
        effect: NoSchedule

    monitoring:
      serviceMonitor:
        enabled: true
        interval: 30s
        scrapeTimeout: 10s
        relabelings:
          - action: replace
            regex: (.*)
            replacement: $1
            sourceLabels:
              - __meta_kubernetes_pod_node_name
            targetLabel: kubernetes_node
          - action: replace
            regex: (.*)
            replacement: $1
            sourceLabels:
              - __meta_kubernetes_pod_node_name
            targetLabel: nodename
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          allowCrossNamespaceImport: true
          folder: hardware
          matchLabels:
            grafana.internal/instance: grafana
