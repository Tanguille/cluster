---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app drm-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: GrafanaDashboard
              group: grafana.integreatly.org
              name: drm-exporter-dashboard
            patch: |-
              - op: add
                path: /spec/datasources
                value:
                  - datasourceName: prometheus
                    inputName: datasource
  values:
    fullnameOverride: *app

    podSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      supplementalGroups:
        - 44
        - 226
      seccompProfile:
        type: Unconfined

    resources:
      requests:
        cpu: 10m
        memory: 32Mi
        squat.ai/dri: 1
      limits:
        memory: 128Mi
        squat.ai/dri: 1

    nodeSelector:
      amd.com/gpu: "true"

    tolerations:
      - key: amd.com/gpu
        operator: Exists
        effect: NoSchedule

    monitoring:
      serviceMonitor:
        enabled: true
        relabelings:
          - action: replace
            regex: (.*)
            replacement: $1
            sourceLabels:
              - __meta_kubernetes_pod_node_name
            targetLabel: kubernetes_node
          - action: replace
            regex: (.*)
            replacement: $1
            sourceLabels:
              - __meta_kubernetes_pod_node_name
            targetLabel: nodename
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          folder: hardware
          matchLabels:
            grafana.internal/instance: grafana
