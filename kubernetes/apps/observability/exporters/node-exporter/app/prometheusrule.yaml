---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gpu.rules
spec:
  groups:
    - name: amdgpu
      rules:
        - alert: HighGpuUsage
          expr: |
            max by (nodename) (node_drm_gpu_busy_percent) > 85
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "High GPU usage on node {{ $labels.nodename }} for 15 minutes"
            description: "GPU usage on node {{ $labels.nodename }} has been above 85% for over 15 minutes"
