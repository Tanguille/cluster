---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: moonraker-obico
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template

  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault

    controllers:
      moonraker-obico:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          render-config:
            image:
              repository: busybox
              tag: 1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
            command:
              - /bin/sh
              - -ec
              - |
                config_file=/opt/printer_data/config/moonraker-obico.cfg
                token="`awk '
                  /^\[server\]/ { in_server=1; next }
                  /^\[/ { in_server=0 }
                  in_server {
                    line=$0
                    sub(/^[[:space:]]*/, "", line)
                    if (line ~ /^auth_token[[:space:]]*=/) {
                      sub(/^auth_token[[:space:]]*=[[:space:]]*/, "", line)
                      print line
                      exit
                    }
                  }
                ' "$config_file" 2>/dev/null || true`"

                awk -v token="$token" '
                  { print }
                  /^\[server\]/ && token != "" && !done {
                    print "auth_token = " token
                    done=1
                  }
                ' /config-template/moonraker-obico.cfg > "$config_file.tmp"
                mv "$config_file.tmp" "$config_file"

                if [ -n "$token" ]; then
                  echo "Rendered config and preserved auth_token"
                else
                  echo "Rendered config without auth_token; run link flow"
                fi
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
        containers:
          app:
            image:
              repository: ghcr.io/thespaghettidetective/moonraker-obico
              tag: v2.2.2@sha256:87e835d95047899119b29a5b5b6d60689eb8b1cadc20d55acda5bc118e62efa3
            command:
              - /opt/venv/bin/python
            args:
              - -m
              - moonraker_obico.app
              - -c
              - /opt/printer_data/config/moonraker-obico.cfg
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
          moonraker-proxy:
            image:
              repository: nginx
              tag: 1.31.2-alpine@sha256:81595dd77c2cc4ec66c6721daa3c13b6a1f7bb3a8a2cd3247a874e3bd5c39dd2
            command:
              - nginx
            args:
              - -c
              - /config/nginx.conf
              - -g
              - daemon off;
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
              limits:
                memory: 64Mi

    persistence:
      config:
        enabled: true
        storageClass: ceph-block
        accessMode: ReadWriteOnce
        size: 1Gi
        advancedMounts:
          moonraker-obico:
            render-config:
              - path: /opt/printer_data/config
            app:
              - path: /opt/printer_data/config
      logs:
        type: emptyDir
        advancedMounts:
          moonraker-obico:
            app:
              - path: /opt/printer_data/logs
      janus-runtime:
        type: emptyDir
        advancedMounts:
          moonraker-obico:
            app:
              - path: /opt/moonraker-obico/moonraker_obico/bin/janus/runtime
      tmp:
        type: emptyDir
        advancedMounts:
          moonraker-obico:
            app:
              - path: /tmp
            moonraker-proxy:
              - path: /tmp
      config-template:
        type: configMap
        name: moonraker-obico-config
        advancedMounts:
          moonraker-obico:
            render-config:
              - path: /config-template/moonraker-obico.cfg
                subPath: moonraker-obico.cfg
            moonraker-proxy:
              - path: /config/nginx.conf
                subPath: nginx.conf
                readOnly: true
