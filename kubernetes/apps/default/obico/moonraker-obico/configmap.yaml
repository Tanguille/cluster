---
apiVersion: v1
kind: ConfigMap
metadata:
  name: moonraker-obico-config
data:
  nginx.conf: |
    worker_processes 1;
    pid /tmp/nginx.pid;

    events {
      worker_connections 128;
    }

    http {
      access_log off;
      error_log /dev/stderr warn;

      client_body_temp_path /tmp/client_body;
      proxy_temp_path /tmp/proxy;
      fastcgi_temp_path /tmp/fastcgi;
      uwsgi_temp_path /tmp/uwsgi;
      scgi_temp_path /tmp/scgi;

      map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
      }

      proxy_buffering off;
      proxy_http_version 1.1;

      server {
        listen 127.0.0.1:7125;

        location = /machine/update/status {
          default_type application/json;
          return 200 '{"result":{"busy":false,"github_rate_limit":0,"github_requests_remaining":0,"github_limit_reset_time":0,"version_info":{}}}';
        }

        location = /machine/device_power/devices {
          default_type application/json;
          return 200 '{"result":{"devices":[]}}';
        }

        location / {
          proxy_set_header Host 192.168.0.95;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
          proxy_pass http://192.168.0.95:80;
        }
      }
    }

  # Static config rendered into the writable runtime file on each pod start.
  # The init container preserves auth_token written by the Obico link flow.
  moonraker-obico.cfg: |
    [server]
    url = https://obico.${SECRET_DOMAIN}

    [moonraker]
    host = 127.0.0.1
    port = 7125

    [webcam]
    stream_mode = mjpeg_webrtc
    resolution = 640x480
    target_fps = 10
    snapshot_url = http://192.168.0.95/webcam/?action=snapshot
    stream_url = http://192.168.0.95/webcam/?action=stream

    [tunnel]
    dest_host = 192.168.0.95
    dest_port = 80
    dest_is_ssl = False

    [logging]
    path = /opt/printer_data/logs/moonraker-obico.log
    level = INFO
