---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: obico
  namespace: &namespace default
spec:
  targetNamespace: *namespace
  dependsOn:
    - name: dragonfly-cluster
      namespace: database
  path: ./kubernetes/apps/default/obico/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 30m
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: moonraker-obico
  namespace: &namespace default
spec:
  targetNamespace: *namespace
  dependsOn:
    - name: obico
  path: ./kubernetes/apps/default/obico/moonraker-obico
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 30m
