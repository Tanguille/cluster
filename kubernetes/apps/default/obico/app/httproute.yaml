---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: obico
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Obico
    gethomepage.dev/description: 3D print monitoring
    gethomepage.dev/group: Utilities
    gethomepage.dev/icon: obico.png
    # app-template labels the pod app.kubernetes.io/name=server, so homepage's
    # default name=obico selector never matches
    gethomepage.dev/pod-selector: app.kubernetes.io/instance=obico
spec:
  hostnames:
    - obico.${SECRET_DOMAIN}
  parentRefs:
    - name: envoy-internal
      namespace: network
  rules:
    - backendRefs:
        - name: obico-server
          port: 3334
