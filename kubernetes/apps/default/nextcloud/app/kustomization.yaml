---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - grafanadashboard.yaml
  - helmrelease.yaml
  - httproutefilter.yaml
  - secret.sops.yaml
  - nfs-pvc.yaml
  - ocirepository.yaml
configMapGenerator:
  - name: nextcloud-scripts
    files:
      - scripts/cron.sh
      - scripts/post-start.sh
    options:
      annotations:
        # Plain shell scripts: their ${vars} are shell syntax, not flux vars —
        # without this, strict postBuild envsubst fails the build on "${cmd}".
        kustomize.toolkit.fluxcd.io/substitute: disabled
generatorOptions:
  disableNameSuffixHash: true
