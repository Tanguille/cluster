---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app nextcloud
spec:
  timeout: 15m
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: nextcloud

  # FROM_ADDRESS lives in the app's sops secret, NOT in cluster-secrets — ${VAR}
  # substitution never resolved it (silently empty until flux strict mode made it
  # a build error). Chart 9.2.0 has no fromAddressKey in existingSecret (it reads
  # a plain value at nextcloud.mail.fromAddress), so inject it flux-natively here.
  # SMTP_HOST needs no injection: existingSecret.smtpHostKey wires it directly.
  valuesFrom:
    - kind: Secret
      name: nextcloud-secret
      valuesKey: FROM_ADDRESS
      targetPath: nextcloud.mail.fromAddress

  values:
    prometheus:
      rules:
        enabled: true

    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - control-1
    image:
      flavor: fpm

    lifecycle:
      postStartCommand:
        - "/bin/bash"
        - "/scripts/post-start.sh"

    nginx:
      enabled: true
      config:
        headers:
          "Strict-Transport-Security": "max-age=15552000; includeSubDomains"
        serverBlockCustom: |
          client_max_body_size 10G;
          client_body_timeout 300s;
          fastcgi_buffers 64 4K;
          fastcgi_read_timeout 3600s;

          # Handle forwarded headers for proper protocol detection
          real_ip_header X-Forwarded-For;
          set_real_ip_from 10.0.0.0/8;
          set_real_ip_from 172.16.0.0/12;
          set_real_ip_from 192.168.0.0/16;
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

    nextcloud:
      datadir: /var/www/data
      extraEnv:
        - name: REDIS_HOST
          value: dragonfly.database.svc.cluster.local
        - name: REDIS_HOST_PORT
          value: "6379"
        # Ensure system binaries are in PATH for proc_open (helps with Memories app)
        - name: PATH
          value: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

      existingSecret:
        enabled: true
        secretName: nextcloud-secret
        usernameKey: NEXTCLOUD_USERNAME
        passwordKey: NEXTCLOUD_PASSWORD
        smtpUsernameKey: SMTP_USERNAME
        smtpPasswordKey: SMTP_PASSWORD
        smtpHostKey: SMTP_HOST

      host: nextcloud.${SECRET_DOMAIN}

      mail:
        enabled: true
        # fromAddress injected via spec.valuesFrom (see top of file); the SMTP
        # host/credentials come from existingSecret.smtp*Key above
        domain: gmail.com
        smtp:
          secure: starttls

      # Security context - allow root for entrypoint, then drops to www-data
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      podSecurityContext:
        fsGroup: 33

      extraVolumes:
        - name: scripts
          configMap:
            name: nextcloud-scripts
            defaultMode: 0755
        - name: replica-config
          secret:
            secretName: nextcloud-secret
            items:
              - key: replica.config.php
                path: replica.config.php

      extraVolumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
        - name: replica-config
          mountPath: /var/www/html/config/replica.config.php
          subPath: replica.config.php
          readOnly: true

      phpConfigs:
        www.conf: |
          [www]
          user = www-data
          group = www-data
          listen = 127.0.0.1:9000
          pm = dynamic
          pm.max_children = 4
          pm.start_servers = 4
          pm.min_spare_servers = 2
          pm.max_spare_servers = 4
          pm.max_requests = 800
          request_terminate_timeout = 600
        php.ini: |
          max_execution_time = 600
          default_socket_timeout = 300
          curl.cainfo = /etc/ssl/certs/ca-certificates.crt
          extension=imagick
          extension=exif
          extension=intl
          extension=gd
          memory_limit = 8G
          opcache.memory_consumption = 512
          opcache.max_accelerated_files = 20000
          opcache.revalidate_freq = 60

      configs:
        logging.config.php: |-
          <?php
          $CONFIG = array (
            'log_type' => 'file',
            'logfile' => 'nextcloud.log',
            'loglevel' => 1,
            'logdateformat' => 'F d, Y H:i:s'
            );
        proxy.config.php: |-
          <?php
          $CONFIG = array (
            'trusted_proxies' => array(
              0 => '127.0.0.1',
              1 => '10.0.0.0/8',
              2 => '172.16.0.0/12',
              3 => '192.168.0.0/16',
            ),
            'trusted_domains' => array(
              0 => 'nextcloud.${SECRET_DOMAIN}',
              1 => 'localhost',
              2 => '127.0.0.1',
            ),
            'forwarded_for_headers' => array('HTTP_X_FORWARDED_FOR'),
          );
        ingress.config.php: |-
          <?php
          $CONFIG = array (
            'overwrite.cli.url' => 'https://nextcloud.${SECRET_DOMAIN}',
          );
        misc.config.php: |-
          <?php
          $CONFIG = array (
            'default_phone_region' => 'BE',
            'maintenance_window_start' => 2,
            'debug' => false,
            'loglevel' => 1,
            'allow_local_remote_servers' => true,
          );
        caching.config.php: |-
          <?php
          $CONFIG = array (
            'memcache.local' => '\\OC\\Memcache\\APCu',
            'memcache.distributed' => '\\OC\\Memcache\\Redis',
            'memcache.locking' => '\\OC\\Memcache\\Redis',
            'filelocking.enabled' => true,
            'redis' => array(
              'host' => 'dragonfly.database.svc.cluster.local',
              'port' => 6379,
              'timeout' => 0.0,
              'password' => '',
            ),
          );
        performance.config.php: |-
          <?php
          $CONFIG = array (
            'enable_previews' => true,
            'enabledPreviewProviders' => array(
              'OC\Preview\PNG',
              'OC\Preview\JPEG',
              'OC\Preview\GIF',
              'OC\Preview\BMP',
              'OC\Preview\XBitmap',
              'OC\Preview\MP3',
              'OC\Preview\TXT',
              'OC\Preview\MarkDown',
              'OC\Preview\OpenDocument',
              'OC\Preview\Krita',
              'OC\Preview\HEIC',
              'OC\Preview\PDF',
              'OC\Preview\TIFF',
              'OC\Preview\SVG',
              'OC\Preview\MP4',
              'OC\Preview\Movie',
            ),
            'preview_max_x' => 2048,
            'preview_max_y' => 2048,
            'preview_max_scale_factor' => 1,
            'preview_concurrency_new' => 4,
            'preview_concurrency_all' => 4,
            'jpeg_quality' => 60,
          );

    deploymentAnnotations:
      reloader.stakater.com/auto: "true"

    internalDatabase:
      enabled: false

    externalDatabase:
      enabled: true
      type: postgresql
      host: pgbouncer-rw.database.svc.cluster.local:5432
      database: *app
      existingSecret:
        enabled: true
        secretName: nextcloud-secret
        usernameKey: INIT_POSTGRES_USER
        passwordKey: INIT_POSTGRES_PASS

    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/enabled: "false"
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: Nextcloud
        gethomepage.dev/description: Files, calendar, contacts
        gethomepage.dev/group: Portals
        gethomepage.dev/icon: nextcloud.png
        gethomepage.dev/href: https://nextcloud.${SECRET_DOMAIN}
        gethomepage.dev/widget.type: nextcloud
        gethomepage.dev/widget.url: https://nextcloud.${SECRET_DOMAIN}
        gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_NEXTCLOUD_TOKEN}}"
      hostnames:
        - "nextcloud.${SECRET_DOMAIN}"
      parentRefs:
        - name: envoy-external
          namespace: network
      rules:
        # Route /push/ to notify_push service (must be before catch-all route)
        - matches:
            - path:
                type: PathPrefix
                value: /push/
          backendRefs:
            - name: notify-push
              port: 7867
        - backendRefs: &backendRef
            - name: nextcloud
              port: 8080
          matches:
            - path:
                type: PathPrefix
                value: /
        - matches:
            - path:
                type: PathPrefix
                value: /.well-known/webfinger
          filters:
            - type: URLRewrite
              urlRewrite:
                path:
                  type: ReplacePrefixMatch
                  replacePrefixMatch: /index.php/.well-known/webfinger
          backendRefs: *backendRef
        - matches:
            - path:
                type: PathPrefix
                value: /.well-known/nodeinfo
          filters:
            - type: URLRewrite
              urlRewrite:
                path:
                  type: ReplacePrefixMatch
                  replacePrefixMatch: /index.php/.well-known/nodeinfo
          backendRefs: *backendRef
        - matches:
            - path:
                type: Exact
                value: /.well-known/host-meta
          filters:
            - type: URLRewrite
              urlRewrite:
                path:
                  type: ReplaceFullPath
                  replaceFullPath: /public.php?service=host-meta
          backendRefs: *backendRef
        - matches:
            - path:
                type: Exact
                value: /.well-known/host-meta.json
          filters:
            - type: URLRewrite
              urlRewrite:
                path:
                  type: ReplaceFullPath
                  replaceFullPath: /public.php?service=host-meta-json
          backendRefs: *backendRef
        - matches:
            - path:
                type: PathPrefix
                value: /.well-known/caldav
          filters:
            - type: URLRewrite
              urlRewrite:
                path:
                  type: ReplacePrefixMatch
                  replacePrefixMatch: /remote.php/dav
          backendRefs: *backendRef
        - matches:
            - path:
                type: PathPrefix
                value: /.well-known/carddav
          filters:
            - type: URLRewrite
              urlRewrite:
                path:
                  type: ReplacePrefixMatch
                  replacePrefixMatch: /remote.php/dav
          backendRefs: *backendRef
        # Block restricted paths
        - matches:
            - path:
                type: PathPrefix
                value: /build
            - path:
                type: PathPrefix
                value: /tests
            - path:
                type: PathPrefix
                value: /config
            - path:
                type: PathPrefix
                value: /lib
            - path:
                type: PathPrefix
                value: /3rdparty
            - path:
                type: PathPrefix
                value: /templates
            - path:
                type: PathPrefix
                value: /data
            - path:
                type: PathPrefix
                value: /autotest
            - path:
                type: PathPrefix
                value: /occ
            - path:
                type: PathPrefix
                value: /issue
            - path:
                type: PathPrefix
                value: /indie
            - path:
                type: PathPrefix
                value: /db_
            - path:
                type: PathPrefix
                value: /console
          # Deny these paths with an explicit 403 via Envoy Gateway's HTTPRouteFilter
          # (httproutefilter.yaml) — upstream Gateway API has no native deny action yet
          # (https://github.com/kubernetes-sigs/gateway-api/issues/2826).
          filters:
            - type: ExtensionRef
              extensionRef:
                group: gateway.envoyproxy.io
                kind: HTTPRouteFilter
                name: nextcloud-deny

    persistence:
      # Config storage using volsync template PVC (local)
      enabled: true
      existingClaim: *app

      # Data directory using NFS
      nextcloudData:
        enabled: true
        existingClaim: nextcloud-pvc

    cronjob:
      enabled: true
      type: cronjob
      cronjob:
        failedJobsHistoryLimit: 1
        successfulJobsHistoryLimit: 2
        affinity:
          podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: nextcloud
                    app.kubernetes.io/instance: nextcloud
                    app.kubernetes.io/component: app
                topologyKey: kubernetes.io/hostname
        command:
          - /bin/sh
          - /scripts/cron.sh
        securityContext:
          runAsUser: 33
          runAsGroup: 33
          runAsNonRoot: true

    startupProbe:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 10
      successThreshold: 1

    resources:
      requests:
        cpu: 100m
        memory: 500Mi
      limits:
        cpu: 4
        memory: 12Gi
