---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: notify-push
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      notify-push:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            # No official image; using icewind1991/notify_push (Nextcloud contributor).
            # Track https://github.com/nextcloud/notify_push for an official image.
            image:
              repository: icewind1991/notify_push
              tag: 1.3.2@sha256:68d130b989b5eb60e66bac1200f9d589a9d9c5b64e812caad7a16503cd83579d
            ports:
              - name: http
                containerPort: 7867
                protocol: TCP
            env:
              - name: PORT
                value: "7867"
              - name: NEXTCLOUD_URL
                value: "http://nextcloud.default.svc.cluster.local:8080"
              - name: REDIS_URL
                value: "redis://dragonfly.database.svc.cluster.local:6379"
              - name: DATABASE_PREFIX
                value: "oc_"
              - name: POSTGRES_USER
                valueFrom:
                  secretKeyRef:
                    name: nextcloud-secret
                    key: INIT_POSTGRES_USER
              - name: POSTGRES_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: nextcloud-secret
                    key: INIT_POSTGRES_PASS
              - name: DATABASE_URL
                value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@pgbouncer-rw.database.svc.cluster.local:5432/nextcloud"
              - name: LOG
                value: "info"
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
              limits:
                cpu: 50m
                memory: 96Mi
            # /push/test/cookie returns 400 until Nextcloud notify_push is fully configured; TCP
            # checks that the daemon is listening (see github.com/nextcloud/notify_push/issues/324).
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 7867
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 7867
                  failureThreshold: 30
                  periodSeconds: 5
                  timeoutSeconds: 5
    service:
      app:
        controller: notify-push
        ports:
          http:
            port: 7867
