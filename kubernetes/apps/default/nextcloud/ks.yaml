---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app nextcloud
  namespace: &namespace default
spec:
  targetNamespace: *namespace
  components:
    - ../../../../components/kopiur
    - ../../../../components/nfs-scaler
  dependsOn:
    - name: cloudnative-pg-cluster
      namespace: database
    - name: dragonfly-cluster
      namespace: database
  path: ./kubernetes/apps/default/nextcloud/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 30m
  postBuild:
    substitute:
      APP: *app
      PVC_CAPACITY: 50Gi
      KOPIUR_PUID: "33"
      KOPIUR_PGID: "33"
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: notify-push
  namespace: &namespace default
spec:
  targetNamespace: *namespace
  dependsOn:
    - name: nextcloud
  path: ./kubernetes/apps/default/nextcloud/notify-push
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 30m
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: facerecognition
  namespace: &namespace default
spec:
  targetNamespace: *namespace
  dependsOn:
    - name: nextcloud
  path: ./kubernetes/apps/default/nextcloud/facerecognition
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 30m
