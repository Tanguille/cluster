---
use_default_settings: true

server:
  limiter: true
  image_proxy: true
  method: GET # https://github.com/searxng/searxng/pull/3619

# Limiter needs valkey (Redis-compatible); use same Dragonfly with a different db.
valkey:
  url: valkey://dragonfly.database.svc.cluster.local:6379/11

search:
  # Allow JSON so API/MCP clients (e.g. mcp-searxng) can use format=json; otherwise they get 403.
  formats:
    - html
    - json
  autocomplete: duckduckgo

general:
  instance_name: TangeniusSearch

ui:
  query_in_title: false
  url_formatting: pretty
  static_use_hash: true
  default_theme: simple
  theme_args:
    simple_style: dark
  results_on_new_tab: true

plugins:
  searx.plugins.calculator.SXNGPlugin:
    active: true
  searx.plugins.hash_plugin.SXNGPlugin:
    active: true
  searx.plugins.hostnames.SXNGPlugin:
    active: true
  searx.plugins.infinite_scroll.SXNGPlugin:
    active: true
  searx.plugins.oa_doi_rewrite.SXNGPlugin:
    active: true
  searx.plugins.self_info.SXNGPlugin:
    active: true
  searx.plugins.tracker_url_remover.SXNGPlugin:
    active: true
  searx.plugins.unit_converter.SXNGPlugin:
    active: true

hostnames:
  high_priority:
    - (.*)\/blog\/(.*)
    - (.*\.)?wikipedia.org$
    - (.*\.)?github.com$
    - (.*\.)?reddit.com$
    - (.*\.)?linuxserver.io$
    - (.*\.)?docker.com$
    - (.*\.)?archlinux.org$
    - (.*\.)?stackoverflow.com$
    - (.*\.)?askubuntu.com$
    - (.*\.)?superuser.com$
  remove:
    - (.*\.)?access.redhat.com$

engines:
  # Onion/Tor engines fail to initialize without a Tor proxy.
  - name: ahmia
    disabled: true
  - name: torch
    disabled: true
