---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app changedetection
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template

  values:
    controllers:
      changedetection:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/dgtlmoon/changedetection.io
              tag: 0.55.8@sha256:5438423d5e906eff4e8f7886823482ad23f472bf7b8530ccaca89fb48c337882
            env:
              PORT: &port 5000
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                cpu: 100m
                memory: 256Mi

            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Change Detection
          gethomepage.dev/description: Website change monitor
          gethomepage.dev/group: Utilities
          gethomepage.dev/icon: changedetection.png
          gethomepage.dev/widget.type: changedetectionio
          gethomepage.dev/widget.url: https://changedetection.${SECRET_DOMAIN}
          gethomepage.dev/widget.key: "{{`{{HOMEPAGE_VAR_CHANGEDETECTION_API_KEY}}`}}"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      datastore:
        existingClaim: *app
