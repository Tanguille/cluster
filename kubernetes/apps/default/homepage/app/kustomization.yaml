---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - secret.sops.yaml
  - helmrelease.yaml
configMapGenerator:
  - name: homepage-configmap
    files:
      - ./resources/settings.yaml
      - ./resources/bookmarks.yaml
      - ./resources/widgets.yaml
      - ./resources/kubernetes.yaml
      - ./resources/services.yaml
      # homepage v1.13+ initializes these on its hot paths (services fetch, /api/hash, /api/validate) and exits
      # when it cannot create them on the read-only configMap mount; they must exist even when unused.
      - ./resources/docker.yaml
      - ./resources/proxmox.yaml
      - ./resources/custom.css
      - ./resources/custom.js
generatorOptions:
  disableNameSuffixHash: true
