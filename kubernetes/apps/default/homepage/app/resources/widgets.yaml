---
- greeting:
    text_size: xl
    text: Cluster

- datetime:
    text_size: xl
    format:
      timeStyle: short
      dateStyle: long
      hourCycle: h23

- search:
    provider: custom
    url: https://searxng.${SECRET_DOMAIN}/search?q=
    target: _blank

- kubernetes:
    cluster:
      show: true
      cpu: true
      memory: true
      showLabel: true
      label: cluster
    nodes:
      show: true
      cpu: true
      memory: true
      showLabel: true

# No `resources` widget: it reads only the node homepage is scheduled on,
# duplicating the kubernetes nodes widgets above with a vaguer label.
