---
- greeting:
    text_size: xl
    text: Cluster

- datetime:
    text_size: xl
    format:
      timeStyle: short
      dateStyle: long
      hourCycle: h23

- search:
    provider: custom
    url: https://searxng.${SECRET_DOMAIN}/search?q=
    target: _blank

- kubernetes:
    cluster:
      show: true
      cpu: true
      memory: true
      showLabel: true
      label: cluster
    nodes:
      show: true
      cpu: true
      memory: true
      showLabel: true

- resources:
    cpu: true
    memory: true
    label: resources

# kromgo metrics live as customapi service tiles in the Status group
# (services.yaml): customapi is a service widget only — homepage has no
# customapi info widget, so it cannot render in this header.
