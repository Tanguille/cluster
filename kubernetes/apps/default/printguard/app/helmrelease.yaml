---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app printguard
spec:
  interval: 30m
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: app-template

  values:
    controllers:
      printguard:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          prepare-dirs:
            image:
              repository: ghcr.io/home-operations/busybox
              tag: 1.37.0@sha256:026ed7273270ec08f6902b4ae8334c23b473e5394bec3bbbdbfe580c710d50bc
            command:
              - sh
              - -c
              - |
                mkdir -p /data/tmp /data/cache/huggingface/hub
                chown -R 1000:1000 /data/tmp /data/cache
            securityContext:
              runAsNonRoot: false
              runAsUser: 0
          # huggingface_hub chmod step creates tmp_* under site-packages/printguard/ (sibling of
          # model/); that path is root-owned in the image. Seed a writable tree on the PVC once.
          # After a printguard image tag change, clear subPath printguard-pkg on the PVC (or delete
          # app.py there) so this re-copies application code from the new image.
          seed-printguard:
            image: &printguardImage
              repository: ghcr.io/oliverbravery/printguard
              tag: latest@sha256:220f3e174c006e9565798d11669b4a3b637061f225e6988548051c6e99085b79
            command:
              - sh
              - -c
              - |
                set -e
                if [ ! -f /pkg/app.py ]; then
                  cp -a /usr/local/lib/python3.11/site-packages/printguard/. /pkg/
                fi
                chown -R 1000:1000 /pkg
            securityContext:
              runAsNonRoot: false
              runAsUser: 0
        containers:
          app:
            image: *printguardImage
            env:
              TZ: ${TIMEZONE}
              # Upstream detects Docker via /.dockerenv (absent on containerd/Talos)
              # and falls back to platformdirs $HOME/.local/share. Redirect via XDG.
              XDG_DATA_HOME: /data
              # HF downloads use tempfile next to site-packages/printguard (read-only for UID 1000)
              # and cache paths under model/. Keep temp + hub cache on the PVC.
              TMPDIR: /data/tmp
              TMP: /data/tmp
              TEMP: /data/tmp
              HF_HOME: /data/cache/huggingface
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 8000
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 60
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 2Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      data:
        enabled: true
        storageClass: ceph-block
        accessMode: ReadWriteOnce
        size: 10Gi
        globalMounts:
          - path: /data
      # Writable copy of the printguard Python tree (models, hf tmp, chmod umask probe); see seed init.
      printguard-pkg:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          printguard:
            seed-printguard:
              - path: /pkg
                subPath: printguard-pkg
            app:
              - path: /usr/local/lib/python3.11/site-packages/printguard
                subPath: printguard-pkg
