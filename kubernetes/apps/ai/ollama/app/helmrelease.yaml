---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template

  values:
    defaultPodOptions:
      runtimeClassName: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu
                    operator: In
                    values: ["true"]
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ollama/ollama
              tag: 0.20.3
            env:
              TZ: ${TIMEZONE}
              # Don't set CUDA_VISIBLE_DEVICES: log warns "if GPUs not correctly discovered, unset and try again"; single-GPU pod has one device anyway
              OLLAMA_HOST: "0.0.0.0"
              OLLAMA_ORIGINS: "*"
              OLLAMA_CONTEXT_LENGTH: "100000"
              OLLAMA_MODELS: /models
              OLLAMA_FLASH_ATTENTION: "1"
              # K/V cache (docs.ollama.com/faq): q8_0 uses ~1/2 memory of f16, minimal quality impact
              OLLAMA_KV_CACHE_TYPE: "q8_0"
            probes:
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /api/tags
                    port: 11434
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 30
              liveness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 500m
                memory: 2Gi
                nvidia.com/gpu: 1
              limits:
                cpu: 8
                memory: 12Gi
                nvidia.com/gpu: 1
    service:
      app:
        controller: app
        ports:
          http:
            port: 11434

    persistence:
      config:
        enabled: true
        existingClaim: ollama
        globalMounts:
          - path: /models
