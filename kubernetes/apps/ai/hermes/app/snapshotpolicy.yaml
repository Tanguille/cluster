---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: hermes
spec:
  repository:
    kind: ClusterRepository
    name: kopia-nas
  sources:
    - pvc:
        name: hermes
      # The fork's mover always recorded /data regardless of the app's real
      # mount path — kopiur's own default (/pvc/<name>) would start a new
      # identity strand instead of continuing the adopted history.
      sourcePathOverride: /data
  compression:
    compressor: zstd
  # keepHourly lowered from 24: see kubernetes/components/kopiur/backup/
  # snapshotpolicy.yaml for the shared-repo ConfigMap-size ceiling reason
  # (home-operations/kopiur#237).
  retention:
    keepHourly: 8
    keepDaily: 7
  volumeSnapshotClassName: csi-ceph-blockpool
  credentialProjection:
    enabled: true
  # hermes's data is owned 10000:10000 (not the cluster's usual 568/65532
  # convention), same reason the volsync fork carries VOLSYNC_PUID/PGID:
  # "10000" for this app. A hardcoded runAsUser/runAsGroup here fixed
  # source-PVC reads but broke repo-connect (repo blobs are owned by the
  # shared uid, not 10000) — inherit from the live pod instead, same as
  # every other app.
  mover:
    inheritSecurityContextFrom:
      pvcConsumer: {}
