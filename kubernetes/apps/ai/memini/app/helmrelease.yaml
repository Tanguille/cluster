---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: memini
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: memini

  values:
    controllers:
      main:
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
            envFrom: &envFrom
              - secretRef:
                  name: memini-secret

        containers:
          main:
            envFrom: *envFrom
            env:
              TZ: ${TIMEZONE}
              MEMINI_BACKEND: "postgres"
              MEMINI_EMBED_BASE_URL: "http://llama-server.ai.svc.cluster.local/v1"
              MEMINI_EMBED_MODEL: "qwen3-embedding"
              MEMINI_EMBED_DIMS: "1024"
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 1
                memory: 512Mi

    persistence:
      data:
        enabled: false

    route:
      ui:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"

    serviceMonitor:
      main:
        enabled: true

    grafanaDashboards:
      enabled: true
