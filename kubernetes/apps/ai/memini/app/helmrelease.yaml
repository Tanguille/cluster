---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app memini
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: memini

  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
            envFrom:
              - secretRef:
                  name: &secret memini-secret

        containers:
          main:
            envFrom:
              - secretRef:
                  name: *secret
            env:
              TZ: ${TIMEZONE}
              MEMINI_BACKEND: "postgres"
              MEMINI_LOG_LEVEL: "info"
              MEMINI_LOG_FORMAT: "json"
              MEMINI_DEFAULT_NAMESPACE: "default"
              MEMINI_NAMESPACE_HEADER: "X-Memini-Namespace"
              MEMINI_SWEEP_INTERVAL: "1h"
              MEMINI_EMBED_BASE_URL: "http://llama-server.ai.svc.cluster.local/v1"
              MEMINI_EMBED_MODEL: "qwen3-embedding"
              MEMINI_EMBED_DIMS: "1024"
              MEMINI_POSTGRES_DSN:
                valueFrom:
                  secretKeyRef:
                    name: *secret
                    key: MEMINI_POSTGRES_DSN
              MEMINI_UI_ENABLED: "true"

            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 1
                memory: 512Mi

    service:
      main:
        controller: main
        ports:
          http:
            port: 8080

    route:
      main:
        enabled: false
      internal:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        rules:
          - backendRefs:
              - identifier: main
                port: http

    persistence:
      data:
        enabled: false
        accessMode: ReadWriteOnce
        size: 1Gi

    serviceMonitor:
      main:
        enabled: true
        endpoints:
          - port: http
            path: /metrics
            interval: 30s
            scrapeTimeout: 10s
