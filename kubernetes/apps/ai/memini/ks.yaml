---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app memini
  namespace: &namespace ai
spec:
  targetNamespace: *namespace
  interval: 30m
  path: ./kubernetes/apps/ai/memini/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
