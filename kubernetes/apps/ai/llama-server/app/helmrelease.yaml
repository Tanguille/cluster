---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-server
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          # Hard gate to the GPU node; complements the soft control-1 pin from affinity-control-1.
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: amd.com/gpu
                    operator: In
                    values: ["true"]
      # Root + video/render groups + Unconfined seccomp = ROCm device access, matching the
      # cluster's other GPU pods. The image itself defaults to a non-root user; this overrides it.
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        supplementalGroups:
          - 44 # video — /dev/dri
          - 226 # render — /dev/dri/renderD* + /dev/kfd (ROCm compute)
        seccompProfile:
          type: Unconfined # ROCm/HIP needs unrestricted syscalls

    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # Custom llama.cpp gfx1201 build (docker/llama-cpp-rocm/) — ROCm 7.13 gfx120X-tuned
              # for ~34 tok/s + MTP. Tag rebuilt in place; Renovate digest-pins it.
              repository: ghcr.io/tanguille/llama-cpp-rocm-gfx1201
              tag: gfx1201
            env:
              TZ: ${TIMEZONE}
              LLAMA_CACHE: /cache # -hf downloads the GGUF here (the cache PVC); ties to the mount below
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              # Unsloth MTP GGUF (UD-Q4_K_XL, MTP head embedded). First boot downloads ~18Gi to /cache.
              - -hf
              - unsloth/Qwen3.6-27B-MTP-GGUF
              - --hf-file
              - Qwen3.6-27B-UD-Q4_K_XL.gguf
              - --alias
              - qwen-3.6 # served-model-name litellm targets
              - -ngl
              - "99"
              - --fit
              - "off" # we pin ngl/ctx; the auto-fit step hangs on this model (708Mi MTP ctx + q8 KV)
              - --no-mmap # REQUIRED: mmap re-faults the 18Gi weights from the PVC on cold cache (130s+ load)
              - -fa
              - "1"
              - -ctk
              - q8_0 # near-lossless KV; gibberish-safe at full context (q4_0 only if VRAM-bound)
              - -ctv
              - q8_0
              - -c
              - "262144" # full native context (Qwen3-Next 256K); only 16/64 layers grow KV
              - -np
              - "1" # max 1 session for now (frees VRAM for full-context q8_0 KV)
              # MTP self-speculative decoding: 34 tok/s (n-max=3 was the sweep optimum, 1.42x baseline).
              - --spec-type
              - draft-mtp
              - --spec-draft-n-max
              - "3"
              # Prompt cache (host RAM) — agentic prefix reuse, 7.5x warm TTFT. Coexists with batching.
              - --cache-ram
              - "8192"
              - --ctx-checkpoints
              - "32"
              # Unsloth thinking-mode sampling defaults (agentic reasoning workload).
              - --temp
              - "1.0"
              - --top-k
              - "20"
              - --top-p
              - "0.95"
              - --min-p
              - "0.0"
              - --jinja # use the GGUF chat template (tool-calling / thinking split)
              - --metrics
              - --slots
            probes:
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 15
                  periodSeconds: 15
                  timeoutSeconds: 5
                  # First boot: ~18Gi GGUF download + load. Generous ceiling (~20 min).
                  failureThreshold: 80
              liveness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 2
                memory: 12Gi
                squat.ai/dri: 1
              limits:
                cpu: 12
                memory: 28Gi # 8Gi prompt cache + load buffers + headroom (weights live in VRAM)
                squat.ai/dri: 1

    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: llama-server
          gethomepage.dev/description: Qwen3.6-27B inference (llama.cpp/ROCm, RDNA4, MTP)
          gethomepage.dev/group: Models
          gethomepage.dev/icon: mdi-brain
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 80

    persistence:
      cache:
        enabled: true
        existingClaim: llama-server
        globalMounts:
          - path: /cache
      # llama.cpp uses /dev/shm for slot/IPC; bump from the default 64Mi.
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 2Gi
        globalMounts:
          - path: /dev/shm
