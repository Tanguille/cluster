---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-server
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      runtimeClassName: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu
                    operator: In
                    values: ["true"]
    controllers:
      app:
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-cuda@sha256:59c573293f125517851cf3a5e7cd209d353acf21c0f0559252cb1784084a145b
            env:
              TZ: ${TIMEZONE}
              # Keep multi-GB GGUF downloads on the PVC across pod restarts.
              HF_HOME: /cache
            command:
              - /app/llama-server
            args:
              - --host
              - 0.0.0.0
              - --alias
              - self-hosted
              - -hf
              - unsloth/Qwen3.5-9B-GGUF:UD-Q5_K_XL
              - --jinja
              - --ctx-size
              - "160000"
              - --parallel
              - "4"
              - --n-gpu-layers
              - "9999"
              - --cache-type-k
              - q8_0
              - --cache-type-v
              - q8_0
              # Pin the 248k-vocab embedding to GPU; otherwise the output
              # projection traverses PCIe once per generated token.
              - --override-tensor
              - token_embd\.weight=CUDA0
              # Hybrid DeltaNet+Attention: context-shift corrupts SSM state.
              - --no-context-shift
              # Default reads host cores, ignoring the cgroup CPU limit.
              - --threads
              - "4"
              - --threads-batch
              - "4"
              # Unsloth "precise coding" preset.
              - --temp
              - "0.6"
              - --top-p
              - "0.95"
              - --top-k
              - "20"
              - --metrics
            probes:
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /health
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 3
                  # First boot downloads ~8 GiB; 180 x 5s = 15 min.
                  failureThreshold: 180
              liveness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  # /health shares the HTTP pool with inference; tolerate
                  # stalls during long prefills.
                  failureThreshold: 6
              readiness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            resources:
              requests:
                cpu: 500m
                memory: 2Gi
                nvidia.com/gpu: 1
              limits:
                cpu: 4
                memory: 12Gi
                nvidia.com/gpu: 1

    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: 8080

    persistence:
      cache:
        enabled: true
        existingClaim: llama-server
        globalMounts:
          - path: /cache
