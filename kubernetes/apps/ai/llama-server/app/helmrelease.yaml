---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-server
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      runtimeClassName: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu
                    operator: In
                    values: ["true"]
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/turbo-tan/llama.cpp-tq3
              tag: server-cuda12@sha256:9e601549ed91334a84b2f0274f47e359c9941f5e8f182662c76b8a48ebb9bb58
            env:
              TZ: ${TIMEZONE}
              # Direct HuggingFace downloads onto the PVC so multi-GB GGUF
              # files survive pod restarts.
              HF_HOME: /cache
            command:
              - /app/llama-server
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --alias
              - self-hosted
              - -hf
              - unsloth/Qwen3.5-9B-GGUF:Q8_0
              - --jinja
              # Small Qwen3.5 overthinks and leaks tool-call XML inside <think>
              # (llama.cpp #20837). Disable reasoning parsing for agent flows.
              - --reasoning-format
              - none
              - --kv-unified
              - --ctx-size
              - "120000"
              - --parallel
              - "4"
              - --n-gpu-layers
              - "9999"
              - --flash-attn
              - "on"
              # TurboQuant CUDA fork only supports turbo quant on V cache;
              # K must stay q8_0.
              - --cache-type-k
              - q8_0
              - --cache-type-v
              - turbo3_0
              # Qwen3.5's hybrid DeltaNet+Attention breaks llama.cpp's
              # context-shift eviction; error on overflow instead of silently
              # corrupting SSM state.
              - --no-context-shift
              # Periodic KV snapshots: when the hybrid recurrent state
              # invalidates ("forcing full prompt re-processing due to ... SWA
              # or hybrid/recurrent memory" in the logs), restore from the
              # nearest checkpoint instead of re-prefilling from scratch.
              # Unsloth's long-ctx guidance for Qwen3.5 hybrid.
              - --ctx-checkpoints
              - "128"
              - --checkpoint-every-n-tokens
              - "4096"
              # Match the cgroup CPU limit; default picks host cores which is
              # wrong under Kubernetes resource limits.
              - --threads
              - "8"
              - --threads-batch
              - "8"
              # Qwen3.5 instruct-mode sampling (no thinking) per the model card.
              - --temp
              - "0.7"
              - --top-p
              - "0.8"
              - --top-k
              - "20"
              - --min-p
              - "0"
              - --presence-penalty
              - "1.5"
              - --metrics
            probes:
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /health
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 3
                  # First boot pulls ~10GB from HuggingFace before /health
                  # responds; 180 x 5s = 15min accommodates slow links.
                  failureThreshold: 180
              liveness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  # /health shares the HTTP thread pool with inference; a
                  # 100k-token prefill can block it for 60-90s.
                  failureThreshold: 6
              readiness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            resources:
              requests:
                cpu: 500m
                memory: 2Gi
                nvidia.com/gpu: 1
              limits:
                cpu: 8
                memory: 12Gi
                nvidia.com/gpu: 1

    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: 8080

    persistence:
      cache:
        enabled: true
        existingClaim: llama-server
        globalMounts:
          - path: /cache
