---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-server
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          # Hard gate to the GPU node; complements the soft control-1 pin from affinity-control-1.
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: amd.com/gpu
                    operator: In
                    values: ["true"]
      # Root + video/render groups + Unconfined seccomp = ROCm device access, matching the
      # cluster's other GPU pods. The image itself defaults to a non-root user; this overrides it.
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        supplementalGroups:
          - 44 # video — /dev/dri
          - 226 # render — /dev/dri/renderD* + /dev/kfd (ROCm compute)
        seccompProfile:
          type: Unconfined # ROCm/HIP needs unrestricted syscalls

    controllers:
      app:
        # Recreate, not RollingUpdate: this is a singleton holding the node's only squat.ai/dri:1.
        # A rolling update surges the new pod first, but it can't get the GPU until the old one
        # releases it — image bumps would stall with the new pod Pending. Recreate frees the GPU
        # first, then starts the replacement. (Matches the hermes GPU pod.)
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # Custom llama.cpp gfx1201 build (docker/llama-cpp-rocm/) — ROCm 7.13 gfx120X-tuned
              # for ~34 tok/s + MTP. Tag rebuilt in place; Renovate digest-pins it.
              repository: ghcr.io/tanguille/llama-cpp-rocm-gfx1201
              tag: gfx1201@sha256:261330e1c9e32729ef96403cf2bc20be7584192e252ba927905618a2a1708638
            env:
              TZ: ${TIMEZONE}
              LLAMA_CACHE: /cache # GGUF download cache (the cache PVC)
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              # Router mode: per-model serving lives in /app/models.ini (mounted below).
              # --models-max 2 keeps both presets (27B chat + 0.6B embedding) resident.
              - --models-preset
              - /app/models.ini
              - --models-max
              - "2"
              - --metrics
              - --slots
            probes:
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  # Router /health is up at process start (models load lazily) — cover start only.
                  # 30×10s + 10s = ~310s budget: comfortably clears the 130s+ cold load of the 18Gi
                  # weights (no-mmap read from the hostpath PVC) so a slow load never CrashLoops.
                  failureThreshold: 30
              liveness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 2
                # Steady-state reservation: cache-ram (8Gi) + slot/MTP buffers + embedding sidecar
                # process. Request tracks typical use so this singleton isn't the eviction target
                # under node memory pressure (eviction costs a 130s+ cold reload).
                memory: 16Gi
                squat.ai/dri: 1
              limits:
                cpu: 8
                memory: 28Gi
                squat.ai/dri: 1

          # Hot-only metrics gate (busybox; config/llama-metrics-gate.sh). Scrapes the router with
          # autoload=false and always serves 200 so the scrape target never flaps when cold.
          metrics-gate:
            image:
              repository: docker.io/library/busybox
              tag: "1.38.0" # Renovate digest-pins on next run
            command: ["/bin/sh", "/scripts/llama-metrics-gate.sh"]
            ports:
              - name: metrics
                containerPort: 9108
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      [
                        "/bin/sh",
                        "-c",
                        "find /run/metrics/metrics -mmin -1 | grep -q ."
                      ]
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
            securityContext:
              # Root (writes the emptyDir, avoids an fsGroup chown of the cache PVC) but hardened.
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                cpu: 200m
                memory: 64Mi

    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: *port
          metrics:
            port: 9108
            targetPort: 9108

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: llama-server
          gethomepage.dev/description: Qwen3.6-27B inference (llama.cpp/ROCm, RDNA4, MTP)
          gethomepage.dev/group: Models
          gethomepage.dev/icon: mdi-brain
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 80

    persistence:
      # advancedMounts scope these to the app container (keep them off the gate sidecar).
      config:
        type: configMap
        name: llama-server-config
        advancedMounts:
          app:
            app:
              - path: /app/models.ini
                subPath: models.ini
                readOnly: true
      cache:
        enabled: true
        existingClaim: llama-server
        advancedMounts:
          app:
            app:
              - path: /cache
      # llama.cpp uses /dev/shm for slot/IPC; bump from the default 64Mi.
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 2Gi
        advancedMounts:
          app:
            app:
              - path: /dev/shm
      # gate sidecar: script ConfigMap + output dir.
      gate-script:
        type: configMap
        name: llama-metrics-gate
        advancedMounts:
          app:
            metrics-gate:
              - path: /scripts
                readOnly: true
      metrics:
        type: emptyDir
        advancedMounts:
          app:
            metrics-gate:
              - path: /run/metrics
