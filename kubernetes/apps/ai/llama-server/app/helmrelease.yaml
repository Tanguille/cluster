---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-server
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      runtimeClassName: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu
                    operator: In
                    values: ["true"]
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-cuda13@sha256:29426fb45387643a5a66531c30c99dc6762622772bf228f71528ec49ac352f28
            env:
              TZ: ${TIMEZONE}
              LLAMA_CACHE: /cache
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --models-preset
              - /app/models.ini
              - --models-max
              - "1"
              - --metrics
              - --slots
            probes:
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 3
                  # llama.cpp router starts quickly; model load happens on first request.
                  failureThreshold: 12
              liveness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 1
                memory: 6Gi
                nvidia.com/gpu: 1
              limits:
                cpu: 6
                memory: 26Gi
                nvidia.com/gpu: 1

    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 80

    persistence:
      cache:
        enabled: true
        existingClaim: llama-server
        globalMounts:
          - path: /cache
      config:
        type: configMap
        name: llama-server-config
        globalMounts:
          - path: /app/models.ini
            subPath: models.ini
            readOnly: true
