---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-server
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      runtimeClassName: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu
                    operator: In
                    values: ["true"]
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/turbo-tan/llama.cpp-tq3
              tag: server-cuda12@sha256:9e601549ed91334a84b2f0274f47e359c9941f5e8f182662c76b8a48ebb9bb58
            env:
              TZ: ${TIMEZONE}
              # Direct HuggingFace downloads onto the PVC so multi-GB GGUF
              # files survive pod restarts.
              HF_HOME: /cache
            command:
              - /app/llama-server
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - -hf
              - bartowski/Qwen_Qwen3.5-9B-GGUF:Q8_0
              # Unified KV cache shared across slots: a single active request
              # can use the full 120k; when all 4 slots are busy each gets
              - --ctx-size
              - "120000"
              - --parallel
              - "4"
              # Offload all transformer layers to the GPU; sentinel, llama.cpp
              # caps at the actual layer count.
              - --n-gpu-layers
              - "9999"
              - --flash-attn
              - "on"
              # TurboQuant CUDA fork only supports turbo quant on V cache; K must be q8_0.
              - --cache-type-k
              - q8_0
              - --cache-type-v
              - turbo3_0
            probes:
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /health
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 3
                  # First boot pulls ~10GB from HuggingFace before /health
                  # responds; 180 x 5s = 15min accommodates slow links.
                  failureThreshold: 180
              liveness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  # /health shares the HTTP thread pool with inference; a
                  # 100k-token prefill can block it for 60-90s.
                  failureThreshold: 6
              readiness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            resources:
              requests:
                cpu: 500m
                memory: 2Gi
                nvidia.com/gpu: 1
              limits:
                cpu: 8
                memory: 12Gi
                nvidia.com/gpu: 1

    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: 8080

    persistence:
      cache:
        enabled: true
        existingClaim: llama-server
        globalMounts:
          - path: /cache
