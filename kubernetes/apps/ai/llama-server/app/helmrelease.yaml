---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-server
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    timeout: 25m
    remediation:
      retries: 1
  upgrade:
    # vLLM cold start takes ~15-20 min (Dynamo JIT + Triton autotuning + graph capture).
    # Default 5m timeout triggers rollback before the pod is ready.
    timeout: 25m
    remediation:
      retries: 0 # don't rollback on failure — rollback brings back old llama.cpp spec
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          # Hard gate to the GPU node; complements the soft control-1 pin from affinity-control-1.
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: amd.com/gpu
                    operator: In
                    values: ["true"]
      # Root + video/render groups + Unconfined seccomp = ROCm device access via squat.ai/dri:1.
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        supplementalGroups:
          - 44 # video — /dev/dri
          - 226 # render — /dev/dri/renderD* + /dev/kfd (ROCm compute)
        seccompProfile:
          type: Unconfined # ROCm/HIP needs unrestricted syscalls

    controllers:
      app:
        # Recreate, not RollingUpdate: this is a singleton holding the node's only squat.ai/dri:1.
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # Community vLLM ROCm build with gfx1201 patches (kyuz0/vllm-therock-gfx1201).
              # Serving cyankiwi/Qwen3.6-27B-AWQ-INT4 at 234K context with MTP×4 speculative decoding.
              # Benchmark (EXP-011): C=1 19.5 tok/s, C=8 agg 126 tok/s (vs llama.cpp 37 C=1 / 35 C=8).
              repository: docker.io/kyuz0/vllm-therock-gfx1201
              tag: latest
            command:
              - python
              - -m
              - vllm.entrypoints.openai.api_server
            args:
              - --model
              - cyankiwi/Qwen3.6-27B-AWQ-INT4
              # Match the old llama.cpp model name so downstream clients (litellm, toolhive) are unchanged.
              - --served-model-name
              - qwen-3.6
              - --host
              - 0.0.0.0
              - --port
              - "8000"
              # 89% of the 262,144 native context — maximum achievable at 0.95 gpu_util + fp8 KV.
              # 262,144 needs 9.48 GiB KV; only 8.55 GiB available at 0.95 util. See EXP-005.
              - --max-model-len
              - "234320"
              - --max-num-seqs
              - "8"
              - --gpu-memory-utilization
              - "0.95"
              # fp8 KV halves KV footprint vs bf16; Hadamard rotation in the AWQ quant absorbs error.
              - --kv-cache-dtype
              - fp8
              - --enable-prefix-caching
              - --trust-remote-code
              - --no-enable-log-requests
              # MTP self-speculative: 4 draft tokens from the built-in MTP heads; 2.8× C=1 speedup.
              # spec-tokens=5 is worse (lower acceptance + smaller KV pool). See EXP-013.
              - --spec-method
              - mtp
              - --spec-tokens
              - "4"
              # Persist torch.compile (AOT) artifacts to PVC — saves ~5 min per restart.
              # Combined with TRITON_CACHE_DIR, reduces cold start from ~18 min to ~3-5 min.
              - --compilation-config
              - '{"cache_dir": "/cache/compile"}'
            env:
              TZ: ${TIMEZONE}
              HF_HOME: /cache/hf # model weights on the cache PVC
              # Triton JIT cache — persisted to PVC so restarts skip autotuning (~8-10 min saved).
              TRITON_CACHE_DIR: /cache/triton
              HIP_VISIBLE_DEVICES: "0"
              PYTORCH_ROCM_ARCH: gfx1201
              # AITER ops cause hangs on gfx1201 with this vLLM build; disable.
              VLLM_ROCM_USE_AITER: "0"
              FLASH_ATTENTION_TRITON_AMD_ENABLE: "TRUE"
            probes:
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /health
                    port: &port 8000
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 5
                  # vLLM cold start: ~15 min (weight load + Dynamo JIT + Triton autotuning + graph capture).
                  # 120×15s + 60s = ~1860s ≈ 31 min budget so a slow PVC read never CrashLoops.
                  failureThreshold: 120
              liveness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 60
                  periodSeconds: 60
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 2
                memory: 10Gi
                squat.ai/dri: 1
              limits:
                cpu: 12
                memory: 32Gi
                squat.ai/dri: 1

    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: llama-server
          gethomepage.dev/description: Qwen3.6-27B inference (vLLM kyuz0/ROCm, RDNA4, MTP×4, 234K ctx)
          gethomepage.dev/group: Models
          gethomepage.dev/icon: mdi-brain
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 80

    persistence:
      cache:
        enabled: true
        existingClaim: llama-server
        advancedMounts:
          app:
            app:
              - path: /cache
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 4Gi
        advancedMounts:
          app:
            app:
              - path: /dev/shm
