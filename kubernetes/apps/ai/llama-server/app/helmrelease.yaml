---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-server
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      runtimeClassName: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu
                    operator: In
                    values: ["true"]
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-cuda13@sha256:56095506826cc6287d1b3a8448d8e89dbcef739adac92073967e68984d9c7ab5
            env:
              TZ: ${TIMEZONE}
              LLAMA_CACHE: /cache
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --models-preset
              - /app/models.ini
              - --models-max
              - "1"
              - --parallel
              - "1"
              - --metrics
              - --slots
            probes:
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 3
                  # llama.cpp router starts quickly; model load happens on first request.
                  failureThreshold: 12
              liveness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 1
                memory: 6Gi
                nvidia.com/gpu: 1
              limits:
                cpu: 8
                memory: 26Gi
                nvidia.com/gpu: 1
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
          metrics-gate:
            image:
              repository: docker.io/library/python
              tag: 3.13-alpine@sha256:420cd0bf0f3998275875e02ecd5808168cf0843cbb4d3c536432f729247b2acc
            command:
              - python3
              - /scripts/llama-metrics-gate.py
            env:
              LLAMA_BASE_URL: http://127.0.0.1:8080
              LLAMA_MODEL: qwen-3.6
              LLAMA_UPSTREAM_TIMEOUT: "5"
              LLAMA_EXPORTER_PORT: "9108"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9108
                  initialDelaySeconds: 5
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9108
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                cpu: 50m
                memory: 96Mi

    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: *port
          metrics:
            port: 9108
            targetPort: 9108

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 80

    persistence:
      cache:
        enabled: true
        existingClaim: llama-server
        advancedMounts:
          app:
            app:
              - path: /cache
      config:
        type: configMap
        name: llama-server-config
        advancedMounts:
          app:
            app:
              - path: /app/models.ini
                subPath: models.ini
                readOnly: true
      metrics-gate-script:
        type: configMap
        name: llama-metrics-gate
        advancedMounts:
          app:
            metrics-gate:
              - path: /scripts
                readOnly: true
