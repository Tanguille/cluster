---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-server
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          # Hard gate to the GPU node; complements the soft control-1 pin from affinity-control-1.
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: amd.com/gpu
                    operator: In
                    values: ["true"]
      # Root + video/render groups + Unconfined seccomp = ROCm device access, matching the
      # cluster's other GPU pods. The image itself defaults to a non-root user; this overrides it.
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        supplementalGroups:
          - 44 # video — /dev/dri
          - 226 # render — /dev/dri/renderD* + /dev/kfd (ROCm compute)
        seccompProfile:
          type: Unconfined # ROCm/HIP needs unrestricted syscalls

    controllers:
      app:
        # Recreate, not RollingUpdate: this is a singleton holding the node's only squat.ai/dri:1.
        # A rolling update surges the new pod first, but it can't get the GPU until the old one
        # releases it — image bumps would stall with the new pod Pending. Recreate frees the GPU
        # first, then starts the replacement. (Matches the hermes GPU pod.)
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # Custom llama.cpp gfx1201 build (docker/llama-cpp-rocm/) — ROCm 7.13 gfx120X-tuned
              # for ~34 tok/s + MTP. Tag rebuilt in place; Renovate digest-pins it.
              repository: ghcr.io/tanguille/llama-cpp-rocm-gfx1201
              tag: gfx1201@sha256:82fd344a65d98a40b41b26852830a9c6d7775051da3d668b22749fa178c60474
            env:
              TZ: ${TIMEZONE}
              LLAMA_CACHE: /cache # GGUF download cache (the cache PVC)
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              # Router mode: per-model serving lives in /app/models.ini (mounted below).
              # --models-max 2 keeps both presets (27B chat + 0.6B embedding) resident.
              - --models-preset
              - /app/models.ini
              - --models-max
              - "2"
            probes:
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  # Router /health is up at process start; models load via load-on-startup in models.ini.
                  # 30×10s + 10s = ~310s budget: covers the 130s+ cold load of the 18Gi weights
                  # (no-mmap read from the cache PVC) so a slow load never CrashLoops.
                  failureThreshold: 30
              liveness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 2
                memory: 10Gi
                squat.ai/dri: 1
              limits:
                cpu: 12
                memory: 28Gi
                squat.ai/dri: 1

    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: llama-server
          gethomepage.dev/description: Qwen3.6-27B inference (llama.cpp/ROCm, RDNA4, MTP)
          gethomepage.dev/group: Models
          gethomepage.dev/icon: mdi-brain
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 80

    persistence:
      config:
        type: configMap
        name: llama-server-config
        advancedMounts:
          app:
            app:
              - path: /app/models.ini
                subPath: models.ini
                readOnly: true
      cache:
        enabled: true
        existingClaim: llama-server
        advancedMounts:
          app:
            app:
              - path: /cache
      # llama.cpp uses /dev/shm for slot/IPC; bump from the default 64Mi.
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 2Gi
        advancedMounts:
          app:
            app:
              - path: /dev/shm
