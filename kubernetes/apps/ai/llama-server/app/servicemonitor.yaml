---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: llama-server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: llama-server
      app.kubernetes.io/instance: llama-server
  endpoints:
    # vLLM serves a single model on /metrics, so no per-model query params (llama.cpp needed one endpoint per model).
    - port: http
      path: /metrics
      scrapeTimeout: 10s
