---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: llama-server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: llama-server
      app.kubernetes.io/instance: llama-server
  endpoints:
    # One endpoint per router preset. Do NOT list multiple models under one endpoint:
    # the operator emits ?model=a&model=b, which llama.cpp rejects (empty /metrics body).
    - port: http
      path: /metrics
      params:
        model:
          - qwen-3.6
      relabelings:
        - sourceLabels: [__param_model]
          targetLabel: model
      scrapeTimeout: 10s
    - port: http
      path: /metrics
      params:
        model:
          - qwen3-embedding
      relabelings:
        - sourceLabels: [__param_model]
          targetLabel: model
      scrapeTimeout: 10s
