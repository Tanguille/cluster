---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: llama-server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: llama-server
      app.kubernetes.io/instance: llama-server
  endpoints:
    - port: http
      path: /metrics
      params:
        model:
          - qwen-3.6
          - qwen3-embedding
      interval: 1m
      scrapeTimeout: 10s
