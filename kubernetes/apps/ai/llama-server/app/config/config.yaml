---
# Single GPU: only one model runs at a time — llama-swap stops the running
# child before starting the next when a request selects a different model.

# seconds; upper bound for a cold load (large MoE mmap warmup + first-token
# page-fault round-trips from PVC). Default 120s is too tight for MoE models.
healthCheckTimeout: 900

logToStdout: both

macros:
  # Shared flags. $${PORT} must appear literally in each model's cmd — llama-swap
  # validates its presence before macro expansion, so it can't live in here.
  # The doubled `$$` escapes Flux Kustomization postBuild envsubst; the rendered
  # ConfigMap contains literal `${PORT}` / `${common}` for llama-swap to resolve.
  # KV cache: q4_0 K + V with Hadamard transforms (-khad/-vhad) is the
  # ik_llama.cpp maintainer's answer to "TurboQuant" (PRs #1034/#1527/#1547).
  # Halves KV memory at 256k ctx vs q8_0 (≈5 GiB → ≈2.6 GiB), at ~+0.04 PPL
  # cost per his Gemma-4 perplexity tests in PR #1599. Hadamard requires FA,
  # which the runtime engages implicitly with quantized cache.
  common: >
    --host 127.0.0.1
    --jinja
    --cache-type-k q4_0 --cache-type-v q4_0
    -khad -vhad
    --temp 0.6 --top-k 20
    --metrics

models:
  qwen-3.6:
    # 35B-A3B MoE (40 layers: 10 gated-attention + 30 GDN, MoE in every layer).
    # --n-cpu-moe 30 keeps experts of layers 0-29 on CPU + leaves 10 layers'
    # experts on GPU (≈8 GB VRAM). ubatch 2048 needs ~1 GB more compute buffer
    # than 1024 → ~9 GB total active. n-cpu-moe 29 + ubatch 2048 OOM'd
    # CUDA at 185 MB free during compute-buffer alloc (init 250 result=11);
    # 30 leaves ~600 MB headroom for KV growth + safe ubatch 2048 alloc.
    # UD-Q3_K_M (not _XL) — avoids f16 tensors ik_llama.cpp refuses to load.
    # -rtr is ik_llama.cpp-specific (runtime tensor repack for fused kernels);
    # already disables mmap so weights live in anon RSS (kernel can't easily
    # reclaim them, making --mlock redundant — and the container ulimit -l
    # of 8 MB would block mlock anyway without CAP_IPC_LOCK on the pod).
    # preserve_thinking carries thinking traces across turns (Qwen3.6 trained
    # for this) — improves KV reuse and decision consistency in agentic loops.
    ttl: 3600
    aliases:
      - self-hosted
    cmd: >
      /app/llama-server
      --port $${PORT}
      $${common}
      --hf-repo unsloth/Qwen3.6-35B-A3B-GGUF
      --hf-file Qwen3.6-35B-A3B-UD-Q3_K_M.gguf
      --ctx-size 262144
      --parallel 1
      --n-gpu-layers 99
      --n-cpu-moe 30
      --ubatch-size 2048
      --threads 6
      --threads-batch 6
      --slot-save-path /cache/slots
      --top-p 0.95
      --min-p 0.0
      --chat-template-kwargs '{"preserve_thinking":true}'
      --defer-experts
      -rtr

  qwen3-embedding:
    # Qwen3-Embedding-0.6B (decoder-only, last-token pooling per the model card).
    # F16 over Q8 — at 0.6B, weight redundancy is low and quantization noise
    # leaks straight into the output vector geometry, hurting cosine-similarity
    # ranking quality. F16 is only ~1.2 GB so the VRAM saving from quantizing
    # isn't worth the precision loss. Does not use the `common` macro because
    # --jinja / --temp / --top-k are irrelevant for embedding mode and
    # --cache-type-* only buys memory in chat decode.
    # ctx 8k matches Streamystats' movie-metadata snippets with headroom; ubatch
    # equal to ctx-size means a whole document encodes in one forward pass.
    # Short TTL: bulk-embed bursts keep it warm, then it unloads so the 35B chat
    # model can come back without forcing another long no-mmap reload on idle.
    ttl: 600
    cmd: >
      /app/llama-server
      --port $${PORT}
      --host 127.0.0.1
      --metrics
      --embeddings
      --pooling last
      --hf-repo Qwen/Qwen3-Embedding-0.6B-GGUF
      --hf-file Qwen3-Embedding-0.6B-f16.gguf
      --ctx-size 8192
      --batch-size 8192
      --ubatch-size 8192
      --n-gpu-layers 99
      --threads 4
