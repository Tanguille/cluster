version = 1

; Mainline llama.cpp router presets. The router runs one backend model at a
; time on the single RTX 2070 8 GB GPU; requests select the model by the
; OpenAI `model` field. Keep GPU placement on llama.cpp's current automatic
; fit path instead of hard-coding a layer count.
[*]
jinja = true
flash-attn = auto
n-gpu-layers = auto
parallel = 1
metrics = true
slots = true

[qwen-3.6]
; Keep GPU-layer count on llama.cpp's automatic fit path, but offload MoE expert
; tensors to CPU for VRAM headroom on the RTX 2070 8 GB. Use a balanced upstream
; KV cache: q8_0 K for quality-sensitive attention keys, q4_0 V for most of the
; memory savings. Keep a 128k context budget while using moderate batches for
; prompt-processing throughput without returning to the 4096/1024 OOM profile.
; Avoid the RAM prompt-cache path: this GGUF loads an mmproj, cache-reuse is
; disabled for multimodal models, and SWA/hybrid memory forces full prompt
; reprocessing anyway. Saving every idle slot to RAM made prompt updates grow
; into multi-GiB overhead without reducing pp work.
hf-repo = unsloth/Qwen3.6-35B-A3B-GGUF
hf-file = Qwen3.6-35B-A3B-UD-Q3_K_M.gguf
alias = self-hosted
c = 131072
fit = true
fit-ctx = 131072
batch-size = 1024
ubatch-size = 512
cache-type-k = q8_0
cache-type-v = q4_0
flash-attn = on
kv-unified = true
n-cpu-moe = 32
no-mmap = true
threads = 8
threads-batch = 8
temp = 0.6
top-k = 20
top-p = 0.95
min-p = 0.0
chat-template-kwargs = {"preserve_thinking":true}

[qwen3-embedding]
; F16 preserves embedding quality for the small 0.6B model. A full 8k batch
; keeps document embedding throughput high; the router unloads the chat model
; first because --models-max=1 is set on the main process.
hf-repo = Qwen/Qwen3-Embedding-0.6B-GGUF
hf-file = Qwen3-Embedding-0.6B-f16.gguf
embeddings = true
pooling = last
c = 8192
batch-size = 8192
ubatch-size = 8192
n-gpu-layers = auto
threads = 4
