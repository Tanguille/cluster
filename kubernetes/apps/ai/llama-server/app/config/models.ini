version = 1

; llama.cpp router presets (--models-preset). Clients pick the model via the OpenAI `model`
; field; per-model metrics at /metrics?model=<id>. R9700 (gfx1201, 32 GB); --models-max 2 keeps
; both presets resident (no idle eviction).
[*]
metrics = true
; Single chat slot: one agent decodes at full speed + MTP; extra chat requests queue in
; llama-server (requests_deferred) instead of sharing the GPU and trashing cache-ram / GDN
; checkpoints. Measured: parallel=2 gave ~9–14 tok/s per session + frequent full 20k+ re-prefills;
; parallel=1 + defer beats that for agentic workloads. Embeddings still route as separate requests.
parallel = 1
kv-unified = true
; Agent runs routinely exceed 120s (3k+ tokens @ ~26 tok/s) and queue behind parallel=1.
timeout = 600

[qwen-3.6]
; 27B config: full 256K ctx + q4_0 KV on the 32 GB GPU. ~34–37 tok/s short-session with MTP.
; Qwen3.6 is parameter-dense but HYBRID-attention (GatedDeltaNet + gated attn, ~16/64 KV-bearing
; layers) — that small KV-layer count is why a full 256K KV cache fits in 32 GiB (q8 fit too, but
; q4_0 frees ~6 GiB so qwen3-embedding can be GPU-resident alongside chat — see cache-type below).
; MTP: ~1.5x on short/medium prompts (acceptance ~0.75+); long agent contexts (20k+) drop to
; ~0.55–0.62 acceptance → ~26 tok/s — still beats spec-off (~24). temp=1.0 is Unsloth thinking
; default; lower temp hurts draft verification on long reasoning blocks.
hf-repo = unsloth/Qwen3.6-27B-MTP-GGUF
hf-file = Qwen3.6-27B-UD-Q4_K_XL.gguf
n-gpu-layers = 99
fit = off # auto-fit hangs on this model (MTP ctx + q8 KV); pin ngl/ctx instead
no-mmap = true # mmap re-faults the 18Gi weights from the cache PVC (130s+ cold load)
flash-attn = on
load-on-startup = true
; mmproj-BF16 (~889 MiB) defaults to GPU alongside the 27B stack, eating VRAM + encode compute
; buffers (~1–5 GiB per image). CPU offload keeps vision available but frees GPU headroom for
; chat KV + qwen3-embedding co-residency; image prefill is slower (acceptable — rare vs text).
no-mmproj-offload = true
image-min-tokens = 1024 # Qwen-VL grounding degrades below 1024 image tokens (load_hparams warning)
ctx-size = 262144
# q4_0 (down from q8_0) frees ~6 GiB of KV so qwen3-embedding fits GPU-resident alongside chat
# (--models-max 2); it was hung in "loading" at q8 for lack of headroom.
# MUST be q4_0 or q8_0, NOT q5_1/q5_0/iq4_nl: with flash-attn on, this image's default build
# (no GGML_CUDA_FA_ALL_QUANTS) only compiles FA kernels for f16/bf16/q4_0/q8_0 KV — any other
# type loads but HANGS at decode (no matching kernel). q5_1 was tried and took chat down. K and
# V must also match type to stay fused. q4_0 is the intended target of the Hadamard activation
# rotation (llama.cpp #21038, compiled in + default-on for quantized KV), which absorbs most of
# the q4 error. If quality regresses, revert to q8_0 and trim ctx-size instead (lossless).
cache-type-k = q4_0
cache-type-v = q4_0
spec-type = draft-mtp # MTP self-speculative decoding, ~1.5x single-stream when acceptance >0.7
spec-draft-n-max = 4
; cache-ram defaults to 8192 MiB — do not raise without bumping helmrelease memory limits (28Gi).
; Hybrid GDN (Qwen3.6): slot KV reuse is broken without dense checkpoints — "forcing full prompt
; re-processing" means the entire 20k+ context is re-prefilled (~40s). Do NOT shrink ctx-checkpoints.
checkpoint-min-step = 128
temp = 0.6
top-k = 20
min-p = 0.0
chat-template-kwargs = {"preserve_thinking": true} # keep prior-turn reasoning in context

[qwen3-embedding]
; GPU embeddings resident alongside chat via --models-max 2 (offloads TEI's ~14s CPU-ONNX
; init floor).
hf-repo = Qwen/Qwen3-Embedding-0.6B-GGUF
hf-file = Qwen3-Embedding-0.6B-f16.gguf
embeddings = true
pooling = last
n-gpu-layers = 99
ctx-size = 2048
ubatch-size = 2048
load-on-startup = true
