version = 1

; llama.cpp router presets (--models-preset). Clients pick the model via the OpenAI `model`
; field; per-model metrics at /metrics?model=<id>. R9700 (gfx1201, 32 GB); --models-max 2 keeps
; both presets resident (no idle eviction), so qwen-3.6 stays hot.
[*]
jinja = true
flash-attn = auto
metrics = true
slots = true
; Up to 4 concurrent sessions via continuous batching. kv-unified shares one 256K KV pool
; across slots instead of statically splitting it (256K/4) — so a lone session still gets the
; full 256K at full speed, and slots only contend when several are large at once. Setting
; --parallel explicitly disables unified by default, hence the explicit kv-unified = true.
parallel = 4
kv-unified = true

[qwen-3.6]
; 27B config: full 256K ctx + q8 KV + all experts on the 32 GB GPU. ~33 tok/s single-session.
; MTP speculative decoding is OFF on purpose: it gives ~1.42x single-stream but does NOT batch
; across slots — with parallel=4 each slot ran its own draft+verify and thrashed, dropping
; aggregate concurrent throughput below the single-stream rate. Dropping it lets continuous
; batching actually scale the 4 slots. (Trade: single-session ~34 -> ~33; concurrency wins.)
hf-repo = unsloth/Qwen3.6-27B-MTP-GGUF
hf-file = Qwen3.6-27B-UD-Q4_K_XL.gguf
n-gpu-layers = 99
fit = off # auto-fit hangs on this model (MTP ctx + q8 KV); pin ngl/ctx instead
no-mmap = true # mmap re-faults the 18Gi weights from the cache PVC (130s+ cold load)
flash-attn = on
image-min-tokens = 1024 # Qwen-VL grounding degrades below 1024 image tokens (load_hparams warning)
ctx-size = 262144
cache-type-k = q8_0
cache-type-v = q8_0
cache-ram = 8192 # host-RAM prompt cache: agentic prefix reuse, 7.5x warm TTFT
ctx-checkpoints = 32
; Unsloth thinking-mode sampling defaults.
temp = 1.0
top-k = 20
top-p = 0.95
min-p = 0.0

[qwen3-embedding]
; Dormant (embeddings run on TEI today); resident alongside chat via --models-max 2,
; ready for a litellm embedding route later.
hf-repo = Qwen/Qwen3-Embedding-0.6B-GGUF
hf-file = Qwen3-Embedding-0.6B-f16.gguf
embeddings = true
pooling = last
n-gpu-layers = 99
ctx-size = 8192
batch-size = 8192
ubatch-size = 8192
threads = 4
