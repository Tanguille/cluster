version = 1

; llama.cpp router presets (--models-preset). Clients pick the model via the OpenAI `model`
; field; per-model metrics at /metrics?model=<id>. R9700 (gfx1201, 32 GB); --models-max 2 keeps
; both presets resident (no idle eviction), so qwen-3.6 stays hot.
[*]
jinja = true
flash-attn = auto
metrics = true
slots = true
; 2 concurrent slots via continuous batching. parallel=2 (not 4) is the measured sweet spot WITH
; MTP on: MTP speculation contends when multiple slots decode at once, so capping at 2 keeps that
; thrash 2-way and QUEUES any excess instead of letting 4 requests collapse together. Measured on
; the shared R9700 (live transcode contention): single TG ~37, 2-conc agg ~27, 4-conc per-request
; ~20 tok/s — vs parallel=4+MTP where 4-conc per-request dropped to ~11. kv-unified shares one
; 256K KV pool across slots (vs static 256K/2 split), so a lone session still gets the full 256K;
; setting --parallel explicitly disables unified by default, hence the explicit kv-unified = true.
parallel = 2
kv-unified = true

[qwen-3.6]
; 27B config: full 256K ctx + q4_0 KV on the 32 GB GPU. ~37 tok/s single-session. Qwen3.6 is
; parameter-dense but HYBRID-attention (GatedDeltaNet + gated attn, ~16/64 KV-bearing layers) —
; that small KV-layer count is why a full 256K KV cache fits in 32 GiB (q8 fit too, but q4_0
; frees ~6 GiB so qwen3-embedding can be GPU-resident alongside chat — see cache-type below).
; MTP speculative decoding is ON: a lone request gets the full ~1.5x speedup (37 vs 24 tok/s
; measured with spec off). llama.cpp doesn't batch speculation across sequences, so MTP only
; degrades under simultaneous multi-slot decode — capped to 2-way by parallel=2 above. Drop
; spec-type only if sustained 4+ user aggregate throughput ever outweighs single-session latency
; (measured: spec-off parallel=4 gives ~28 agg at 4-conc but single-session falls to ~24).
hf-repo = unsloth/Qwen3.6-27B-MTP-GGUF
hf-file = Qwen3.6-27B-UD-Q4_K_XL.gguf
n-gpu-layers = 99
fit = off # auto-fit hangs on this model (MTP ctx + q8 KV); pin ngl/ctx instead
no-mmap = true # mmap re-faults the 18Gi weights from the cache PVC (130s+ cold load)
flash-attn = on
image-min-tokens = 1024 # Qwen-VL grounding degrades below 1024 image tokens (load_hparams warning)
ctx-size = 262144
# q4_0 (down from q8_0) frees ~6 GiB of KV so qwen3-embedding fits GPU-resident alongside chat
# (--models-max 2); it was hung in "loading" at q8 for lack of headroom.
# MUST be q4_0 or q8_0, NOT q5_1/q5_0/iq4_nl: with flash-attn on, this image's default build
# (no GGML_CUDA_FA_ALL_QUANTS) only compiles FA kernels for f16/bf16/q4_0/q8_0 KV — any other
# type loads but HANGS at decode (no matching kernel). q5_1 was tried and took chat down. K and
# V must also match type to stay fused. q4_0 is the intended target of the Hadamard activation
# rotation (llama.cpp #21038, compiled in + default-on for quantized KV), which absorbs most of
# the q4 error. If quality regresses, revert to q8_0 and trim ctx-size instead (lossless).
cache-type-k = q4_0
cache-type-v = q4_0
spec-type = draft-mtp # MTP self-speculative decoding, ~1.6x single-stream
spec-draft-n-max = 4 # 2026-06-15 sweep: +15% single-stream vs n3, best 2-conc retention
cache-ram = 8192 # host-RAM prompt cache: agentic prefix reuse, 7.5x warm TTFT
ctx-checkpoints = 32
; Unsloth thinking-mode sampling defaults.
temp = 1.0
top-k = 20
top-p = 0.95
min-p = 0.0

[qwen3-embedding]
; GPU embeddings resident alongside chat via --models-max 2 (offloads TEI's ~14s CPU-ONNX
; init floor). The R9700 is near-full once qwen-3.6 holds its 256K q8 KV cache, so the batch
; sizes below are sized for co-residency, NOT throughput: an 8192 micro-batch forces a large
; load-time compute buffer that can't be allocated in the slim free-VRAM headroom (the 0.6B
; model otherwise hangs in "loading"). 2048 shrinks that buffer (and the KV) so it fits as the
; 2nd resident instance. 2048 also caps per-pass input length — ample for semantic/tool-search
; embeddings; raise it (or free more VRAM by lowering qwen-3.6's KV to q5_1) if longer inputs
; are needed. See PR adding this.
hf-repo = Qwen/Qwen3-Embedding-0.6B-GGUF
hf-file = Qwen3-Embedding-0.6B-f16.gguf
embeddings = true
pooling = last
n-gpu-layers = 99
ctx-size = 2048
batch-size = 2048
ubatch-size = 2048
threads = 4
