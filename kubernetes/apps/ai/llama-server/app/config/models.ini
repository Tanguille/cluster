version = 1

; Mainline llama.cpp router presets. The router runs one backend model at a
; time on the single RTX 2070 8 GB GPU; requests select the model by the
; OpenAI `model` field. Keep GPU placement on llama.cpp's current automatic
; fit path instead of hard-coding a layer count.
[*]
jinja = true
flash-attn = auto
n-gpu-layers = auto
parallel = 1
metrics = true
slots = true

[qwen-3.6]
; Offload MoE expert tensors to CPU for VRAM headroom on the RTX 2070 8 GB
; (Turing, sm_75 — flash-attn IS supported here, keep it on).
;
; KV cache is now SYMMETRIC q8_0/q8_0. The previous q8_0/q4_0 (asymmetric) pair
; only fuses on the flash-attention path with a non-default build flag
; (GGML_CUDA_FA_ALL_QUANTS); with the stock CUDA build it falls off the fused
; FA path and the cache cannot stay GPU-resident — costing tg and, per the
; llama.cpp tool-calling docs, degrading tool-call reliability (matters because
; codrs drives this as an agentic XML-tool harness). q8 V is larger than q4 V,
; so context is set to 98304 (96k) — the LARGEST q8/q8 context whose total
; KV-cache stays <= the previously-proven-fitting 131072 q8/q4 budget. That
; makes this guaranteed to fit at least as well as the prior config WITHOUT a
; live nvidia-smi VRAM probe. Grow back toward 131072 only after measuring real
; VRAM headroom on the card.
;
; n-cpu-moe stays at 32 (the known-fitting value): lowering it (more experts on
; GPU) is the biggest tg lever but is VRAM-margin dependent and MUST be swept
; with nvidia-smi + the server's offloaded-layer log on the actual box.
;
; DO NOT add --reasoning-format=none / --skip-chat-parsing here: codrs relies on
; the server's default split of thinking into delta.reasoning_content and parses
; its OWN <read .../> XML from delta.content. Collapsing <think> into content
; would break that split and trigger spurious tool calls from reasoning text.
; (codrs also sends no OpenAI tools array, so the server tool-autoparser never
; fires — the parsing flags would be pure downside.) Speculative decoding is
; likewise omitted: net-negative on this 3B-active MoE.
;
; Prompt cache / checkpoints unchanged: good for agentic prefix reuse; idle-slot
; persistence stays off (multi-GiB overhead without reducing pp work).
hf-repo = unsloth/Qwen3.6-35B-A3B-GGUF
hf-file = Qwen3.6-35B-A3B-UD-Q3_K_M.gguf
alias = self-hosted
c = 98304
fit = true
fit-ctx = 98304
batch-size = 1024
ubatch-size = 512
cache-type-k = q8_0
cache-type-v = q8_0
flash-attn = on
cache-prompt = true
cache-ram = 4096
kv-unified = true
ctx-checkpoints = 64
checkpoint-min-step = 2048
cache-idle-slots = false
n-cpu-moe = 32
threads = 8
threads-batch = 8
temp = 0.6
top-k = 20
top-p = 0.95
min-p = 0.0
chat-template-kwargs = {"preserve_thinking":true}

[qwen3-embedding]
; F16 preserves embedding quality for the small 0.6B model. A full 8k batch
; keeps document embedding throughput high; the router unloads the chat model
; first because --models-max=1 is set on the main process.
hf-repo = Qwen/Qwen3-Embedding-0.6B-GGUF
hf-file = Qwen3-Embedding-0.6B-f16.gguf
embeddings = true
pooling = last
c = 8192
batch-size = 8192
ubatch-size = 8192
n-gpu-layers = auto
threads = 4
