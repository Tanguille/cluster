---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: &name homeassistant
spec:
  image: ghcr.io/homeassistant-ai/ha-mcp:7.12.0@sha256:35bb71038396576a1ba15ccf76136d3f868206809aeee75153cff57c27f762fb
  transport: streamable-http
  mcpPort: &port 8086
  proxyPort: 8080
  groupRef:
    name: homeassistant
  env:
    - name: HOMEASSISTANT_URL
      value: http://${HOME_ASSISTANT_IP}:8123
    - name: FASTMCP_HOST
      value: "0.0.0.0"
    - name: TMPDIR
      value: /tmp
  secrets:
    - name: toolhive-secrets
      key: HOMEASSISTANT_API_TOKEN
      targetEnvName: HOMEASSISTANT_TOKEN
  toolConfigRef:
    name: *name
  podTemplateSpec:
    spec:
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: mcp
          command: ["fastmcp", "run", "fastmcp-http.json"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          ports:
            - name: mcp
              containerPort: *port
          startupProbe:
            tcpSocket:
              port: mcp
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: mcp
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests: &requests
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 1
              memory: 256Mi
  resources:
    requests: *requests
    limits:
      cpu: 200m
      memory: 128Mi
---
