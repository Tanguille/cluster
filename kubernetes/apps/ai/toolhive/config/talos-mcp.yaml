---
apiVersion: talos.dev/v1alpha1
kind: ServiceAccount
metadata:
  name: talos-mcp
  namespace: ai
spec:
  roles: ["os:reader"]
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: &name talos-mcp
  namespace: ai
spec:
  image: node:24.16.0-alpine3.23
  transport: stdio
  groupRef:
    name: observability
  args:
    - -y
    - talos-mcp@2.4.1
  env:
    - name: TALOSCONFIG
      value: /var/run/secrets/talos.dev/talosconfig
    - name: TALOS_MCP_READ_ONLY
      value: "true"
    # ToolHive sets readOnlyRootFilesystem=true on the inner mcp container.
    # `npx` needs a writable cache dir; redirect HOME to /tmp (writable tmpfs).
    - name: HOME
      value: /tmp
  toolConfigRef:
    name: *name
  podTemplateSpec:
    spec:
      volumes:
        - name: talos
          secret:
            secretName: talos-mcp
        # Required because ToolHive sets readOnlyRootFilesystem=true on the
        # inner mcp container. `npx -y talos-mcp@...` must download the
        # package, so it needs a writable path. Mount an emptyDir at /tmp;
        # HOME=/tmp (above) then points npx's cache at it.
        - name: tmp
          emptyDir: {}
      containers:
        - name: mcp
          command: ["npx"]
          volumeMounts:
            - name: talos
              mountPath: /var/run/secrets/talos.dev
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: talos-mcp-opt
  namespace: ai
spec:
  image: node:24.16.0-alpine3.23
  transport: stdio
  groupRef:
    name: all
  args:
    - -y
    - talos-mcp@2.4.1
  env:
    - name: TALOSCONFIG
      value: /var/run/secrets/talos.dev/talosconfig
    - name: TALOS_MCP_READ_ONLY
      value: "true"
    # ToolHive sets readOnlyRootFilesystem=true on the inner mcp container.
    # `npx` needs a writable cache dir; redirect HOME to /tmp (writable tmpfs).
    - name: HOME
      value: /tmp
  toolConfigRef:
    name: talos-mcp
  podTemplateSpec:
    spec:
      volumes:
        - name: talos
          secret:
            secretName: talos-mcp
        # See talos-mcp block above: emptyDir at /tmp gives npx a writable
        # cache dir on a readOnlyRootFilesystem.
        - name: tmp
          emptyDir: {}
      containers:
        - name: mcp
          command: ["npx"]
          volumeMounts:
            - name: talos
              mountPath: /var/run/secrets/talos.dev
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPToolConfig
metadata:
  name: talos-mcp
  namespace: ai
spec:
  toolsFilter: []
