---
apiVersion: talos.dev/v1alpha1
kind: ServiceAccount
metadata:
  name: talos-mcp
  namespace: ai
spec:
  roles: ["os:reader"]
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: &name talos-mcp
  namespace: ai
spec:
  image: registry.erwanleboucher.dev/eleboucher/talos-mcp:0.0.2
  transport: streamable-http
  mcpPort: 8080
  proxyPort: 8080
  groupRef:
    name: observability
  permissionProfile:
    type: builtin
    name: network
  env:
    - name: TALOSCONFIG
      value: /var/run/secrets/talos.dev/talosconfig
    - name: TALOS_MCP_READ_ONLY
      value: "true"
    - name: TALOS_MCP_TRANSPORT
      value: http
    - name: TALOS_MCP_HTTP_ADDR
      value: :8080
  toolConfigRef:
    name: *name
  podTemplateSpec:
    spec:
      volumes:
        - name: talos
          secret:
            secretName: talos-mcp
            defaultMode: 0o400
      containers:
        - name: mcp
          volumeMounts:
            - name: talos
              mountPath: /var/run/secrets/talos.dev
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: talos-mcp-opt
  namespace: ai
spec:
  image: registry.erwanleboucher.dev/eleboucher/talos-mcp:0.0.2
  transport: streamable-http
  mcpPort: 8080
  proxyPort: 8080
  groupRef:
    name: all
  permissionProfile:
    type: builtin
    name: network
  env:
    - name: TALOSCONFIG
      value: /var/run/secrets/talos.dev/talosconfig
    - name: TALOS_MCP_READ_ONLY
      value: "true"
    - name: TALOS_MCP_TRANSPORT
      value: http
    - name: TALOS_MCP_HTTP_ADDR
      value: :8080
  toolConfigRef:
    name: talos-mcp
  podTemplateSpec:
    spec:
      volumes:
        - name: talos
          secret:
            secretName: talos-mcp
            defaultMode: 0o400
      containers:
        - name: mcp
          volumeMounts:
            - name: talos
              mountPath: /var/run/secrets/talos.dev
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPToolConfig
metadata:
  name: talos-mcp
  namespace: ai
spec:
  toolsFilter: []
