---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServerEntry
metadata:
  name: context7
  namespace: ai
spec:
  remoteUrl: https://mcp.context7.com/mcp
  transport: streamable-http
  groupRef:
    name: resources
  headerForward:
    addHeadersFromSecret:
      - headerName: CONTEXT7_API_KEY
        valueSecretRef:
          name: toolhive-secrets
          key: CONTEXT7_API_KEY
