---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: toolhive-mcpservers
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: toolhive
  inputs:
    - name: postgres-mcp
      primarySpec:
        image: crystaldba/postgres-mcp:0.3.0
        transport: stdio
        groupRef:
          name: database
        args:
        - --access-mode=restricted
        secrets:
        - name: toolhive-secrets
          key: POSTGRES_MCP_DATABASE_URI
          targetEnvName: DATABASE_URI
        toolConfigRef:
          name: postgres-mcp
        podTemplateSpec:
          spec:
            containers:
            - name: mcp
              resources:
                requests:
                  cpu: 25m
                  memory: 128Mi
                limits:
                  cpu: '1'
                  memory: 512Mi
        resources:
          requests:
            cpu: 25m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      optSpec:
        image: crystaldba/postgres-mcp:0.3.0
        transport: stdio
        groupRef:
          name: all
        args:
        - --access-mode=restricted
        secrets:
        - name: toolhive-secrets
          key: POSTGRES_MCP_DATABASE_URI
          targetEnvName: DATABASE_URI
        toolConfigRef:
          name: postgres-mcp
        podTemplateSpec:
          spec:
            containers:
            - name: mcp
              resources:
                requests:
                  cpu: 25m
                  memory: 128Mi
                limits:
                  cpu: '1'
                  memory: 512Mi
        resources:
          requests:
            cpu: 25m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
    - name: karakeep
      primarySpec:
        image: ghcr.io/karakeep-app/karakeep-mcp:0.32.0
        transport: stdio
        groupRef:
          name: resources
        env:
        - name: KARAKEEP_API_ADDR
          value: http://karakeep.default.svc.cluster.local:3000
        secrets:
        - name: toolhive-secrets
          key: KARAKEEP_API_KEY
        toolConfigRef:
          name: karakeep
        podTemplateSpec:
          spec:
            containers:
            - name: mcp
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 100Mi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 100Mi
      optSpec:
        image: ghcr.io/karakeep-app/karakeep-mcp:0.32.0
        transport: stdio
        groupRef:
          name: all
        env:
        - name: KARAKEEP_API_ADDR
          value: http://karakeep.default.svc.cluster.local:3000
        secrets:
        - name: toolhive-secrets
          key: KARAKEEP_API_KEY
        toolConfigRef:
          name: karakeep
        podTemplateSpec:
          spec:
            containers:
            - name: mcp
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 100Mi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 100Mi
    - name: searxng
      primarySpec:
        image: ghcr.io/rcdailey/mcp-searxng:0.8.0
        transport: stdio
        groupRef:
          name: search
        env:
        - name: SEARXNG_URL
          value: http://searxng.default.svc.cluster.local:8080
        toolConfigRef:
          name: searxng
        podTemplateSpec:
          spec:
            containers:
            - name: mcp
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 100Mi
      optSpec:
        image: ghcr.io/rcdailey/mcp-searxng:0.8.0
        transport: stdio
        groupRef:
          name: all
        env:
        - name: SEARXNG_URL
          value: http://searxng.default.svc.cluster.local:8080
        toolConfigRef:
          name: searxng
        podTemplateSpec:
          spec:
            containers:
            - name: mcp
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 110Mi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 100Mi
    - name: homeassistant
      primarySpec:
        image: ghcr.io/homeassistant-ai/ha-mcp:7.14.1@sha256:68f386d9becfcc58476f1881a0025f4c6a3ae5874c15cdd61097b14156886292
        transport: streamable-http
        mcpPort: 8086
        proxyPort: 8080
        groupRef:
          name: homeassistant
        env:
        - name: HOMEASSISTANT_URL
          value: http://${HOME_ASSISTANT_IP}:8123
        - name: FASTMCP_HOST
          value: 0.0.0.0
        - name: TMPDIR
          value: /tmp
        secrets:
        - name: toolhive-secrets
          key: HOMEASSISTANT_API_TOKEN
          targetEnvName: HOMEASSISTANT_TOKEN
        toolConfigRef:
          name: homeassistant
        podTemplateSpec:
          spec:
            volumes:
            - name: tmp
              emptyDir: {}
            containers:
            - name: mcp
              command:
              - fastmcp
              - run
              - fastmcp-http.json
              volumeMounts:
              - name: tmp
                mountPath: /tmp
              ports:
              - name: mcp
                containerPort: 8086
              startupProbe:
                tcpSocket:
                  port: mcp
                periodSeconds: 2
                failureThreshold: 30
              readinessProbe:
                tcpSocket:
                  port: mcp
                periodSeconds: 3
                timeoutSeconds: 2
                failureThreshold: 3
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 1
                  memory: 256Mi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      optSpec:
        image: ghcr.io/homeassistant-ai/ha-mcp:7.14.1@sha256:68f386d9becfcc58476f1881a0025f4c6a3ae5874c15cdd61097b14156886292
        transport: streamable-http
        mcpPort: 8086
        proxyPort: 8080
        groupRef:
          name: all
        env:
        - name: HOMEASSISTANT_URL
          value: http://${HOME_ASSISTANT_IP}:8123
        - name: FASTMCP_HOST
          value: 0.0.0.0
        - name: TMPDIR
          value: /tmp
        secrets:
        - name: toolhive-secrets
          key: HOMEASSISTANT_API_TOKEN
          targetEnvName: HOMEASSISTANT_TOKEN
        toolConfigRef:
          name: homeassistant
        podTemplateSpec:
          spec:
            volumes:
            - name: tmp
              emptyDir: {}
            containers:
            - name: mcp
              command:
              - fastmcp
              - run
              - fastmcp-http.json
              volumeMounts:
              - name: tmp
                mountPath: /tmp
              ports:
              - name: mcp
                containerPort: 8086
              startupProbe:
                tcpSocket:
                  port: mcp
                periodSeconds: 2
                failureThreshold: 30
              readinessProbe:
                tcpSocket:
                  port: mcp
                periodSeconds: 3
                timeoutSeconds: 2
                failureThreshold: 3
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 1
                  memory: 256Mi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
    - name: flux-operator
      primarySpec:
        image: ghcr.io/controlplaneio-fluxcd/flux-operator-mcp:v0.55.0
        transport: stdio
        groupRef:
          name: flux
        args:
        - serve
        env:
        - name: KUBECONFIG
          value: /kubeconfig/kubeconfig
        toolConfigRef:
          name: flux-operator
        podTemplateSpec:
          spec:
            volumes:
            - name: kubeconfig
              secret:
                secretName: toolhive-secrets
                items:
                - key: KUBECONFIG
                  path: kubeconfig
            containers:
            - name: mcp
              volumeMounts:
              - name: kubeconfig
                mountPath: /kubeconfig
                readOnly: true
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 1
                  memory: 256Mi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 200Mi
      optSpec:
        image: ghcr.io/controlplaneio-fluxcd/flux-operator-mcp:v0.55.0
        transport: stdio
        groupRef:
          name: all
        args:
        - serve
        env:
        - name: KUBECONFIG
          value: /kubeconfig/kubeconfig
        toolConfigRef:
          name: flux-operator
        podTemplateSpec:
          spec:
            volumes:
            - name: kubeconfig
              secret:
                secretName: toolhive-secrets
                items:
                - key: KUBECONFIG
                  path: kubeconfig
            containers:
            - name: mcp
              volumeMounts:
              - name: kubeconfig
                mountPath: /kubeconfig
                readOnly: true
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 1
                  memory: 256Mi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 200Mi
    - name: talos-mcp
      primarySpec:
        image: registry.erwanleboucher.dev/eleboucher/talos-mcp:0.0.2
        transport: streamable-http
        mcpPort: 8080
        proxyPort: 8080
        groupRef:
          name: observability
        permissionProfile:
          type: builtin
          name: network
        env:
        - name: TALOSCONFIG
          value: /var/run/secrets/talos.dev/talosconfig
        - name: TALOS_MCP_READ_ONLY
          value: 'true'
        - name: TALOS_MCP_TRANSPORT
          value: http
        - name: TALOS_MCP_HTTP_ADDR
          value: :8080
        toolConfigRef:
          name: talos-mcp
        podTemplateSpec:
          spec:
            volumes:
            - name: talos
              secret:
                secretName: talos-mcp
                defaultMode: 0o400
            containers:
            - name: mcp
              volumeMounts:
              - name: talos
                mountPath: /var/run/secrets/talos.dev
                readOnly: true
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      optSpec:
        image: registry.erwanleboucher.dev/eleboucher/talos-mcp:0.0.2
        transport: streamable-http
        mcpPort: 8080
        proxyPort: 8080
        groupRef:
          name: all
        permissionProfile:
          type: builtin
          name: network
        env:
        - name: TALOSCONFIG
          value: /var/run/secrets/talos.dev/talosconfig
        - name: TALOS_MCP_READ_ONLY
          value: 'true'
        - name: TALOS_MCP_TRANSPORT
          value: http
        - name: TALOS_MCP_HTTP_ADDR
          value: :8080
        toolConfigRef:
          name: talos-mcp
        podTemplateSpec:
          spec:
            volumes:
            - name: talos
              secret:
                secretName: talos-mcp
                defaultMode: 0o400
            containers:
            - name: mcp
              volumeMounts:
              - name: talos
                mountPath: /var/run/secrets/talos.dev
                readOnly: true
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
    - name: grafana
      primarySpec:
        image: grafana/mcp-grafana:0.17.2
        transport: stdio
        groupRef:
          name: observability
        args:
        - -t
        - stdio
        env:
        - name: GRAFANA_URL
          value: http://grafana-service.observability.svc.cluster.local:3000
        toolConfigRef:
          name: grafana
        podTemplateSpec:
          spec:
            containers:
            - name: mcp
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 110Mi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 100Mi
      optSpec:
        image: grafana/mcp-grafana:0.17.2
        transport: stdio
        groupRef:
          name: all
        args:
        - -t
        - stdio
        env:
        - name: GRAFANA_URL
          value: http://grafana-service.observability.svc.cluster.local:3000
        toolConfigRef:
          name: grafana
        podTemplateSpec:
          spec:
            containers:
            - name: mcp
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 110Mi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 100Mi
    - name: github
      primarySpec:
        image: ghcr.io/github/github-mcp-server:v1.6.0
        transport: stdio
        groupRef:
          name: resources
        args:
        - stdio
        secrets:
        - name: toolhive-secrets
          key: GITHUB_PERSONAL_ACCESS_TOKEN
          targetEnvName: GITHUB_PERSONAL_ACCESS_TOKEN
        toolConfigRef:
          name: github
        podTemplateSpec:
          spec:
            containers:
            - name: mcp
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 200Mi
      optSpec:
        image: ghcr.io/github/github-mcp-server:v1.6.0
        transport: stdio
        groupRef:
          name: all
        args:
        - stdio
        secrets:
        - name: toolhive-secrets
          key: GITHUB_PERSONAL_ACCESS_TOKEN
          targetEnvName: GITHUB_PERSONAL_ACCESS_TOKEN
        toolConfigRef:
          name: github
        podTemplateSpec:
          spec:
            containers:
            - name: mcp
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 200Mi
    - name: kubesearch
      primarySpec:
        image: ghcr.io/perfectra1n/kubesearch-mcp:master
        transport: streamable-http
        mcpPort: 3000
        groupRef:
          name: resources
        env:
        - name: KUBESEARCH_REFRESH_HOURS
          value: '24'
        toolConfigRef:
          name: kubesearch
        podTemplateSpec:
          spec:
            volumes:
            - name: tmp
              emptyDir: {}
            containers:
            - name: mcp
              volumeMounts:
              - name: tmp
                mountPath: /tmp
              ports:
              - name: mcp
                containerPort: 3000
              startupProbe:
                httpGet:
                  path: /healthz
                  port: mcp
                periodSeconds: 5
                failureThreshold: 30
              readinessProbe:
                httpGet:
                  path: /healthz
                  port: mcp
                periodSeconds: 5
                timeoutSeconds: 3
                failureThreshold: 3
              resources:
                requests:
                  cpu: 10m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
      optSpec:
        image: ghcr.io/perfectra1n/kubesearch-mcp:master
        transport: streamable-http
        mcpPort: 3000
        groupRef:
          name: all
        env:
        - name: KUBESEARCH_REFRESH_HOURS
          value: '24'
        toolConfigRef:
          name: kubesearch
        podTemplateSpec:
          spec:
            volumes:
            - name: tmp
              emptyDir: {}
            containers:
            - name: mcp
              volumeMounts:
              - name: tmp
                mountPath: /tmp
              ports:
              - name: mcp
                containerPort: 3000
              startupProbe:
                httpGet:
                  path: /healthz
                  port: mcp
                periodSeconds: 5
                failureThreshold: 30
              readinessProbe:
                httpGet:
                  path: /healthz
                  port: mcp
                periodSeconds: 5
                timeoutSeconds: 3
                failureThreshold: 3
              resources:
                requests:
                  cpu: 10m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

  resourcesTemplate: |
    ---
    apiVersion: toolhive.stacklok.dev/v1beta1
    kind: MCPServer
    metadata:
      name: << inputs.name >>
      namespace: ai
    spec:
    << inputs.primarySpec | toYaml | nindent 2 >>
    ---
    apiVersion: toolhive.stacklok.dev/v1beta1
    kind: MCPServer
    metadata:
      name: << inputs.name >>-opt
      namespace: ai
    spec:
    << inputs.optSpec | toYaml | nindent 2 >>
