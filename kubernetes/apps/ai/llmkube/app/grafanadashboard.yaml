---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: llmkube-inference
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: VictoriaMetrics
      inputName: DS_PROMETHEUS
  # Custom dashboard: upstream's expects metrics this cluster doesn't emit
  # (vLLM request histograms; NVIDIA GPU-queue histograms on this AMD iGPU).
  configMapRef:
    name: llmkube-dashboards
    key: llmkube-inference.json
