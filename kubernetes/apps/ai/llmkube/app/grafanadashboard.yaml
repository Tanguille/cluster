---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: llmkube-inference
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: VictoriaMetrics
      inputName: DS_PROMETHEUS
  # Upstream docs/grafana + chart recording rules expect llamacpp:request_seconds_bucket
  # and llmkube_gpu_queue_wait_duration_seconds_bucket, which this cluster does not emit
  # (llamacpp uses llamacpp:* counters; AMD iGPU has no NVIDIA queue histogram).
  configMapRef:
    name: llmkube-inference-dashboard
    key: llmkube-inference.json
