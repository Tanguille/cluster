---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llmkube
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: llmkube
  values:
    namespace: ai

    controllerManager:
      leaderElection:
        enabled: false
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          memory: 128Mi

    # Observability (auto-converted to VM*Scrapes by the cluster's converter):
    #  - inferencePodMonitor scrapes llama-server /metrics on the inference pods
    #    (the operator injects --metrics into every InferenceService itself)
    #  - serviceMonitor scrapes the operator; secure:false serves it over plain
    #    HTTP so VM can scrape without a ServiceAccount token (metrics.enabled
    #    defaults true).
    metrics:
      secure: false
    prometheus:
      serviceMonitor:
        enabled: true
      inferencePodMonitor:
        enabled: true
      prometheusRule:
        # Chart alerts key on job="llmkube-inference"/"llmkube-controller" but this
        # cluster's scrape job is "ai/llmkube-inference", so they can never fire;
        # its recording rules have no consumers. Repo alerts: prometheusrule.yaml.
        enabled: false

    # Persistent model cache on ceph-filesystem (CephFS, RWX). A SINGLE shared
    # PVC mounted by the controller-manager and the iGPU InferenceServices, which
    # land on different nodes (qwen3-embedding on control-3, qwen35-2b on
    # control-2) — so it must be RWX: an RWO volume multi-attach-errors across
    # nodes. qwen36-27b brings its own node-local modelCache.claimName instead.
    # The cache is cold (write-once on download, read-once at model load, then
    # idle — weights live in VRAM), so CephFS latency never touches inference.
    # The operator's model-cache-prep init chowns /models as root, so the chown
    # succeeds on CephFS (fsGroupPolicy: None) too.
    modelCache:
      # qwen3-embedding 0.64Gi + qwen35-2b 1.18Gi + vmcp-embedding 0.29Gi ≈ 2.1Gi
      # + headroom (chart default is 100Gi)
      size: 4Gi
      storageClass: ceph-filesystem
      accessMode: ReadWriteMany
