---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llmkube
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: llmkube
  values:
    namespace: ai
    crds:
      install: true
      keep: true

    controllerManager:
      leaderElection:
        enabled: false
      resources:
        requests:
          cpu: 10m
          memory: 78Mi
        limits:
          memory: 128Mi
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]

    # Observability (auto-converted to VM*Scrapes by the cluster's converter):
    #  - inferencePodMonitor scrapes llama-server /metrics on the embedding pods
    #    (also needs --metrics in the InferenceService extraArgs)
    #  - serviceMonitor scrapes the operator; secure:false serves it over plain
    #    HTTP so VM can scrape without a ServiceAccount token (metrics.enabled
    #    defaults true).
    metrics:
      secure: false
    prometheus:
      serviceMonitor:
        enabled: true
      inferencePodMonitor:
        enabled: true
      prometheusRule:
        enabled: true
        namespace: ai
        rules:
          # DCGM_FI_* alerts — NVIDIA-only; this cluster uses AMD squat.ai/dri.
          gpu:
            enabled: false
          inference:
            enabled: true

    # Persistent model cache on ceph-block (rook RBD, RWO). REQUIRES llmkube
    # >= 0.8.21: with a PVC cache the operator injects a model-cache-prep init
    # that chowns /models, and 0.8.20 regressed it to run as non-root (uid 100)
    # → "Operation not permitted" → Init CrashLoop on ANY storage class (it was
    # never a storage issue; ceph-block failed identically to openebs-hostpath).
    # 0.8.21 runs that prep as root again (upstream #888). RWO is sufficient —
    # the model-downloader init and llama-server share one pod pinned to a single
    # iGPU node. Survives restarts so the ~1.2Gi f16 model isn't re-downloaded.
    modelCache:
      enabled: true
      size: 3Gi # ~1.2Gi f16 model + HF metadata
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      mountPath: /models
