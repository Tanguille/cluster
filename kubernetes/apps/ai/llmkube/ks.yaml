---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: llmkube
  namespace: &namespace ai
spec:
  interval: 10m
  path: ./kubernetes/apps/ai/llmkube/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  # Gate the embedding model (llmkube-models) on the operator being installed: the
  # HelmRelease only reports Ready once its CRDs are applied and the controller is
  # up. Targeted healthCheck rather than spec.wait, so the WaitForFirstConsumer
  # modelCache PVC (which can't bind until the model pod consumes it) doesn't
  # deadlock readiness.
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: llmkube
      namespace: ai
