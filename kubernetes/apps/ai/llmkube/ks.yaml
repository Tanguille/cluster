---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: llmkube
  namespace: &namespace ai
spec:
  interval: 30m
  path: ./kubernetes/apps/ai/llmkube/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  # Gate the models (llmkube-models) on the operator being installed: the
  # HelmRelease only reports Ready once its CRDs are applied and the controller is
  # up. Targeted healthCheck rather than spec.wait so readiness keys on just the
  # CRD-providing HelmRelease, not a blanket wait across all rendered resources.
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: llmkube
      namespace: ai
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: llmkube-models
  namespace: &namespace ai
spec:
  interval: 30m
  dependsOn:
    - name: llmkube
    - name: generic-device-plugin
      namespace: kube-system
  healthChecks:
    - apiVersion: inference.llmkube.dev/v1alpha1
      kind: InferenceService
      name: qwen36-27b
      namespace: ai
  timeout: 60m
  healthCheckExprs:
    - apiVersion: inference.llmkube.dev/v1alpha1
      kind: InferenceService
      inProgress: has(status.phase) && status.phase in ['Pending', 'Creating', 'Progressing', 'WaitingForGPU']
      failed: has(status.phase) && status.phase == 'Failed'
      current: has(status.phase) && status.phase == 'Ready' && has(status.conditions) && status.conditions.exists(e, e.type == 'Available' && e.status == 'True')
  path: ./kubernetes/apps/ai/llmkube/models
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
