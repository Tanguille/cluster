---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: vmcp-embedding
spec:
  # harrier-oss-v1-270m (Microsoft, 2026-03-30): Gemma3-270m-based decoder embedder,
  # MIT, 640-dim, 32K native context, MTEB v2 66.5 — dedicated to vmcp-unified's
  # tool-description search only, decoupling its per-session ~194-tool/~1166-token
  # batch from qwen3-embedding's contention with memini.
  # Known tradeoff: harrier is instruction-tuned (query-side prefixes); ToolHive
  # sends bare queries, so we run slightly below its benchmark quality — accepted,
  # still above the non-instructed alternatives for a 194-doc search space.
  # Placement: shares ONE iGPU with qwen3-embedding (both tiny: 292MB + 639MB Q8;
  # the iGPU generic-device-plugin advertises count: 2 for exactly this pair).
  # Dedicated server = own slots/queue, so vmcp's session-build batch no longer
  # queues behind memini/find_tool traffic at the model level; raw iGPU compute
  # is still shared — if session failures return, check contention here first
  # (the old shared-model setup measured 19-52s under 3x concurrency).
  # Community GGUF (no first-party one) — mykor's is the most-downloaded conversion.
  # Pinned to a repo revision (immutable bytes — community GGUFs can be rebuilt
  # in place under the same filename); Renovate bumps the sha via the git-refs
  # custom manager in .renovaterc.json5 when upstream main moves.
  source: https://huggingface.co/mykor/harrier-oss-v1-270m-GGUF/resolve/fe07a2a15994730f1b8f13943927bc8198bd7fa7/harrier-oss-v1-270M-Q8_0.gguf
  quantization: Q8_0
  # Re-fetch when the source changes. Without this, a source change keeps
  # serving the stale cached file (2026-07-02: this Model silently served the
  # rolled-back bge-small gguf after the switch to harrier — llmkube only
  # flags SourceDrifted, it never re-downloads under the default IfNotPresent).
  refreshPolicy: OnChange
  hardware:
    accelerator: vulkan
    gpu:
      enabled: true
      count: 1
      vendor: amd
      runtime: vulkan
      layers: -1
      # iGPU slot via squat/generic-device-plugin (count: 2 on iGPU nodes);
      # nodeSelector below keeps this off the dGPU node.
      resourceName: squat.ai/dri
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: vmcp-embedding
spec:
  modelRef: vmcp-embedding
  mode: embedding
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan@sha256:e0e1c8c54bde6a99bfde8701671aa580c155873dcd8086c0584afca55f4ec03f
  # 2 slots (the Vulkan floor — warmup hangs at parallel=1, llama.cpp #24307):
  # the iGPU is compute-bound, so extra slots add interleave, not throughput
  # (measured on qwen3-embedding: 4 slots didn't move latency, Q8_0 did). Two
  # slots let find_tool queries flow past an in-flight session-build batch while
  # halving the UMA buffer allocation on the shared iGPU.
  parallelSlots: 2
  # 8192 tokens/slot — the real batch's largest single tool description is
  # 2155 tokens under harrier's Gemma3 tokenizer (~1.85x qwen3's count for the
  # same text; 2048/slot rejected it live 2026-07-02). Harrier's native window
  # is 32K and KV for a 270m model is tens of MB, so headroom is cheap.
  contextSize: 16384
  uBatchSize: 2048
  # mode: embedding makes the operator inject --embedding --pooling last and
  # --metrics itself (verified on the live qwen3-embedding pod) — don't repeat them.
  extraArgs:
    - "--alias"
    - "vmcp-embedding" # served model name litellm/vmcp-unified send in /v1/embeddings

  # Defense-in-depth: keeps the iGPU pin even if qwen3-embedding's own pin is
  # ever loosened (the podAffinity below would otherwise follow it anywhere).
  nodeSelector:
    amd.com/igpu: "true"

  # Render/video host groups for /dev/dri — the documented Vulkan-runtime path.
  podSecurityContext:
    runAsUser: 0
    runAsGroup: 0
    supplementalGroups:
      - 44
      - 226

  # Co-locate with qwen3-embedding's pod (same node, whichever iGPU node that
  # currently is — qwen3-embedding itself isn't hard-pinned to one, see
  # qwen3-embedding.yaml): the two embedders deliberately share that node's iGPU
  # (one squat.ai/dri slot each of the node's 2), and same-node networking for
  # litellm/unified comes along for free.
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app: qwen3-embedding
          topologyKey: kubernetes.io/hostname

  # No probeOverrides: the operator's llamacpp defaults already probe /health
  # with a more forgiving startup window (180x10s). GPU allocation comes from
  # Model.hardware.gpu.count (resources.gpu/gpuMemory are dead fields at 0.8.26).
  resources:
    cpu: "500m" # inference is on the iGPU; CPU only tokenises/schedules
    memory: 512Mi # 292MB Q8_0 weights via UMA; measured 436Mi working set
  endpoint:
    path: /v1/embeddings
