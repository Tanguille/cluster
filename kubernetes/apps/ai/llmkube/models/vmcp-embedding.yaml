---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: vmcp-embedding
spec:
  # bge-small-en-v1.5: ~33M params vs qwen3-embedding's 600M (~18x less prefill
  # compute) — dedicated to vmcp-unified's tool-description search only, so its
  # smaller/lower-dim embedding space never has to match memini's qwen3-embedding
  # vectors. CPU-only: all 3 GPU-bearing nodes (control-1/2/3) are already full,
  # and a 33M-param model on a couple of CPU cores easily clears sub-second for
  # short tool descriptions, vs the iGPU's GPU-compute/overhead-bound latency.
  source: https://huggingface.co/CompendiumLabs/bge-small-en-v1.5-gguf/resolve/main/bge-small-en-v1.5-q8_0.gguf
  format: gguf
  quantization: Q8_0
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: vmcp-embedding
spec:
  modelRef: vmcp-embedding
  mode: embedding
  image: ghcr.io/ggml-org/llama.cpp:server@sha256:5f05878dd6ba327e7ada531737b6b883b0df1737470678ba10d52f34e1d8b32d
  parallelSlots: 4
  # 2048 tokens/slot — same proven-safe margin over ToolHive's largest batch
  # (~1095 tokens) used for qwen3-embedding.
  contextSize: 8192
  uBatchSize: 2048
  extraArgs:
    - "--alias"
    - "vmcp-embedding" # served model name litellm/vmcp-unified send in /v1/embeddings
    - "--metrics" # expose Prometheus /metrics (off by default in llama-server)

  # llama-server only serves /health in embeddings mode, so probe that rather
  # than the operator-default chat-completions path.
  probeOverrides:
    startup:
      httpGet: &healthProbe
        path: /health
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 15
    readiness:
      httpGet: *healthProbe
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    liveness:
      httpGet: *healthProbe
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3

  resources:
    cpu: "1"
    memory: 512Mi
  endpoint:
    path: /v1/embeddings
