---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen35-2b
spec:
  # Revision-pinned (immutable bytes; unsloth re-uploads fixed GGUFs under the
  # same filename) — Renovate bumps the sha via the git-refs manager in
  # .renovaterc.json5; refreshPolicy makes the bump actually re-fetch.
  source: https://huggingface.co/unsloth/Qwen3.5-2B-GGUF/resolve/f6d5376be1edb4d416d56da11e5397a961aca8ae/Qwen3.5-2B-Q4_K_M.gguf
  refreshPolicy: OnChange
  # Q4_K_M (~1.18 GiB) is the speed/quality sweet spot on the RDNA2 iGPU
  # (measured 43 tok/s decode, 513 tok/s prefill); Q8 would ~double the footprint
  # for marginal gain on easy offload tasks.
  quantization: Q4_K_M
  hardware:
    accelerator: vulkan
    gpu:
      enabled: true
      count: 1
      vendor: amd
      runtime: vulkan
      layers: -1
      resourceName: squat.ai/dri
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen35-2b
spec:
  modelRef: qwen35-2b
  # Must be recent enough for Qwen3.5's GDN (Gated Delta Networks) architecture;
  # verified to load `qwen35` and run GDN fully on Vulkan (no CPU fallback).
  # Tracked by the llmkube-models Renovate customManager (.renovaterc.json5).
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan@sha256:5672ed099865337417b3f2d0fd360839740168efb96acf44c80770b7808d896c
  parallelSlots: 2 # Vulkan warmup hangs at parallel=1 (llama.cpp #24307)
  contextSize: 16384 # GDN keeps KV tiny, so long ctx is cheap; 16K is plenty for offload
  jinja: true # use the model's chat template (correct Qwen3.5 formatting + tool calls)
  extraArgs:
    - "--alias"
    - "qwen3.5-2b" # served model name litellm sends in /v1/chat/completions

  # Only iGPU nodes; the embedders are CPU-only now, so this model has both
  # iGPU nodes' dri slots to itself and needs no anti-affinity against them.
  nodeSelector:
    amd.com/igpu: "true"

  # Render/video host groups for /dev/dri — the documented Vulkan-runtime path.
  podSecurityContext:
    runAsUser: 0
    runAsGroup: 0
    supplementalGroups:
      - 44
      - 226

  # No probeOverrides: the operator's llamacpp defaults already probe /health
  # with a more forgiving startup window. GPU allocation comes from
  # Model.hardware.gpu.count (resources.gpu/gpuMemory are dead fields at 0.8.26).
  resources:
    cpu: "500m" # inference is on the iGPU; CPU only tokenises/schedules/samples
    # ~2.4 GiB resident under load, 405Mi idle working set; requested low
    # (no limit set by llmkube) so it schedules and bursts into free RAM.
    memory: 1Gi
  # endpoint omitted — operator defaults to a ClusterIP Service on :8080.
