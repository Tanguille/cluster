---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qwen36-27b-vllm-cache
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 50Gi
---
# Persist torch, Triton, and Inductor compile caches across restarts.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qwen36-27b-vllm-compile-cache
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 10Gi
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen36-27b-vllm
spec:
  # Pin the model revision for reproducible staging.
  source: hf://cyankiwi/Qwen3.6-27B-AWQ-INT4@e5cc0400fb2403c437c2c40a7c52fb5ae93fda18
  format: safetensors
  quantization: compressed-tensors
  files:
    - model-00001-of-00004.safetensors
    - model-00002-of-00004.safetensors
    - model-00003-of-00004.safetensors
    - model-00004-of-00004.safetensors
    - model.safetensors.index.json
    - config.json
    - configuration.json
    - generation_config.json
    - tokenizer.json
    - tokenizer_config.json
    - chat_template.jinja
    - merges.txt
    - vocab.json
    - preprocessor_config.json
    - video_preprocessor_config.json
  refreshPolicy: OnChange
  # Operator default binds :: (IPv6-only on this IPv4 cluster); override to v4.
  bindAddress: 0.0.0.0
  hardware:
    accelerator: rocm
    memoryBudget: 34Gi
    gpu:
      enabled: true
      count: 1
      vendor: amd
      runtime: rocm
      resourceName: squat.ai/dri
      memory: 32Gi
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen36-27b-vllm
spec:
  modelRef: qwen36-27b-vllm
  runtime: vllm
  modelCache:
    claimName: qwen36-27b-vllm-cache
  # Use the ROCm nightly with the required AMD kernel support.
  image: vllm/vllm-openai-rocm:nightly@sha256:f0a8653e39a9cdc1640654ea5a184bf83caf77fc1439a1a07d1e550e601c7e05
  replicas: 0
  # Limit concurrent sequence slots to fit the model's cache budget.
  parallelSlots: 8
  vllmConfig:
    maxModelLen: 180000
    kvCacheDtype: fp8_e4m3
    enablePrefixCaching: true
    maxNumBatchedTokens: 8192
    gpuMemoryUtilization: 0.875
  env:
    - name: VLLM_ROCM_USE_AITER
      value: "0"
    - name: FLASH_ATTENTION_TRITON_AMD_ENABLE
      value: "TRUE"
    - name: HIP_VISIBLE_DEVICES
      value: "0"
    - name: ROCR_VISIBLE_DEVICES
      value: "0"
    # Keep runtime compile caches on the persistent cache volume.
    - name: VLLM_CACHE_ROOT
      value: /cache/vllm
    - name: TRITON_CACHE_DIR
      value: /cache/triton
    - name: TORCHINDUCTOR_CACHE_DIR
      value: /cache/inductor
  extraVolumes:
    - name: compile-cache
      persistentVolumeClaim:
        claimName: qwen36-27b-vllm-compile-cache
  extraVolumeMounts:
    - name: compile-cache
      mountPath: /cache
  extraArgs:
    # Expose the stable API model name.
    - --served-model-name
    - qwen-3.6
    # Disable image and video multimodal inputs.
    - --limit-mm-per-prompt
    - '{"image":0,"video":0}'
    # Use bfloat16 Mamba cache dtype to reduce memory for the long context window.
    - --mamba-ssm-cache-dtype
    - bfloat16
    - --trust-remote-code
  probeOverrides:
    # Allow ample time for model startup and compilation.
    startup:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 60
      periodSeconds: 15
      failureThreshold: 240
    # TODO: Replace this always-successful check with a real health-based liveness probe before production cutover.
    liveness:
      exec:
        command: ["true"]
      periodSeconds: 3600
    readiness:
      tcpSocket:
        port: 8000
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 6
  nodeSelector:
    amd.com/gpu: "true"
  podSecurityContext:
    runAsUser: 0
    runAsGroup: 0
    supplementalGroups: [44, 226]
    seccompProfile:
      type: Unconfined
  resources:
    cpu: "2"
    memory: 24Gi
  endpoint:
    port: 8000
