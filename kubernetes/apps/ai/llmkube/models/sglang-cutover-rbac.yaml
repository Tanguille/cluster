---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: llmkube-sglang-cutover
  namespace: ai
rules:
  - apiGroups:
      - apps
    resources:
      - deployments
    resourceNames:
      - sglang
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: llmkube-sglang-cutover
  namespace: ai
subjects:
  - kind: ServiceAccount
    name: default
    namespace: ai
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: llmkube-sglang-cutover
