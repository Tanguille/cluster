---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-embedding
spec:
  # Q8_0 over F16: measured 194-item ToolHive batch at ~10s/request isolated,
  # 19-52s under 3x concurrent (vmcp + memini both hit this server) — GPU
  # compute-bound on the weak iGPU, not slots/CPU (confirmed via kubectl top:
  # CPU peaked at 424m of an uncapped budget during the same test). Q8_0 is
  # ~half the compute of F16 for negligible quality loss on embedding-only
  # (non-generative) similarity search, and embeddings aren't cached/persisted
  # across sessions so there's no stale-vector consistency concern either way.
  # Revision-pinned (immutable bytes) — Renovate bumps the sha via the git-refs
  # manager in .renovaterc.json5; refreshPolicy makes the bump actually re-fetch.
  source: https://huggingface.co/Qwen/Qwen3-Embedding-0.6B-GGUF/resolve/370f27d7550e0def9b39c1f16d3fbaa13aa67728/Qwen3-Embedding-0.6B-Q8_0.gguf
  quantization: Q8_0
  refreshPolicy: OnChange
  hardware:
    accelerator: vulkan
    gpu:
      enabled: true
      count: 1
      vendor: amd
      runtime: vulkan
      layers: -1
      # Slot counts live at the device plugin (kube-system/generic-device-plugin);
      # nodeSelector below pins this to the iGPU.
      resourceName: squat.ai/dri
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3-embedding
spec:
  modelRef: qwen3-embedding
  mode: embedding
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan@sha256:5672ed099865337417b3f2d0fd360839740168efb96acf44c80770b7808d896c
  # Two slots are the Vulkan-safe floor; more interleaving did not improve
  # throughput on this compute-bound iGPU. VMCP has its own embedder now.
  parallelSlots: 2 # Vulkan warmup hangs at parallel=1 (llama.cpp #24307)
  contextSize: 8192
  # Raise the logical batch ceiling without increasing the 2048-token Vulkan
  # micro-batch; benchmark against the prior implicit 2048 default.
  batchSize: 4096
  uBatchSize: 2048
  extraArgs:
    - "--alias"
    - "qwen3-embedding" # served model name memini sends in /v1/embeddings

  # Pin to the iGPU node; without this the scheduler could place it on the dGPU
  # node (which also advertises squat.ai/dri) and steal a dGPU slot from sglang.
  nodeSelector:
    amd.com/igpu: "true"

  # Mutual half of qwen35-2b's anti-affinity (see qwen35-2b.yaml). Anti-affinity
  # is checked only at the moving pod's scheduling time, so the rule must exist
  # on both sides: 2026-07-03 a reshuffle rolled this pod onto qwen35-2b's node,
  # filling its 2 dri slots and re-stranding vmcp-embedding (which hard-follows
  # this pod) in Pending.
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app: qwen35-2b
          topologyKey: kubernetes.io/hostname

  # Render/video host groups for /dev/dri — the documented Vulkan-runtime path.
  podSecurityContext:
    runAsUser: 0
    runAsGroup: 0
    supplementalGroups:
      - 44
      - 226

  resources:
    cpu: "500m" # inference is on the iGPU; CPU only tokenises/schedules
    # Current 84746bcc6 revision peaked at ~3.1 GiB working set over 7 days;
    # reserve 4 GiB so the scheduler accounts for the model's UMA usage.
    memory: 4Gi
  endpoint:
    path: /v1/embeddings
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: embedder-recycle
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: embedder-recycle
rules:
  - apiGroups: [apps]
    resources: [deployments]
    resourceNames: [qwen3-embedding, vmcp-embedding]
    verbs: [patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: embedder-recycle
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: embedder-recycle
subjects:
  - kind: ServiceAccount
    name: embedder-recycle
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/batch/cronjob_v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: embedder-recycle
spec:
  # both embedders (qwen3-embedding + vmcp-embedding) leak pinned iGPU GTT memory
  # cgroups cannot see (wedged control-2 twice); a nightly controlled rollout restart caps
  # the accumulation. Embeddings are dragonfly-cached, so a restart costs one reload.
  timeZone: ${TIMEZONE}
  schedule: "30 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  startingDeadlineSeconds: 1800
  jobTemplate:
    spec:
      activeDeadlineSeconds: 180
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: embedder-recycle
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: recycle
              image: curlimages/curl:8.21.0@sha256:1ab04d023ece37e6ec991bf3306ad04e0ef0084e94a5c6b6563cfcb9563169db
              command:
                - sh
                - -ec
                - >-
                  timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"; for deployment in
                  qwen3-embedding vmcp-embedding; do curl -fsS --connect-timeout 10
                  --max-time 30
                  --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                  -H "Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
                  -H "Content-Type: application/merge-patch+json" -X PATCH
                  --data "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"$${timestamp}\"}}}}}"
                  "https://kubernetes.default.svc/apis/apps/v1/namespaces/ai/deployments/$${deployment}"
                  > /dev/null; done
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: [ALL]
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 32Mi
