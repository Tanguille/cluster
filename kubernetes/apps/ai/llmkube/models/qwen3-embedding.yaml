---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-embedding
spec:
  source: https://huggingface.co/Qwen/Qwen3-Embedding-0.6B-GGUF/resolve/main/Qwen3-Embedding-0.6B-f16.gguf
  format: gguf
  quantization: F16
  hardware:
    accelerator: vulkan
    gpu:
      enabled: true
      count: 1
      vendor: amd
      runtime: vulkan
      layers: -1
      # Both GPU nodes advertise squat.ai/dri (dGPU count:4, iGPU count:1) via
      # squat/generic-device-plugin; nodeSelector below pins this to the iGPU.
      resourceName: squat.ai/dri
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3-embedding
spec:
  modelRef: qwen3-embedding
  mode: embedding
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan@sha256:6d1d6855edf8e5ddf9dc8e5cd6b4243a15451384fc047cf84d70091b9a6141b9
  # 4 slots: vmcp-unified's per-session 194-tool burst-embed and memini's
  # continuous dedup-embedding traffic both hit this server concurrently;
  # 2 slots was queuing the two into vmcp's 120s embeddingServiceTimeout
  # (session_id failures: "context canceled"/"context deadline exceeded").
  parallelSlots: 4 # Vulkan warmup hangs at parallel=1 (llama.cpp #24307)
  # llama.cpp splits --ctx-size across parallel slots. Keep 2048/slot (same
  # margin as before) — enough for ToolHive's largest tool-description batch
  # (~1095 tokens) without affecting the LiteLLM model name memini uses.
  contextSize: 8192
  uBatchSize: 2048
  extraArgs:
    - "--alias"
    - "qwen3-embedding" # served model name memini sends in /v1/embeddings
    - "--metrics" # expose Prometheus /metrics (off by default in llama-server)

  # Pin to the iGPU node; without this the scheduler could place it on the dGPU
  # node (which also advertises squat.ai/dri) and steal a dGPU slot from sglang.
  nodeSelector:
    amd.com/igpu: "true"

  # Render/video host groups for /dev/dri — the documented Vulkan-runtime path.
  podSecurityContext:
    runAsUser: 0
    runAsGroup: 0
    supplementalGroups:
      - 44
      - 226

  # llama-server only serves /health in embeddings mode, so probe that rather
  # than the operator-default chat-completions path.
  probeOverrides:
    startup:
      httpGet: &healthProbe
        path: /health
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 15
    readiness:
      httpGet: *healthProbe
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    liveness:
      httpGet: *healthProbe
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3

  resources:
    cpu: "500m" # inference is on the iGPU; CPU only tokenises/schedules
    memory: 2Gi
    gpu: 1
    gpuMemory: 2Gi
  endpoint:
    path: /v1/embeddings
