---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: embedder-recycle
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: embedder-recycle
rules:
  - apiGroups: [apps]
    resources: [deployments]
    resourceNames: [qwen3-embedding, vmcp-embedding]
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: embedder-recycle
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: embedder-recycle
subjects:
  - kind: ServiceAccount
    name: embedder-recycle
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/batch/cronjob_v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: embedder-recycle
spec:
  # The explicit Deployment allowlist is qwen3-embedding and vmcp-embedding;
  # adding another leaky embedder requires updating both the loop and RBAC above.
  # Each Deployment is patched sequentially and its replacement is checked Ready;
  # a failed recycle is visible through Job status.
  timeZone: ${TIMEZONE}
  schedule: "30 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  # Allow a missed 04:30 run to start within 30 minutes; skip it after that
  # rather than starting a stale recycle much later.
  startingDeadlineSeconds: 1800
  jobTemplate:
    spec:
      activeDeadlineSeconds: 180 # a wedged apiserver must not leave the Job hanging
      backoffLimit: 0 # never repeat a partial rollout restart
      template:
        spec:
          serviceAccountName: embedder-recycle
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: recycle
              image: curlimages/curl:8.21.0@sha256:1ab04d023ece37e6ec991bf3306ad04e0ef0084e94a5c6b6563cfcb9563169db
              command:
                - sh
                - -ec
                - |-
                  api="https://kubernetes.default.svc/apis/apps/v1/namespaces/ai/deployments"
                  ca=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                  token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
                  last_timestamp=

                  json_field() {
                    printf '%s' "$1" | sed -n "s/.*\"$2\":\([^,}]*\).*/\1/p" | sed -n '1p'
                  }

                  at_least_one() {
                    case "$1" in
                      ''|*[!0-9]*) return 1 ;;
                      *) [ "$1" -ge 1 ] ;;
                    esac
                  }

                  wait_ready() {
                    deployment="$1"
                    generation="$2"
                    attempt=0
                    while [ "$attempt" -lt 12 ]; do
                      status="$(curl -fsS --connect-timeout 10 --max-time 30 --cacert "$ca" -H "Authorization: Bearer $token" "$api/$deployment")"
                      observed="$(json_field "$status" observedGeneration || true)"
                      updated="$(json_field "$status" updatedReplicas || true)"
                      available="$(json_field "$status" availableReplicas || true)"
                      ready="$(json_field "$status" readyReplicas || true)"
                      if [ "$observed" = "$generation" ] && at_least_one "$updated" && at_least_one "$available" && at_least_one "$ready"; then
                        return 0
                      fi
                      sleep 5
                      attempt=$((attempt + 1))
                    done
                    return 1
                  }

                  for deployment in qwen3-embedding vmcp-embedding; do
                    timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                    if [ "$timestamp" = "$last_timestamp" ]; then
                      sleep 1
                      timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                    fi
                    last_timestamp="$timestamp"
                    patched="$(curl -fsS --connect-timeout 10 --max-time 30 --cacert "$ca" -H "Authorization: Bearer $token" -H "Content-Type: application/merge-patch+json" -X PATCH --data "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"$timestamp\"}}}}}" "$api/$deployment")"
                    generation="$(json_field "$patched" generation || true)"
                    case "$generation" in
                      ''|*[!0-9]*) exit 1 ;;
                    esac
                    wait_ready "$deployment" "$generation"
                  done
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: [ALL]
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 32Mi
