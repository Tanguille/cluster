---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: embedder-recycle
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: embedder-recycle
rules:
  - apiGroups: [apps]
    resources: [deployments]
    resourceNames: [qwen3-embedding, vmcp-embedding]
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: embedder-recycle
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: embedder-recycle
subjects:
  - kind: ServiceAccount
    name: embedder-recycle
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/batch/cronjob_v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: embedder-recycle
spec:
  # The explicit Deployment allowlist is qwen3-embedding and vmcp-embedding;
  # adding another leaky embedder requires updating both the loop and RBAC above.
  # Each Deployment is patched sequentially and its replacement is checked Ready;
  # a failed recycle is visible through Job status.
  timeZone: ${TIMEZONE}
  schedule: "30 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  # Allow a missed 04:30 run to start within 30 minutes; skip it after that
  # rather than starting a stale recycle much later.
  startingDeadlineSeconds: 1800
  jobTemplate:
    spec:
      activeDeadlineSeconds: 180 # a wedged apiserver must not leave the Job hanging
      backoffLimit: 0 # never repeat a partial rollout restart
      template:
        spec:
          serviceAccountName: embedder-recycle
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: recycle
              image: curlimages/curl:8.21.0@sha256:1ab04d023ece37e6ec991bf3306ad04e0ef0084e94a5c6b6563cfcb9563169db
              command:
                - /scripts/embedder-recycle.sh
              volumeMounts:
                - name: recycle-script
                  mountPath: /scripts
                  readOnly: true
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: [ALL]
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 32Mi
          volumes:
            - name: recycle-script
              configMap:
                name: embedder-recycle-script
                defaultMode: 0555
