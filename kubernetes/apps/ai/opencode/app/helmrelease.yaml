---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app opencode
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template

  values:
    fullnameOverride: opencode-server
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          copy-config:
            image:
              repository: busybox
              tag: 1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
            securityContext:
              runAsUser: 0
            command:
              - sh
              - -c
              - cp /config/opencode.jsonc /home/opencode/.config/opencode/opencode.jsonc
        containers:
          app:
            image:
              repository: ghcr.io/anomalyco/opencode
              tag: 1.4.5@sha256:4d97a04691e6b74437cb678e3422a90e169acbb725b88c0d16eaf5867a57ee72
            env:
              TZ: ${TIMEZONE}
              HOME: /home/opencode
            envFrom:
              - secretRef:
                  name: opencode-secret
            command:
              - opencode
              - web
              - --hostname
              - "0.0.0.0"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet: &probe
                    path: /
                    port: &port 4096
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet: *probe
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1
                memory: 2Gi

    service:
      app:
        controller: app
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "opencode.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /home/opencode/.config/opencode
      config-file:
        type: configMap
        name: opencode-config
        globalMounts:
          - path: /config
