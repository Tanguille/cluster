---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app opencode
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template

  values:
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/anomalyco/opencode
              tag: 1.15.11@sha256:11a9c42b7fb7823c33505de6119f65c94eef8ffd0fe958c939d3e304e414b4e6
            env:
              TZ: ${TIMEZONE}
              HOME: /home/opencode
              OPENCODE_CONFIG: /config/opencode.jsonc
            envFrom:
              - secretRef:
                  name: opencode-secret
            command:
              - opencode
              - web
              - --hostname
              - "0.0.0.0"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet: &probe
                    path: /
                    port: &port 4096
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet: *probe
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1
                memory: 2Gi

    defaultPodOptions:
      automountServiceAccountToken: true

    service:
      app:
        controller: app
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "opencode.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      home:
        existingClaim: *app
        globalMounts:
          - path: /home/opencode
      config-file:
        type: configMap
        name: opencode-config
        globalMounts:
          - path: /config/opencode.jsonc
            subPath: opencode.jsonc
