  # memini/ks.yaml dependsOn llama-embeddings -> llmkube-models), removes
  # ./llama-embeddings, and drops the iGPU count back to 1.
  - ./llama-embeddings/ks.yaml
  - ./llmkube/ks.yaml
  - ./opencode/ks.yaml
  - ./odysseus/ks.yaml
  - ./toolhive/ks.yaml
