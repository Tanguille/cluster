---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai
components:
  - ../../components/common
resources:
  - ./hermes/ks.yaml
  - ./litellm/ks.yaml
  - ./memini/ks.yaml
  # llama.cpp fallback — to switch back from SGLang:
  #   1. comment in llama-server below, comment out sglang (avoid GPU conflict)
  #   2. change litellm/ks.yaml and memini/ks.yaml dependsOn back to llama-server
  #   3. change litellm/app/configmap.yaml api_base back to http://llama-server.ai.svc.cluster.local/v1
  # - ./llama-server/ks.yaml
  - ./llama-embeddings/ks.yaml
  - ./open-webui/ks.yaml
  - ./opencode/ks.yaml
  - ./odysseus/ks.yaml
  - ./toolhive/ks.yaml
  - ./sglang/ks.yaml
