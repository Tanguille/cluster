---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sglang
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    timeout: 30m
    remediation:
      retries: 1
  upgrade:
    timeout: 30m
    remediation:
      retries: -1 # no rollback: a cold Triton recompile can exceed the upgrade timeout
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          # Hard gate to the GPU node; complements the soft control-1 pin from affinity-control-1.
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: amd.com/gpu
                    operator: In
                    values: ["true"]
      # Root + video/render groups + Unconfined seccomp = ROCm device access via squat.ai/dri:1.
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        supplementalGroups:
          - 44 # video — /dev/dri
          - 226 # render — /dev/dri/renderD* + /dev/kfd (ROCm compute)
        seccompProfile:
          type: Unconfined # ROCm/HIP needs unrestricted syscalls

    controllers:
      app:
        # Recreate, not RollingUpdate: singleton holding the node's only squat.ai/dri:1.
        strategy: Recreate
        containers:
          app:
            # SGLang (mattbucci RDNA4 fork) runs from the prebuilt conda env on the `sglang` PVC at
            # /cache/sglang — the image is only the ROCm 7.2.4 runtime base. The engine, the native
            # gfx1201 HIP kernels, the fork source and the bring-up patches all live on the PVC.
            # See the app README for the PVC inventory, the patches, and the OCI-image follow-up.
            image:
              repository: docker.io/rocm/dev-ubuntu-24.04
              tag: 7.2.4-complete@sha256:92f309c51b52cef8762867848f1529dee821624f23cd5df38455e819538f762f
            # Override the dev-image entrypoint with the fork's preset runner. The qwen36-27b preset +
            # these flags are the validated single-card config; the perf table, the cache-vs-batch
            # tradeoff and the rejected alternatives (MoE, MTP/spec, fp4 KV) are in the README. Radix
            # cache is ON (MambaRadixCache, no_buffer) for the long-context agent: prefix reuse
            # (~7.6× TTFT) is the primary workload, traded against batch (overlap off, max_running
            # 32→~16). mem-fraction 0.875 (was 0.90) frees ~0.8 GB more VRAM headroom on the shared
            # R9700 for the co-resident VAAPI transcoders (fileflows/jellyfin) — at 0.90 only ~16 MB
            # stayed free and their 4K HEVC encodes stalled (0-byte output). The KV pool shrinks ~1:1
            # with mem-fraction (~33K tokens/GB, fp8 KV), so context-length 200000 caps below the
            # resulting ~211K KV pool — an over-long request is rejected cleanly instead of evicting
            # cache mid-decode and thrashing (model native max is 262144; observed Hermes prefill peaks
            # ~106K). 200K is the floor here; freeing more VRAM would mean dropping context further.
            command:
              - /bin/bash
              - -c
              - >-
                exec bash /cache/sglang/repo-v0514/scripts/launch.sh qwen36-27b
                --context-length 200000
                --mem-fraction 0.875
                --max-running 32
                --decode-steps 16
                --chunked-prefill 8192
                --port 8000
            env:
              TZ: ${TIMEZONE}
              # --- launch.sh / common.sh overrides (most gfx1201 env is set by common.sh) ---
              CONDA_BASE: /cache/sglang/conda
              TP: "1" # single R9700; the fork defaults to 2 (its dual-card box)
              MODEL: mattbucci/Qwen3.6-27B-AWQ # resolved offline from HF_HOME cache
              # Pin every device-visibility var to card 0 (common.sh defaults them to "0,1").
              HIP_VISIBLE_DEVICES: &card0 "0"
              ROCR_VISIBLE_DEVICES: *card0
              GPU_DEVICE_ORDINAL: *card0
              CUDA_VISIBLE_DEVICES: *card0
              HF_HOME: /cache/hf
              HF_HUB_OFFLINE: "1"
              TRITON_CACHE_DIR: /cache/sglang/triton # persisted JIT cache on the PVC
              # EXTRA_ARGS append after the preset (last-wins): mamba slots 48 (> max-running, headroom
              # for cached prefix states); served-model-name qwen-3.6 (drop-in for litellm/karakeep);
              # mamba-ssm-dtype bfloat16 (EXP-002) halves the fp32 GatedDeltaNet state (6.89→3.45 GB) →
              # KV pool +87% (127K→237,446 tokens), quality-neutral — the headroom Hermes's 124K prefix needs.
              EXTRA_ARGS: "--max-mamba-cache-size 48 --served-model-name qwen-3.6 --mamba-ssm-dtype bfloat16"
            probes:
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8000
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 5
                  # ~16 min budget (60×15s + 60s): warm PVC boots in ~2-3 min; headroom covers a
                  # cold Triton recompile after image/kernel changes.
                  failureThreshold: 60
              # Liveness OFF: even TCP probes restart a busy-but-alive singleton under long-prefill /
              # thinking load (exit 0 via SIGTERM + kill_process_tree, dropping in-flight work;
              # observed 2026-06-25 HTTP /health, 2026-06-28 TCP). restartPolicy: Always still
              # recovers hard crashes; use Prometheus alerts for hung engines. Readiness stays TCP
              # (not HTTP /health) so we do not eject the only backend while the port is up.
              liveness:
                enabled: false
              readiness:
                <<: *probeBase
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
            resources:
              requests:
                cpu: 2
                memory: 10Gi
                squat.ai/dri: &dri 1 # extended resource: request must equal limit
              limits:
                cpu: 12
                # Steady-state ~2.3 GB (weights in VRAM), but the multi-thread AWQ shard load peaks
                # ~20 GB host RAM. 32Gi covers the load spike + shm; 16Gi and 28Gi both OOM-killed it
                # mid-load (exit 137). An OOM-kill here leaks GPU VRAM that no soft reboot reclaims
                # (needs a hypervisor cold-cycle) — so don't trim it.
                memory: 32Gi
                squat.ai/dri: *dri

    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: sglang
          gethomepage.dev/description: Qwen3.6-27B SGLang inference (RDNA4, TP=1, prefix-cache on, ~63 tok/s @conc16)
          gethomepage.dev/group: Models
          gethomepage.dev/icon: mdi-brain
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 80

    persistence:
      # The `sglang` PVC carries the prebuilt SGLang conda env, fork source, Triton cache and the
      # Qwen3.6 AWQ model (see pvc.yaml). Rebuildable via scripts/sglang-env-rebuild.sh if lost — it
      # bakes in the RDNA4/TP=1 fixes the fork's stock setup.sh omits (without them the server crashes
      # on the first request, or OOM-restarts hours in on the first grammar/json_schema request).
      cache:
        enabled: true
        existingClaim: sglang
        advancedMounts:
          app:
            app:
              - path: /cache
      shm:
        type: emptyDir
        medium: Memory
        # tmpfs counts against the container memory limit; TP=1 barely uses shm (the large-shm
        # case is multi-GPU tensor sharing, N/A here), so keep it well under the 16Gi limit.
        sizeLimit: 8Gi
        advancedMounts:
          app:
            app:
              - path: /dev/shm
