---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sglang
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    timeout: 30m
    remediation:
      retries: 1
  upgrade:
    timeout: 30m
    remediation:
      retries: -1 # no rollback: a cold Triton recompile can exceed the upgrade timeout
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          # Hard gate to the GPU node; complements the soft control-1 pin from affinity-control-1.
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: amd.com/gpu
                    operator: In
                    values: ["true"]
      # Root + video/render groups + Unconfined seccomp = ROCm device access via squat.ai/dri:1.
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        supplementalGroups:
          - 44 # video — /dev/dri
          - 226 # render — /dev/dri/renderD* + /dev/kfd (ROCm compute)
        seccompProfile:
          type: Unconfined # ROCm/HIP needs unrestricted syscalls

    controllers:
      app:
        # Recreate, not RollingUpdate: singleton holding the node's only squat.ai/dri:1.
        strategy: Recreate
        containers:
          app:
            # SGLang (mattbucci RDNA4 fork) runs from the prebuilt conda env on the `sglang` PVC at
            # /cache/sglang — the image is only the ROCm 7.2.4 runtime base. The engine, the native
            # gfx1201 HIP kernels, the fork source and the bring-up patches all live on the PVC.
            # See the app README for the PVC inventory, the patches, and the OCI-image follow-up.
            image:
              repository: docker.io/rocm/dev-ubuntu-24.04
              tag: 7.2.4-complete@sha256:92f309c51b52cef8762867848f1529dee821624f23cd5df38455e819538f762f
            # Override the dev-image entrypoint with the fork's preset runner. The qwen36-27b preset
            # + these flags are the validated single-card config (perf table and the rejected
            # alternatives — MoE, MTP/EAGLE3/DFlash/ngram, fp4 KV — are in the app README). No-cache
            # (overlap scheduler ON) is chosen over extra_buffer because batch throughput is the
            # goal: on RDNA4 prefix-cache and high batch are mutually exclusive. Context 262144 is
            # the model's native max; the KV pool caps a single full-window request (see configmap),
            # but typical traffic fits and batch stays intact.
            command:
              - /bin/bash
              - -c
              - >-
                exec bash /cache/sglang/repo/scripts/launch.sh qwen36-27b
                --context-length 262144
                --mem-fraction 0.90
                --max-running 32
                --chunked-prefill 4096
                --port 8000
            env:
              TZ: ${TIMEZONE}
              # --- launch.sh / common.sh overrides (most gfx1201 env is set by common.sh) ---
              CONDA_BASE: /cache/sglang/conda
              TP: "1" # single R9700; the fork defaults to 2 (its dual-card box)
              MODEL: mattbucci/Qwen3.6-27B-AWQ # resolved offline from HF_HOME cache
              # Pin every device-visibility var to card 0 (common.sh defaults them to "0,1").
              HIP_VISIBLE_DEVICES: &card0 "0"
              ROCR_VISIBLE_DEVICES: *card0
              GPU_DEVICE_ORDINAL: *card0
              CUDA_VISIBLE_DEVICES: *card0
              HF_HOME: /cache/hf
              HF_HUB_OFFLINE: "1"
              TRITON_CACHE_DIR: /cache/sglang/triton # persisted JIT cache on the PVC
              PYTORCH_HIP_ALLOC_CONF: "" # torch-2.12 on RDNA4 faults with expandable_segments
              # Appended after the preset's flags (last-wins): no-cache batch mode, mamba slots to
              # match max-running (extra_buffer-free), and the drop-in served model name so litellm
              # /karakeep keep calling `qwen-3.6` unchanged.
              EXTRA_ARGS: "--disable-radix-cache --max-mamba-cache-size 32 --served-model-name qwen-3.6"
            probes:
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /health
                    port: &port 8000
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 5
                  # ~16 min budget (60×15s + 60s): warm PVC boots in ~2-3 min; headroom covers a
                  # cold Triton recompile after image/kernel changes.
                  failureThreshold: 60
              # No initialDelaySeconds on liveness/readiness: the startup probe gates both, so they
              # only begin polling once /health is already up.
              liveness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  periodSeconds: 60
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 2
                memory: 10Gi
                squat.ai/dri: &dri 1 # extended resource: request must equal limit
              limits:
                cpu: 12
                # Observed steady-state ~2.3 GB (weights live in VRAM); 16Gi covers model-load
                # spikes + the shm tmpfs below. The old vllm 32Gi was never approached.
                memory: 16Gi
                squat.ai/dri: *dri

    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: sglang
          gethomepage.dev/description: Qwen3.6-27B SGLang inference (RDNA4, TP=1, ~99 tok/s batch)
          gethomepage.dev/group: Models
          gethomepage.dev/icon: mdi-brain
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 80

    persistence:
      # The `sglang` PVC carries the prebuilt SGLang conda env, fork source, Triton cache and the
      # Qwen3.6 AWQ model (see pvc.yaml). Rebuildable via the fork's setup.sh if lost.
      cache:
        enabled: true
        existingClaim: sglang
        advancedMounts:
          app:
            app:
              - path: /cache
      shm:
        type: emptyDir
        medium: Memory
        # tmpfs counts against the container memory limit; TP=1 barely uses shm (the large-shm
        # case is multi-GPU tensor sharing, N/A here), so keep it well under the 16Gi limit.
        sizeLimit: 8Gi
        advancedMounts:
          app:
            app:
              - path: /dev/shm
