---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sglang
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    timeout: 30m
    remediation:
      retries: 1
  upgrade:
    timeout: 30m
    remediation:
      retries: -1 # no rollback: a cold Triton recompile can exceed the upgrade timeout
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          # Hard gate to the GPU node; complements the soft control-1 pin from affinity-control-1.
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: amd.com/gpu
                    operator: In
                    values: ["true"]
      # Root + video/render groups + Unconfined seccomp = ROCm device access via squat.ai/dri:1.
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        supplementalGroups:
          - 44 # video — /dev/dri
          - 226 # render — /dev/dri/renderD* + /dev/kfd (ROCm compute)
        seccompProfile:
          type: Unconfined # ROCm/HIP needs unrestricted syscalls

    controllers:
      app:
        # Recreate, not RollingUpdate: singleton holding the node's only squat.ai/dri:1.
        strategy: Recreate
        containers:
          app:
            # SGLang (mattbucci RDNA4 fork v0.5.13.post1 + 46 patches, torch 2.12+rocm7.2,
            # Triton 3.6) runs from the prebuilt conda env on the `vllm` PVC at /cache/sglang.
            # The image is just the ROCm 7.2.4 runtime base; the engine + the 3 native gfx1201
            # HIP kernels + the fork source live on the PVC. See app README for the PVC contents
            # and the runtime patches it carries (extra_buffer is_hip gate, can_use_store_cache
            # fallback, common.sh allocator, #131 chat-template fix). Follow-up: bake this into a
            # versioned OCI image so the serving env is reproducible from git.
            image:
              repository: docker.io/rocm/dev-ubuntu-24.04
              tag: 7.2.4-complete@sha256:92f309c51b52cef8762867848f1529dee821624f23cd5df38455e819538f762f
            # Override the dev-image entrypoint: launch the fork's preset runner. The qwen36-27b
            # preset + these flags are the validated single-card config — dense Qwen3.6-27B-AWQ at
            # TP=1 reaches ~99 tok/s aggregate decode @conc24-32, 16 tok/s single-stream, PP
            # 528-888, tools on (qwen3_coder), thinking on + preserved. No-cache (overlap ON) is
            # chosen over extra_buffer because batch throughput is the goal; on RDNA4 prefix-cache
            # and high batch are mutually exclusive (extra_buffer caps batch ~24). MoE 35B-A3B and
            # MTP/EAGLE3/DFlash/ngram and fp4 KV were all evaluated and rejected — see app README.
            # Context 262144 = the model's native max (advertised, uncapped). The 32GB KV pool
            # serves ~202K tokens/request at N=32, so a single prompt near the full window may not
            # schedule; typical traffic fits and batch stays intact (~95 tok/s @conc24).
            command:
              - /bin/bash
              - -c
              - >-
                exec bash /cache/sglang/repo/scripts/launch.sh qwen36-27b
                --context-length 262144
                --mem-fraction 0.90
                --max-running 32
                --chunked-prefill 4096
                --port 8000
            env:
              TZ: ${TIMEZONE}
              # --- launch.sh / common.sh overrides (most gfx1201 env is set by common.sh) ---
              CONDA_BASE: /cache/sglang/conda
              TP: "1" # single R9700; the fork defaults to 2 (its dual-card box)
              MODEL: mattbucci/Qwen3.6-27B-AWQ # resolved offline from HF_HOME cache
              # Pin every device-visibility var to card 0 (common.sh defaults them to "0,1").
              HIP_VISIBLE_DEVICES: "0"
              ROCR_VISIBLE_DEVICES: "0"
              GPU_DEVICE_ORDINAL: "0"
              CUDA_VISIBLE_DEVICES: "0"
              HF_HOME: /cache/hf
              HF_HUB_OFFLINE: "1"
              TRITON_CACHE_DIR: /cache/sglang/triton # persisted JIT cache on the PVC
              PYTORCH_HIP_ALLOC_CONF: "" # torch-2.12 on RDNA4 faults with expandable_segments
              # Appended after the preset's flags (last-wins): no-cache batch mode, mamba slots to
              # match max-running (extra_buffer-free), and the drop-in served model name so litellm
              # /karakeep keep calling `qwen-3.6` unchanged.
              EXTRA_ARGS: "--disable-radix-cache --max-mamba-cache-size 32 --served-model-name qwen-3.6"
            probes:
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /health
                    port: &port 8000
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 5
                  # ~16 min budget (60×15s + 60s): warm PVC boots in ~2-3 min; headroom covers a
                  # cold Triton recompile after image/kernel changes.
                  failureThreshold: 60
              liveness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 60
                  periodSeconds: 60
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 2
                memory: 10Gi
                squat.ai/dri: 1
              limits:
                cpu: 12
                memory: 32Gi
                squat.ai/dri: 1

    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: sglang
          gethomepage.dev/description: Qwen3.6-27B SGLang inference (RDNA4, TP=1, ~99 tok/s batch)
          gethomepage.dev/group: Models
          gethomepage.dev/icon: mdi-brain
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 80

    persistence:
      # The `vllm` PVC carries the prebuilt SGLang conda env, fork source, Triton cache and the
      # Qwen3.6 AWQ models (see pvc.yaml — kept under the `vllm` name to preserve the data).
      cache:
        enabled: true
        existingClaim: vllm
        advancedMounts:
          app:
            app:
              - path: /cache
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 16Gi
        advancedMounts:
          app:
            app:
              - path: /dev/shm
