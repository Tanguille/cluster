---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sglang
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: amd.com/gpu
                    operator: In
                    values: ["true"]
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        supplementalGroups:
          - 44 # video — open /dev/dri
          - 226 # render — /dev/dri/renderD* and /dev/kfd for ROCm compute
        seccompProfile:
          type: Unconfined # ROCm/HIP needs unrestricted syscalls

    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # Custom SGLang RDNA4 build (docker/sglang-rdna4/). Pin by @sha256 once built.
              repository: ghcr.io/tanguille/sglang-rdna4
              tag: v0.5.12-gfx1201
            # No `command:` — that overrides the image ENTRYPOINT (entrypoint.sh) and would
            # skip conda activation. Pass the full argv as `args` so entrypoint.sh exec's it.
            # Flags mirror the fork's validated `launch.sh qwen36-27b` preset; inline notes
            # mark correctness requirements (not tuning).
            args:
              - python
              - -m
              - sglang.launch_server
              - --model-path
              - mattbucci/Qwen3.6-27B-AWQ
              - --served-model-name
              - qwen3.6-27b
              - --quantization
              - awq
              - --dtype
              - bfloat16 # required: fp16 hits a type mismatch in triton decode_attention and crashes the scheduler
              - --kv-cache-dtype
              - fp8_e4m3 # fork-validated for gfx1201 (patches 039/042/044); trades decode for KV capacity. bf16 KV is the Step 5 A/B
              - --context-length
              - "131072" # single-card; the preset's 262144 assumes TP2/64GB. Step 5 probes the ceiling
              - --mem-fraction-static
              - "0.80"
              - --max-running-requests
              - "8"
              - --chunked-prefill-size
              - "8192"
              - --num-continuous-decode-steps
              - "8" # required: higher values kill the thinking-mode scheduler on this hybrid
              - --max-mamba-cache-size
              - "8" # sizes the GatedDeltaNet recurrent-state cache
              - --attention-backend
              - triton # validated gfx1201 path; torch_native is the escape hatch for tool-call logit issues at long KV
              - --reasoning-parser
              - qwen3
              - --tool-call-parser
              - qwen3_coder
              - --disable-cuda-graph
              - --disable-custom-all-reduce
              - --tensor-parallel-size
              - "1" # single R9700; preset defaults to 2 (TP2 RCCL-deadlocks here)
              - --trust-remote-code
              - --watchdog-timeout
              - "600"
              - --enable-metrics
              - --host
              - 0.0.0.0
              - --port
              - "8000"
            env:
              TZ: ${TIMEZONE}
              HF_HOME: /cache
              HIP_VISIBLE_DEVICES: "0" # single R9700 (correctness vars are baked into the image ENV)
            probes:
              # First boot downloads ~19Gi of weights + JIT-compiles kernels — long startup window.
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /health
                    port: &port 8000
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 80 # ~20 min ceiling for download + load + JIT
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 2
                memory: 8Gi
                squat.ai/dri: 1
              limits:
                cpu: 12
                memory: 32Gi
                squat.ai/dri: 1

    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: SGLang
          gethomepage.dev/description: Qwen3.6-27B inference (SGLang/ROCm, RDNA4)
          gethomepage.dev/group: Models
          gethomepage.dev/icon: mdi-brain
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 80

    persistence:
      cache:
        enabled: true
        existingClaim: sglang
        globalMounts:
          - path: /cache
      # SGLang uses /dev/shm for tokenizer/detokenizer IPC; the default 64Mi is too small.
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 8Gi
        globalMounts:
          - path: /dev/shm
