---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm
  namespace: ai
  annotations:
    # DATA-SAFETY: this PVC carries the prebuilt SGLang conda env (/cache/sglang/conda),
    # the patched fork source, the Triton cache, and the downloaded Qwen3.6 AWQ models
    # (~65 GB). openebs-hostpath reclaim is Delete, so a prune would destroy it. Keep the
    # PVC name `vllm` (do NOT rename — that provisions a fresh empty hostPath) and disable
    # pruning so the vLLM→SGLang app swap cannot delete it.
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 50Gi
