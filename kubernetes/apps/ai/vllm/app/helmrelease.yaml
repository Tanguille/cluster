---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    timeout: 25m
    remediation:
      retries: 1
  upgrade:
    # Cold start ~15-20 min (Dynamo JIT + Triton autotune + graph capture) > default 5m timeout.
    timeout: 25m
    remediation:
      retries: -1 # no rollback: cold start can exceed the upgrade timeout
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          # Hard gate to the GPU node; complements the soft control-1 pin from affinity-control-1.
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: amd.com/gpu
                    operator: In
                    values: ["true"]
      # Root + video/render groups + Unconfined seccomp = ROCm device access via squat.ai/dri:1.
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        supplementalGroups:
          - 44 # video — /dev/dri
          - 226 # render — /dev/dri/renderD* + /dev/kfd (ROCm compute)
        seccompProfile:
          type: Unconfined # ROCm/HIP needs unrestricted syscalls

    controllers:
      app:
        # Recreate, not RollingUpdate: singleton holding the node's only squat.ai/dri:1.
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # Community vLLM ROCm build with gfx1201 patches.
              repository: docker.io/kyuz0/vllm-therock-gfx1201
              tag: latest@sha256:55fa7796374a281e4b77a05cc2f26391d4100a5abb738f77c580ebc3951761e9
            command:
              - python
              - -m
              - vllm.entrypoints.openai.api_server
            args:
              # AWQ INT4 is the recommended quant for gfx1201 (kyuz0/amd-r9700-vllm-toolboxes verified).
              # fp8 and NVFP4 don't work on this card (no fast kernel / emulation-only).
              - --model
              - cyankiwi/Qwen3.6-27B-AWQ-INT4
              # Keep qwen-3.6 as served name so litellm/toolhive configs are unchanged.
              - --served-model-name
              - qwen-3.6
              - --host
              - 0.0.0.0
              - --port
              - "8000"
              # Triton attention (LM + vision encoder). kyuz0's AITER Unified Attention is faster on
              # paper (~4%) but its master flag also forces an AITER sampler that JIT-crashes on this
              # image with top_k/top_p (hipcc version unparseable); TRITON_ATTN is the fastest backend
              # that needs no AITER, so it avoids that crash.
              - --attention-backend
              - TRITON_ATTN
              - --mm-encoder-attn-backend
              - TRITON_ATTN
              # Eager: keeps the config simple and sidesteps gfx1201 graph-capture issues; decode is
              # GEMM-bound so cudagraph wouldn't help. (Vision encoder kept — image input needed.)
              - --enforce-eager
              # 240K context (fp8 KV). Full 262K doesn't fit once the vision encoder is loaded (we keep
              # vision; kyuz0's bench drops it). Lower further if a boot crash-loops on the pool.
              - --max-model-len
              - "245760"
              - --max-num-seqs
              - "32"
              - --max-num-batched-tokens
              - "16384"
              # 0.97 (not kyuz0's 0.95) to claw back KV headroom, since we keep the vision encoder.
              - --gpu-memory-utilization
              - "0.97"
              # fp8 KV halves KV footprint → enables full 262K context; AWQ Hadamard rotation absorbs the error.
              - --kv-cache-dtype
              - fp8
              - --enable-prefix-caching
              - --trust-remote-code
              - --no-enable-log-requests
              - --enable-auto-tool-choice
              # Qwen3.6 emits qwen3_coder-style tool calls (<function=..><parameter=..>), not Hermes JSON.
              - --tool-call-parser
              - qwen3_coder
              # Reasoning model: suspends xgrammar during <think> so it only constrains the answer.
              # Without it the tool grammar masks thinking tokens → ~0 tok/s stall under concurrent tools.
              - --reasoning-parser
              - qwen3
              # Keep prior-turn reasoning in context (mirrors llama-server preserve_thinking).
              - --default-chat-template-kwargs
              - '{"preserve_thinking": true}'
              # Tuned sampling defaults (model's generation_config ships temperature=1.0).
              - --override-generation-config
              - '{"temperature": 0.6, "top_k": 20, "top_p": 0.95, "min_p": 0.0}'
              # Pin xgrammar (no silent guidance fallback) + no unbounded whitespace → fewer grammar steps.
              - --structured-outputs-config
              - '{"backend": "xgrammar", "disable_any_whitespace": true}'
              # MTP stays OFF: under concurrent tool-calling it wedges the grammar FSM (deferred, ~0 tok/s;
              # vLLM #34650). Helps single-stream only — net loss for this workload.
            env:
              TZ: ${TIMEZONE}
              HF_HOME: /cache/hf # model weights on the cache PVC
              TRITON_CACHE_DIR: /cache/triton # persisted Triton JIT cache
              VLLM_CACHE_ROOT: /cache/vllm
              HIP_VISIBLE_DEVICES: "0"
              PYTORCH_ROCM_ARCH: gfx1201
              # AITER OFF: its master flag forces an AITER top_k/top_p sampler that JIT-crashes on this
              # image (hipcc version unparseable → IndexError). No granular sampler off-switch exists,
              # so the whole AITER path stays off; we use TRITON_ATTN attention instead.
              VLLM_ROCM_USE_AITER: "0"
            probes:
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /health
                    port: &port 8000
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 5
                  # ~31 min budget (120×15s + 60s) covers warm restarts; empty PVC adds ~60 min download.
                  failureThreshold: 120
              liveness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 60
                  periodSeconds: 60
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 2
                memory: 10Gi
                squat.ai/dri: 1
              limits:
                cpu: 12
                memory: 32Gi
                squat.ai/dri: 1

    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: vllm
          gethomepage.dev/description: Qwen3.6-27B vLLM inference (kyuz0/ROCm, RDNA4, 262K ctx, 16 seqs)
          gethomepage.dev/group: Models
          gethomepage.dev/icon: mdi-brain
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 80

    persistence:
      cache:
        enabled: true
        existingClaim: vllm
        advancedMounts:
          app:
            app:
              - path: /cache
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 4Gi
        advancedMounts:
          app:
            app:
              - path: /dev/shm
