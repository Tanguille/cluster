---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    timeout: 25m
    remediation:
      retries: 1
  upgrade:
    # Cold start ~15-20 min (Dynamo JIT + Triton autotune + graph capture) > default 5m timeout.
    timeout: 25m
    remediation:
      retries: -1 # no rollback: cold start can exceed the upgrade timeout
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          # Hard gate to the GPU node; complements the soft control-1 pin from affinity-control-1.
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: amd.com/gpu
                    operator: In
                    values: ["true"]
      # Root + video/render groups + Unconfined seccomp = ROCm device access via squat.ai/dri:1.
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        supplementalGroups:
          - 44 # video — /dev/dri
          - 226 # render — /dev/dri/renderD* + /dev/kfd (ROCm compute)
        seccompProfile:
          type: Unconfined # ROCm/HIP needs unrestricted syscalls

    controllers:
      app:
        # Recreate, not RollingUpdate: singleton holding the node's only squat.ai/dri:1.
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # Community vLLM ROCm build with gfx1201 patches.
              # EXP-016b: 0.97 util → 8.94 GiB KV, 234K fits; C=1 ~19.0 tok/s, C=8 agg 108.6 tok/s.
              repository: docker.io/kyuz0/vllm-therock-gfx1201
              tag: latest@sha256:55fa7796374a281e4b77a05cc2f26391d4100a5abb738f77c580ebc3951761e9
            command:
              - python
              - -m
              - vllm.entrypoints.openai.api_server
            args:
              - --model
              - cyankiwi/Qwen3.6-27B-AWQ-INT4
              # Keep qwen-3.6 as served name so litellm/toolhive configs are unchanged.
              - --served-model-name
              - qwen-3.6
              - --host
              - 0.0.0.0
              - --port
              - "8000"
              # 89% of 262,144 native ctx; 234K → 8.54 GiB fp8 KV, fits the 8.94 GiB free (EXP-016b).
              - --max-model-len
              - "234320"
              - --max-num-seqs
              - "16"
              # MTP caps this at 2048 by default (vLLM warns it's suboptimal); bump for draft-slot headroom.
              - --max-num-batched-tokens
              - "8192"
              - --gpu-memory-utilization
              - "0.97"
              # fp8 KV halves KV footprint vs bf16; Hadamard rotation in the AWQ quant absorbs error.
              - --kv-cache-dtype
              - fp8
              - --enable-prefix-caching
              - --trust-remote-code
              - --no-enable-log-requests
              - --enable-auto-tool-choice
              - --tool-call-parser
              - hermes
              # MTP self-speculative. vLLM reuses a SINGLE MTP layer per draft token, so >1 token
              # degrades acceptance (vLLM warns this); under load it burned ~5x forward compute for
              # ~1 accepted token (GPU 97% busy, near-zero decode). 1 draft token avoids that waste.
              - --spec-method
              - mtp
              - --spec-tokens
              - "1"
              # Persist AOT compile artifacts (~5 min/restart). Fused norm/quant passes (EXP-011)
              # shrink activation buffers ~0.5 GiB, which 234K ctx needs; not on by default.
              - --compilation-config
              - '{"cache_dir": "/cache/compile", "custom_ops": ["none"], "cudagraph_capture_sizes": [1, 2, 4, 8, 16, 32, 48, 64, 80], "pass_config": {"fuse_norm_quant": true, "fuse_act_quant": true}}'
            env:
              TZ: ${TIMEZONE}
              HF_HOME: /cache/hf # model weights on the cache PVC (~27 GB on first start)
              # Triton JIT cache + vLLM AOT compile cache — persisted so restarts skip recompilation.
              TRITON_CACHE_DIR: /cache/triton
              # AOT compiled functions default to /root/.cache (ephemeral); redirect to PVC.
              VLLM_CACHE_ROOT: /cache/vllm
              HIP_VISIBLE_DEVICES: "0"
              PYTORCH_ROCM_ARCH: gfx1201
              # AITER ops hang on gfx1201 with this vLLM build.
              VLLM_ROCM_USE_AITER: "0"
              FLASH_ATTENTION_TRITON_AMD_ENABLE: "TRUE"
            probes:
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /health
                    port: &port 8000
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 5
                  # ~31 min budget (120×15s + 60s) covers warm restarts; empty PVC adds ~60 min download.
                  failureThreshold: 120
              liveness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 60
                  periodSeconds: 60
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 2
                memory: 10Gi
                squat.ai/dri: 1
              limits:
                cpu: 12
                memory: 32Gi
                squat.ai/dri: 1

    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: vllm
          gethomepage.dev/description: Qwen3.6-27B vLLM inference (kyuz0/ROCm, RDNA4, MTP×1, 234K ctx, 16 seqs)
          gethomepage.dev/group: Models
          gethomepage.dev/icon: mdi-brain
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 80

    persistence:
      cache:
        enabled: true
        existingClaim: vllm
        advancedMounts:
          app:
            app:
              - path: /cache
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 4Gi
        advancedMounts:
          app:
            app:
              - path: /dev/shm
