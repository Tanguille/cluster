---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    timeout: 25m
    remediation:
      retries: 1
  upgrade:
    # Cold start ~15-20 min (Dynamo JIT + Triton autotune + graph capture) > default 5m timeout.
    timeout: 25m
    remediation:
      retries: -1 # no rollback: cold start can exceed the upgrade timeout
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          # Hard gate to the GPU node; complements the soft control-1 pin from affinity-control-1.
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: amd.com/gpu
                    operator: In
                    values: ["true"]
      # Root + video/render groups + Unconfined seccomp = ROCm device access via squat.ai/dri:1.
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        supplementalGroups:
          - 44 # video — /dev/dri
          - 226 # render — /dev/dri/renderD* + /dev/kfd (ROCm compute)
        seccompProfile:
          type: Unconfined # ROCm/HIP needs unrestricted syscalls

    controllers:
      app:
        # Recreate, not RollingUpdate: singleton holding the node's only squat.ai/dri:1.
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # Community vLLM ROCm build with gfx1201 patches.
              repository: docker.io/kyuz0/vllm-therock-gfx1201
              tag: latest@sha256:55fa7796374a281e4b77a05cc2f26391d4100a5abb738f77c580ebc3951761e9
            command:
              - python
              - -m
              - vllm.entrypoints.openai.api_server
            args:
              # cyankiwi/Qwen3.6-27B-AWQ-INT4 is the image author's (kyuz0/amd-r9700-vllm-toolboxes)
              # VERIFIED model for this card. fp8 (crashed node, OOM/disk) and NVFP4 (emulation-only,
              # slow) were dead ends — AWQ INT4 is the recommended quant for gfx1201.
              - --model
              - cyankiwi/Qwen3.6-27B-AWQ-INT4
              # Keep qwen-3.6 as served name so litellm/toolhive configs are unchanged.
              - --served-model-name
              - qwen-3.6
              - --host
              - 0.0.0.0
              - --port
              - "8000"
              # kyuz0's recommended R9700 attention recipe: AITER Unified Attention (Triton-based,
              # ~4% faster than the ROCM_ATTN default) for the LM, plain Triton for the vision encoder.
              # Enabled via the VLLM_ROCM_USE_AITER_* env block below (only unified-attn on, all other
              # AITER C++/HIP paths off — those crash graph capture on gfx1201).
              - --attention-backend
              - ROCM_AITER_UNIFIED_ATTN
              - --mm-encoder-attn-backend
              - TRITON_ATTN
              # kyuz0 runs the 27B eager on gfx1201: torch.compile/cudagraph capture is unstable with
              # the AITER attention path (IndexError at capture). Eager also frees cudagraph VRAM.
              - --enforce-eager
              # Text-only serving: skip the vision encoder (saves VRAM + load time). NOTE: this
              # DISABLES image input — drop this flag if multimodal requests are ever needed.
              - --language-model-only
              # Full 262,144 native context. fp8 KV + eager (no cudagraph VRAM) + language-model-only
              # (no vision VRAM) leave ample KV room; if a boot ever profiles below this it crash-loops
              # → lower max-model-len. (kyuz0's bench uses 20480, but that's a throughput-bench value.)
              - --max-model-len
              - "262144"
              # kyuz0's R9700 setting for this model.
              - --max-num-seqs
              - "32"
              # kyuz0's R9700 setting for this model (16384) — raises prefill throughput under load.
              - --max-num-batched-tokens
              - "16384"
              # kyuz0 uses 0.95 (more headroom than 0.97).
              - --gpu-memory-utilization
              - "0.95"
              # fp8 KV halves KV footprint vs bf16 → enables full 262K context; Hadamard rotation in
              # the AWQ quant absorbs the error. (Our context requirement; kyuz0's bench leaves KV default.)
              - --kv-cache-dtype
              - fp8
              - --enable-prefix-caching
              - --trust-remote-code
              - --no-enable-log-requests
              - --enable-auto-tool-choice
              # Qwen3.6 emits qwen3_coder-style tool calls (<tool_call><function=..><parameter=..>),
              # NOT Hermes JSON — confirmed from the model's chat template. hermes mis-parses them.
              - --tool-call-parser
              - qwen3_coder
              # Reasoning model: parse <think> so xgrammar is SUSPENDED during reasoning and only
              # constrains the post-</think> answer. Without it the tool-JSON grammar masks the
              # thinking tokens → mass rejection → ~0 tok/s stall under concurrent tool calls.
              # Thinking stays ON (enable_thinking defaults true) — preserves reasoning like the
              # llama-server preserve_thinking setup.
              - --reasoning-parser
              - qwen3
              # Keep prior-turn reasoning in context (the model's chat template supports this kwarg);
              # mirrors the retired llama-server `chat-template-kwargs = {"preserve_thinking": true}`.
              - --default-chat-template-kwargs
              - '{"preserve_thinking": true}'
              # Override the model's generation_config.json (ships temperature=1.0) with the tuned
              # sampling from the retired llama-server config: temp 0.6 / top_k 20 / top_p 0.95 /
              # min_p 0. Applied as request defaults when a client doesn't set its own.
              - --override-generation-config
              - '{"temperature": 0.6, "top_k": 20, "top_p": 0.95, "min_p": 0.0}'
              # Pin xgrammar (default 'auto' can silently fall back to the slower guidance backend)
              # and forbid unbounded whitespace runs in JSON output — fewer grammar steps per tool call.
              - --structured-outputs-config
              - '{"backend": "xgrammar", "disable_any_whitespace": true}'
              # MTP self-speculation stays OFF. Re-tested 2026-06-21 (num_speculative_tokens=2):
              # under concurrent tool-calling it re-triggered the structured-output wedge — requests
              # piled up as 'deferred' on the grammar FSM and decode fell to ~0 tok/s (vLLM #34650,
              # spec-decode × structured output). Helps single-stream only; net loss for this
              # agentic workload. MTP off also frees draft KV → full 262K context fits.
              # kyuz0: norm-quant graph fusion CRASHES on gfx1201 — keep it off. (cudagraph/AOT
              # settings dropped: --enforce-eager disables graph capture and torch.compile anyway.)
              - --compilation-config
              - '{"pass_config": {"fuse_norm_quant": false}}'
            env:
              TZ: ${TIMEZONE}
              HF_HOME: /cache/hf # model weights on the cache PVC (~27 GB on first start)
              # Triton JIT cache + vLLM AOT compile cache — persisted so restarts skip recompilation.
              TRITON_CACHE_DIR: /cache/triton
              # AOT compiled functions default to /root/.cache (ephemeral); redirect to PVC.
              VLLM_CACHE_ROOT: /cache/vllm
              HIP_VISIBLE_DEVICES: "0"
              PYTORCH_ROCM_ARCH: gfx1201
              # kyuz0's AITER-Unified recipe for R9700/gfx1201: master ON but ONLY unified-attention
              # enabled — every other AITER path (MHA/paged-attn/MoE/linear/rmsnorm/fp8/fp4/rope) is
              # the C++/HIP code that crashes graph capture on this card, so all OFF. Pairs with
              # --attention-backend ROCM_AITER_UNIFIED_ATTN + --enforce-eager.
              VLLM_ROCM_USE_AITER: "1"
              VLLM_ROCM_USE_AITER_UNIFIED_ATTENTION: "1"
              VLLM_ROCM_USE_AITER_MHA: "0"
              VLLM_ROCM_USE_AITER_PAGED_ATTN: "0"
              VLLM_ROCM_USE_AITER_MOE: "0"
              VLLM_ROCM_USE_AITER_LINEAR: "0"
              VLLM_ROCM_USE_AITER_RMSNORM: "0"
              VLLM_ROCM_USE_AITER_FP8BMM: "0"
              VLLM_ROCM_USE_AITER_FP4BMM: "0"
              VLLM_ROCM_USE_AITER_TRITON_ROPE: "0"
            probes:
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /health
                    port: &port 8000
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 5
                  # ~31 min budget (120×15s + 60s) covers warm restarts; empty PVC adds ~60 min download.
                  failureThreshold: 120
              liveness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 60
                  periodSeconds: 60
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 2
                memory: 10Gi
                squat.ai/dri: 1
              limits:
                cpu: 12
                memory: 32Gi
                squat.ai/dri: 1

    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: vllm
          gethomepage.dev/description: Qwen3.6-27B vLLM inference (kyuz0/ROCm, RDNA4, 262K ctx, 16 seqs)
          gethomepage.dev/group: Models
          gethomepage.dev/icon: mdi-brain
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 80

    persistence:
      cache:
        enabled: true
        existingClaim: vllm
        advancedMounts:
          app:
            app:
              - path: /cache
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 4Gi
        advancedMounts:
          app:
            app:
              - path: /dev/shm
