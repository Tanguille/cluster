---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    timeout: 25m
    remediation:
      retries: 1
  upgrade:
    # Cold start ~15-20 min (Dynamo JIT + Triton autotune + graph capture) > default 5m timeout.
    timeout: 25m
    remediation:
      retries: -1 # no rollback: cold start can exceed the upgrade timeout
  valuesFrom:
    - kind: ConfigMap
      name: affinity-control-1

  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          # Hard gate to the GPU node; complements the soft control-1 pin from affinity-control-1.
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: amd.com/gpu
                    operator: In
                    values: ["true"]
      # Root + video/render groups + Unconfined seccomp = ROCm device access via squat.ai/dri:1.
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        supplementalGroups:
          - 44 # video — /dev/dri
          - 226 # render — /dev/dri/renderD* + /dev/kfd (ROCm compute)
        seccompProfile:
          type: Unconfined # ROCm/HIP needs unrestricted syscalls

    controllers:
      app:
        # Recreate, not RollingUpdate: singleton holding the node's only squat.ai/dri:1.
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # Community vLLM ROCm build with gfx1201 patches.
              repository: docker.io/kyuz0/vllm-therock-gfx1201
              tag: latest@sha256:55fa7796374a281e4b77a05cc2f26391d4100a5abb738f77c580ebc3951761e9
            command:
              - python
              - -m
              - vllm.entrypoints.openai.api_server
            args:
              # AWQ INT4: recommended quant for gfx1201 (kyuz0 verified). fp8/NVFP4 don't work here.
              - --model
              - cyankiwi/Qwen3.6-27B-AWQ-INT4
              - --served-model-name
              - qwen-3.6
              - --host
              - 0.0.0.0
              - --port
              - "8000"
              # TRITON_ATTN: AITER attention is ~4% faster but forces an AITER sampler that crashes here.
              - --attention-backend
              - TRITON_ATTN
              - --mm-encoder-attn-backend
              - TRITON_ATTN
              # Compiled + CUDA graphs (no --enforce-eager): graph capture works on gfx1201 and cuts
              # per-step launch overhead on the recurrent GDN/Mamba decode path. Served ~1.5h fine, then
              # a runtime VRAM spike OOM'd it and KV shrank below the ctx requirement on restart → crash
              # loop. Fixed via headroom: lower max-model-len (less KV needed) + smaller batched-tokens
              # (lower activation peak). 192K (fp8 KV) booted with a ~290K-token pool / 9.36 GiB KV —
              # far above the ctx need, so it recovers cleanly on restart and covers all observed
              # traffic (max prompt seen <100K). Raise toward 245760 only if the pool stays comfortably
              # above it across boots (it varies boot-to-boot).
              - --max-model-len
              - "196608"
              - --max-num-seqs
              - "32"
              # 8192 chunk: lower prefill activation peak (the OOM spike source) and interleaves decode
              # better so a big prompt's prefill doesn't starve concurrent decodes.
              - --max-num-batched-tokens
              - "8192"
              # NOTE: concurrent partial prefills (--max-num-partial-prefills) would let short prompts
              # skip a giant prompt's chunked prefill (cutting the ~83s TTFT), but this build hard-blocks
              # any non-default value — EngineArgs._check_feature_supported raises "Concurrent Partial
              # Prefill is not supported. No Concurrent Partial Prefills so far." Revisit on a newer image.
              # 0.95 (kyuz0-recommended): the boot pool is ~290K tokens vs the 196K ctx cap, so ~94K
              # tokens of KV slack. Spending ~0.64 GiB of it on VRAM spike headroom directly guards
              # against the runtime-spike OOM that crash-looped 0.97. Pool stays well above ctx need.
              - --gpu-memory-utilization
              - "0.95"
              # fp8 KV halves KV footprint; AWQ Hadamard rotation absorbs the error.
              - --kv-cache-dtype
              - fp8
              - --enable-prefix-caching
              - --trust-remote-code
              - --no-enable-log-requests
              - --enable-auto-tool-choice
              # Qwen3.6 emits qwen3_coder-style tool calls (<function=..><parameter=..>), not Hermes JSON.
              - --tool-call-parser
              - qwen3_coder
              # Suspends xgrammar during <think>; without it the tool grammar masks thinking → ~0 tok/s stall.
              - --reasoning-parser
              - qwen3
              # Keep prior-turn reasoning in context (mirrors llama-server preserve_thinking).
              - --default-chat-template-kwargs
              - '{"preserve_thinking": true}'
              # Tuned sampling defaults (model's generation_config ships temperature=1.0).
              - --override-generation-config
              - '{"temperature": 0.6, "top_k": 20, "top_p": 0.95, "min_p": 0.0}'
              # Pin xgrammar (no silent guidance fallback) + no unbounded whitespace → fewer grammar steps.
              - --structured-outputs-config
              - '{"backend": "xgrammar", "disable_any_whitespace": true}'
              # MTP stays OFF: wedges the grammar FSM under concurrent tool-calling (vLLM #34650).
            env:
              TZ: ${TIMEZONE}
              HF_HOME: /cache/hf # model weights on the cache PVC
              TRITON_CACHE_DIR: /cache/triton # persisted Triton JIT cache
              VLLM_CACHE_ROOT: /cache/vllm
              HIP_VISIBLE_DEVICES: "0"
              PYTORCH_ROCM_ARCH: gfx1201
              # AITER OFF: its master flag forces an AITER top_k/top_p sampler that JIT-crashes here
              # (hipcc unparseable → IndexError), and there's no granular sampler off-switch.
              VLLM_ROCM_USE_AITER: "0"
            probes:
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /health
                    port: &port 8000
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 5
                  # ~31 min budget (120×15s + 60s) covers warm restarts; empty PVC adds ~60 min download.
                  failureThreshold: 120
              liveness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 60
                  periodSeconds: 60
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 2
                memory: 10Gi
                squat.ai/dri: 1
              limits:
                cpu: 12
                memory: 32Gi
                squat.ai/dri: 1

    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: vllm
          gethomepage.dev/description: Qwen3.6-27B vLLM inference (kyuz0/ROCm, RDNA4, 262K ctx, 16 seqs)
          gethomepage.dev/group: Models
          gethomepage.dev/icon: mdi-brain
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 80

    persistence:
      cache:
        enabled: true
        existingClaim: vllm
        advancedMounts:
          app:
            app:
              - path: /cache
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 4Gi
        advancedMounts:
          app:
            app:
              - path: /dev/shm
