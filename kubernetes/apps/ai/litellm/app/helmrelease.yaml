---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm-operator
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: litellm-operator
  values:
    llmkube:
      autoRegister: true
    # Chart default (128Mi limit) OOMKilled the controller once it was actively
    # reconciling all three InferenceService-backed LiteLLMModel CRs.
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 256Mi
