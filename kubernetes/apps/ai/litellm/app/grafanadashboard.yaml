---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: litellm
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: VictoriaMetrics
      inputName: DS_PROMETHEUS
  # Vendored from grafana.com 24965 rev 2; datasource refs use ${DS_PROMETHEUS} (mapped to
  # VictoriaMetrics via inputName below). Upstream's ${datasource} var resolves to the default
  # DS (prometheus → vmauth, which 400s on queries). Refresh: grafana.com/api/dashboards/24965/revisions/2/download
  configMapRef:
    name: litellm-dashboard
    key: litellm.json
