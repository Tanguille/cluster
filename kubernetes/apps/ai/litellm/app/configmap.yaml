---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  config.yaml: |
    model_list:
      - model_name: qwen-3.6
        litellm_params:
          model: openai/qwen-3.6
          api_base: http://llama-server.ai.svc.cluster.local/v1
          api_key: os.environ/LLAMA_SERVER_API_KEY
        model_info:
          mode: chat
      # Auto-expose every other model the llama-server router serves (e.g. qwen3-embedding) without a
      # per-model entry. litellm matches exact names first, then falls through to this wildcard.
      - model_name: "*"
        litellm_params:
          model: openai/*
          api_base: http://llama-server.ai.svc.cluster.local/v1
          api_key: os.environ/LLAMA_SERVER_API_KEY

    litellm_settings:
      callbacks: ["prometheus"]
      service_callback: ["prometheus_system"]
      cache: true
      cache_params:
        type: redis
        host: dragonfly.database.svc.cluster.local
        port: 6379
        namespace: litellm
      drop_params: true
