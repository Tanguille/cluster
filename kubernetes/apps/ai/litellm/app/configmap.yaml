---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  config.yaml: |
    model_list:
      - model_name: qwen-3.6
        litellm_params:
          model: openai/qwen-3.6
          api_base: http://sglang.ai.svc.cluster.local/v1
          api_key: os.environ/LLAMA_SERVER_API_KEY
          # Thinking-on + long-context agent prefills can exceed 600 s (cold 95–124K prefill is
          # 155–303 s before decode; thinking multiplies perceived latency). 408s in litellm logs
          # were this ceiling, not sglang faults. Latency-sensitive/json callers → qwen-3.6-fast.
          timeout: 1800
          stream_timeout: 1800
          num_retries: 0
        model_info:
          mode: chat
          # Qwen3.6-27B native context, matching SGLang --context-length 262144 (uncapped).
          # Note: the 32 GB KV pool serves ~202K tokens/request at N=32, so a single prompt
          # near the full window may not schedule — but litellm is not artificially capping it.
          max_input_tokens: 262144
          max_output_tokens: 8192

      # Thinking-off twin of qwen-3.6 (same SGLang backend). The model defaults thinking ON,
      # which spends the decode budget on reasoning_content and can return EMPTY content under
      # json_schema (validated live) — slow/failing for latency-sensitive structured/tool callers
      # like agent-pr-review. Point those at qwen-3.6-fast. litellm forwards chat_template_kwargs
      # to SGLang even with drop_params:true (validated live, both top-level and extra_body).
      - model_name: qwen-3.6-fast
        litellm_params:
          model: openai/qwen-3.6
          api_base: http://sglang.ai.svc.cluster.local/v1
          api_key: os.environ/LLAMA_SERVER_API_KEY
          timeout: 600
          stream_timeout: 600
          num_retries: 0
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
        model_info:
          mode: chat
          max_input_tokens: 262144
          max_output_tokens: 8192

      # Qwen3.5-2B on LLMKube (iGPU / Vulkan, control-2) — small fast offload model
      # for easy tasks (classification, extraction, short rewrites). GDN hybrid,
      # measured ~43 tok/s decode / ~513 tok/s prefill on the Radeon 660M.
      # Thinking forced off: the model defaults thinking ON, which spends the
      # token budget on reasoning_content and returns empty content on short
      # replies — wrong for fast offload. (Same fix/pattern as qwen-3.6-fast.)
      - model_name: qwen3.5-2b
        litellm_params:
          model: openai/qwen3.5-2b
          api_base: http://qwen35-2b.ai.svc.cluster.local:8080/v1
          api_key: os.environ/LLAMA_SERVER_API_KEY
          timeout: 300
          num_retries: 0
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
        model_info:
          mode: chat
          max_input_tokens: 16384
          max_output_tokens: 4096

      # Qwen3-Embedding-0.6B on LLMKube (iGPU / Vulkan). model_info.mode routes
      # /v1/embeddings here instead of chat (LLMKube #866 / litellm embedding mode).
      - model_name: qwen3-embedding
        litellm_params:
          model: openai/qwen3-embedding
          api_base: http://qwen3-embedding.ai.svc.cluster.local:8080/v1
          api_key: os.environ/LLAMA_SERVER_API_KEY
          timeout: 120
          # Override the global num_retries:0 (that policy guards against re-running
          # a 10-30 min chat prefill). Embeddings are sub-second; a transient
          # timeout/queue blip under concurrent vmcp+memini load should just retry.
          num_retries: 2
        model_info:
          mode: embedding

      # bge-small-en-v1.5 on LLMKube (CPU). Dedicated to vmcp-unified's per-session
      # tool-description search ONLY — decoupled from memini's qwen3-embedding so the
      # two never queue behind each other. ~18x fewer params than qwen3-embedding
      # means sub-second embeds for the ~194-tool/~1095-token batch, comfortably
      # under toolhive's hardcoded 30s server WriteTimeout (not configurable —
      # confirmed against the deployed v0.32.0 source).
      - model_name: vmcp-embedding
        litellm_params:
          model: openai/vmcp-embedding
          api_base: http://vmcp-embedding.ai.svc.cluster.local:8080/v1
          api_key: os.environ/LLAMA_SERVER_API_KEY
          timeout: 30
          num_retries: 2
        model_info:
          mode: embedding

    litellm_settings:
      callbacks: ["prometheus"]
      service_callback: ["prometheus_system"]
      # Agent chat is near-unique per turn — Redis cache added latency with ~0 hit rate.
      cache: false
      drop_params: true
      # Retrying a failed 10–30 min prefill restarts from scratch on the sole GPU backend.
      num_retries: 0
