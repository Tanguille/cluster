---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  config.yaml: |
    model_list:
      - model_name: qwen-3.6
        litellm_params:
          model: openai/qwen-3.6
          api_base: http://llama-server.ai.svc.cluster.local/v1
          api_key: os.environ/LLAMA_SERVER_API_KEY
          timeout: 600
          stream_timeout: 300
        model_info:
          mode: chat
          max_input_tokens: 234320
          max_output_tokens: 8192

    litellm_settings:
      callbacks: ["prometheus"]
      service_callback: ["prometheus_system"]
      # Agent chat is near-unique per turn — Redis cache added latency with ~0 hit rate.
      cache: false
      drop_params: true
