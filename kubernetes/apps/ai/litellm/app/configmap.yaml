---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  config.yaml: |
    model_list:
      - model_name: qwen-3.6
        litellm_params:
          model: openai/qwen-3.6
          api_base: http://sglang.ai.svc.cluster.local/v1
          api_key: os.environ/LLAMA_SERVER_API_KEY
          timeout: 600
          # SGLang single-stream ~16 tok/s: 8192 tokens ~512 s (faster under batch); 600 covers it.
          stream_timeout: 600
        model_info:
          mode: chat
          # Qwen3.6-27B native context, matching SGLang --context-length 262144 (uncapped).
          # Note: the 32 GB KV pool serves ~202K tokens/request at N=32, so a single prompt
          # near the full window may not schedule — but litellm is not artificially capping it.
          max_input_tokens: 262144
          max_output_tokens: 8192

    litellm_settings:
      callbacks: ["prometheus"]
      service_callback: ["prometheus_system"]
      # Agent chat is near-unique per turn — Redis cache added latency with ~0 hit rate.
      cache: false
      drop_params: true
