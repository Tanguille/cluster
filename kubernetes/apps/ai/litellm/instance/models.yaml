---
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMModel
metadata:
  name: qwen-3.6
spec:
  modelName: qwen-3.6
  proxyRef: litellm
  params:
    model: openai/qwen-3.6
    apiBase: http://qwen36-27b.ai.svc.cluster.local:30000/v1
    # Native SGLang is unauthenticated internally, but LiteLLM's OpenAI provider
    # requires a non-empty api_key.
    apiKey: sk-sglang-noauth
    additional:
      timeout: 1800
      stream_timeout: 1800
      num_retries: 0
  info:
    mode: chat
    # Match the configured 180K native SGLang context cap after reserving maxOutputTokens.
    maxInputTokens: 171808
    maxOutputTokens: 8192
---
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMModel
metadata:
  name: qwen-3.6-fast
spec:
  modelName: qwen-3.6-fast
  proxyRef: litellm
  params:
    model: openai/qwen-3.6
    apiBase: http://qwen36-27b.ai.svc.cluster.local:30000/v1
    apiKey: sk-sglang-noauth
    additional:
      # 900s (was 600): Hermes compression is a ~100K+ prefill on this alias — under GPU
      # contention the shared prefill rate drops below what 600s covers (observed 2026-07-07).
      timeout: 900
      stream_timeout: 900
      num_retries: 0
      # Vendor non-thinking sampling (Qwen3.6 model card) — generation_config ships thinking-mode
      # values (1.0/0.95/presence 0). Defaults only: client-set params win (v1.91.0 router merge).
      temperature: 0.7
      top_p: 0.8
      presence_penalty: 1.5
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
  info:
    mode: chat
    # Match SGLang's effective 180K context cap after reserving maxOutputTokens.
    maxInputTokens: 171808
    maxOutputTokens: 8192
