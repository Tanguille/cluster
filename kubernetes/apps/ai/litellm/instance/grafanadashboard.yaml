---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: litellm
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: VictoriaMetrics
      inputName: DS_PROMETHEUS
  # grafana.com 24965 job/instance vars use litellm_proxy_total_requests_metric_created
  # (not exported); leaves $job empty and every panel blank.
  configMapRef:
    name: litellm-dashboard
    key: litellm.json
