---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: litellm
  namespace: &namespace ai
spec:
  interval: 30m
  dependsOn:
    - name: litellm-operator
      namespace: *namespace
    # Waits transitively on cloudnative-pg-cluster; gates on the litellm DB/role being ready.
    # No sglang dep: in DB/api mode the operator registers models via the admin API, so a GPU
    # outage must not stall litellm reconciliation.
    - name: cloudnative-pg-databases
      namespace: database
  path: ./kubernetes/apps/ai/litellm/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
