---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: gpu-operator
      version: v26.3.1
      sourceRef:
        kind: HelmRepository
        name: nvidia
  values:
    driver:
      enabled: false
    toolkit:
      enabled: false
    hostPaths:
      driverInstallDir: /usr/local
    dcgmExporter:
      env:
        # Keep the default collector profile that includes DCP metrics such as
        # DCGM_FI_PROF_PIPE_TENSOR_ACTIVE (tensor core utilization).
        - name: DCGM_EXPORTER_COLLECTORS
          value: /etc/dcgm-exporter/dcp-metrics-included.csv
        - name: DCGM_EXPORTER_KUBERNETES
          value: "true"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: all
        - name: NVIDIA_VISIBLE_DEVICES
          value: all
      resources:
        requests:
          memory: 128Mi
        limits:
          memory: 1024Mi
      serviceMonitor:
        enabled: true
        honorLabels: true
        additionalLabels:
          prometheus: kube-prometheus-stack
    devicePlugin:
      config:
        create: true
        name: device-plugin-config
        default: default
        data:
          default: |-
            version: v1
            sharing:
              timeSlicing:
                renameByDefault: false
                resources:
                  - name: nvidia.com/gpu
                    replicas: 8
